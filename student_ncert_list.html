<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(22, 33, 62, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        body { background: #070b14; color: white; font-family: sans-serif; }
        input { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white; outline: none; }
    </style>
</head>
<body class="p-4">
    <div class="flex items-center gap-4 mb-8 sticky top-0 bg-[#070b14] py-2 z-50">
        <button onclick="history.back()" class="w-10 h-10 glass rounded-full flex items-center justify-center text-yellow-500"><i class="fa-solid fa-chevron-left"></i></button>
        <div class="relative flex-1">
            <input type="text" id="sSearch" oninput="search()" placeholder="Search Chapter..." class="w-full glass p-3 pl-11 rounded-full text-xs">
            <i class="fa-solid fa-search absolute left-4 top-3.5 text-gray-500"></i>
        </div>
    </div>
    <div id="stList" class="space-y-4 px-1"></div>

    <script>
        const firebaseConfig = { /* Config */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('ncert_ai').on('value', snap => {
            const list = document.getElementById('stList'); list.innerHTML = "";
            snap.forEach(child => {
                const ch = child.val();
                list.innerHTML += `
                <div onclick="location.href='ncert_reader.html?id=${child.key}'" class="glass p-6 rounded-[2.5rem] border-l-4 border-yellow-500 flex justify-between items-center active:scale-95 transition-all">
                    <h4 class="text-[11px] font-black uppercase italic">${ch.name}</h4>
                    <i class="fa-solid fa-arrow-right text-yellow-500/50"></i>
                </div>`;
            });
        });
    </script>
</body>
</html>
