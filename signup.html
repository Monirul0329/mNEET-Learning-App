<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#0b1120] flex items-center justify-center min-h-screen p-6">
    <div class="bg-[#16213e] p-10 rounded-[3rem] border border-gray-800 w-full max-w-md shadow-2xl text-white">
        <h2 class="text-2xl font-black italic uppercase text-center mb-8">CREATE <span class="text-[#eab308]">ACCOUNT</span></h2>
        <div class="space-y-4">
            <input type="text" id="newName" placeholder="Full Name" class="w-full bg-[#0b1120] p-4 rounded-2xl border border-gray-700 outline-none focus:border-[#eab308]">
            <input type="email" id="newEmail" placeholder="Email Address" class="w-full bg-[#0b1120] p-4 rounded-2xl border border-gray-700 outline-none">
            <input type="text" id="newPhone" placeholder="Phone Number" class="w-full bg-[#0b1120] p-4 rounded-2xl border border-gray-700 outline-none">
            <input type="text" id="dreamCollege" placeholder="Dream Medical College" class="w-full bg-[#0b1120] p-4 rounded-2xl border border-gray-700 outline-none border-[#eab308]/30">
            <input type="password" id="newPass" placeholder="Set Password" class="w-full bg-[#0b1120] p-4 rounded-2xl border border-gray-700 outline-none">
        </div>
        <button onclick="handleSignUp()" id="regBtn" class="w-full bg-[#eab308] text-black py-5 rounded-2xl font-black uppercase text-xs mt-10 shadow-xl">Register Now</button>
        <p class="text-center text-gray-500 text-[10px] mt-6 font-bold uppercase">Already a member? <a href="index.html" class="text-[#eab308]">Login</a></p>
    </div>

    <script>
        const SB_URL = 'https://aqosatoimyijcahpzauh.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFxb3NhdG9pbXlpamNhaHB6YXVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMzE5NDQsImV4cCI6MjA5MzcwNzk0NH0.F-CvTbRnr-2EI5UbvOycTMF_RR7xQCln0E95cwBUN6Y';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        async function handleSignUp() {
            const btn = document.getElementById('regBtn');
            const email = document.getElementById('newEmail').value;
            const password = document.getElementById('newPass').value;
            const name = document.getElementById('newName').value;
            const phone = document.getElementById('newPhone').value;
            const college = document.getElementById('dreamCollege').value;

            btn.innerText = "Processing...";

            const { data, error } = await supabaseClient.auth.signUp({ email, password });

            if (error) {
                alert("Error: " + error.message);
                btn.innerText = "Register Now";
            } else {
                await supabaseClient.from('users_profile').insert([{ 
                    email, name, phone, college, xp: 0, hours: 0, coins: 0, rank: 'Aspirant' 
                }]);
                alert("Success! Now please login.");
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
