<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>mNEET - Sign Up</title>
</head>
<body class="bg-[#0b1120] flex items-center justify-center min-h-screen p-6">
    <div class="bg-[#16213e] p-10 rounded-[3rem] border border-gray-800 w-full max-w-md shadow-2xl text-white">
        <h2 class="text-2xl font-black italic uppercase text-center mb-8">Create <span class="text-[#eab308]">Account</span></h2>
        
        <div class="space-y-3">
            <input type="text" id="newName" placeholder="Full Name" class="w-full bg-[#0b1120] p-4 rounded-2xl border border-gray-700 outline-none">
            <input type="email" id="newEmail" placeholder="Email Address" class="w-full bg-[#0b1120] p-4 rounded-2xl border border-gray-700 outline-none">
            <input type="text" id="newPhone" placeholder="Phone Number" class="w-full bg-[#0b1120] p-4 rounded-2xl border border-gray-700 outline-none">
            <input type="password" id="newPass" placeholder="Set Password" class="w-full bg-[#0b1120] p-4 rounded-2xl border border-gray-700 outline-none">
        </div>
        
        <button onclick="handleSignUp()" class="w-full bg-[#eab308] text-black py-5 rounded-2xl font-black uppercase text-xs mt-8 shadow-xl active:scale-95 transition-all">Register Now</button>
        
        <p class="text-center text-gray-500 text-[10px] mt-6 uppercase font-bold">
            Already a member? <a href="index.html" class="text-[#eab308]">Login</a>
        </p>
    </div>

    <script>
        const SB_URL = 'https://aqosatoimyijcahpzauh.supabase.co';
        const SB_KEY = 'YOUR_ANON_KEY';
        const supabase = supabase.createClient(SB_URL, SB_KEY);

        async function handleSignUp() {
            const email = document.getElementById('newEmail').value;
            const password = document.getElementById('newPass').value;
            const name = document.getElementById('newName').value;
            const phone = document.getElementById('newPhone').value;

            // 1. Create User in Supabase Auth
            const { data, error } = await supabase.auth.signUp({ email, password });

            if (error) {
                alert("Signup Error: " + error.message);
            } else {
                // 2. Save additional info in user_profile table
                await supabase.from('users_profile').insert([{ 
                    email, name, phone, xp: 0, rank: 'Aspirant', coins: 0 
                }]);
                alert("Account Created! Please check email for verification.");
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
