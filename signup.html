<div class="space-y-3">
    <input type="text" id="newName" placeholder="Full Name" class="w-full bg-[#0b1120] p-4 rounded-2xl border border-gray-700 outline-none">
    <input type="email" id="newEmail" placeholder="Email Address" class="w-full bg-[#0b1120] p-4 rounded-2xl border border-gray-700 outline-none">
    <input type="text" id="newPhone" placeholder="Phone Number" class="w-full bg-[#0b1120] p-4 rounded-2xl border border-gray-700 outline-none">
    <input type="text" id="dreamCollege" placeholder="Dream Medical College (e.g. AIIMS)" class="w-full bg-[#0b1120] p-4 rounded-2xl border border-gray-700 outline-none border-[#eab308]/50">
    <input type="password" id="newPass" placeholder="Set Password" class="w-full bg-[#0b1120] p-4 rounded-2xl border border-gray-700 outline-none">
</div>

<script>
async function handleSignUp() {
    const email = document.getElementById('newEmail').value;
    const password = document.getElementById('newPass').value;
    const name = document.getElementById('newName').value;
    const phone = document.getElementById('newPhone').value;
    const college = document.getElementById('dreamCollege').value;

    const { data, error } = await supabase.auth.signUp({ email, password });

    if (error) {
        alert("Signup Error: " + error.message);
    } else {
        // user_profile table-e details save kora
        await supabase.from('users_profile').insert([{ 
            email, name, phone, college, xp: 0, rank: 'Aspirant', coins: 0 
        }]);
        alert("Registration Successful! Now Login.");
        window.location.href = 'index.html';
    }
}
                                         </script>
