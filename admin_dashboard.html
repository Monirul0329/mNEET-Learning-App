<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(22, 33, 62, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        .gold-glow { color: #eab308; text-shadow: 0 0 10px rgba(234, 179, 8, 0.4); }
        body { background: #070b14; color: white; }
    </style>
</head>
<body class="p-4 pb-36">

    <div class="flex justify-between items-start mb-6">
        <div>
            <h2 class="text-xl font-black gold-glow uppercase italic">ADMIN COMMAND</h2>
            <p class="text-[9px] text-gray-500 font-bold">mi4286803@gmail.com</p>
        </div>
        <div class="flex gap-2">
            <button onclick="location.href='admin_notifications.html'" class="w-9 h-9 glass rounded-full flex items-center justify-center text-[#eab308]"><i class="fa-solid fa-bullhorn text-sm"></i></button>
            <button onclick="logout()" class="w-9 h-9 bg-red-500/10 text-red-500 rounded-full flex items-center justify-center border border-red-500/20"><i class="fa-solid fa-power-off"></i></button>
        </div>
    </div>

    <div class="mb-6">
        <select id="adminBatchSelect" class="w-full bg-[#16213e] border border-yellow-500/30 p-4 rounded-2xl text-[10px] font-black uppercase gold-glow outline-none">
            <option value="">-- ALL BATCHES --</option>
        </select>
    </div>

    <div class="glass p-5 rounded-3xl mb-6 flex items-center justify-between border-l-4 border-blue-500">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-paper-plane text-blue-500"></i>
            <span class="text-[10px] font-black uppercase tracking-tighter">Global Notification</span>
        </div>
        <button class="bg-blue-600 px-4 py-2 rounded-xl text-[9px] font-black uppercase">Push</button>
    </div>

    <nav class="fixed bottom-6 left-6 right-6 glass p-4 rounded-full flex justify-around items-center z-50">
        <i class="fa-solid fa-house gold-glow"></i>
        <a href="admin_study.html"><i class="fa-solid fa-book-open text-gray-600"></i></a>
        <a href="admin_course.html"><i class="fa-solid fa-layer-group text-blue-500 text-xl"></i></a>
        <a href="admin_test.html"><i class="fa-solid fa-pen-nib text-gray-600"></i></a>
        <a href="admin_mstore.html"><i class="fa-solid fa-store text-gray-600"></i></a>
    </nav>

    <script>
        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
