<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(22, 33, 62, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        .gold-glow { color: #eab308; text-shadow: 0 0 10px rgba(234, 179, 8, 0.4); }
        body { background: #070b14; color: white; font-family: sans-serif; overflow-x: hidden; }
    </style>
</head>
<body class="p-6 pb-36">

    <div class="flex justify-between items-center mb-8">
        <div>
            <h2 class="text-xl font-black gold-glow uppercase italic leading-none">ADMIN CONTROL</h2>
            <p class="text-[8px] text-gray-500 font-bold mt-1 uppercase tracking-widest">mNEET Management System</p>
        </div>
        <button onclick="logout()" class="w-11 h-11 bg-red-500/10 text-red-500 rounded-2xl flex items-center justify-center border border-red-500/20 active:scale-90 transition-all">
            <i class="fa-solid fa-power-off text-lg"></i>
        </button>
    </div>

    <div class="glass p-5 rounded-3xl mb-4 border border-white/5 shadow-2xl">
        <p class="text-[8px] text-yellow-500 font-black uppercase mb-3 ml-1 italic tracking-widest">Select Active Batch to Manage</p>
        <select id="adminBatchSelect" onchange="saveSelectedBatch(this.value)" class="w-full bg-[#0b1120] border border-gray-700 p-4 rounded-2xl text-[12px] font-black uppercase gold-glow outline-none">
            <option value="">-- SELECT BATCH --</option>
        </select>
    </div>

    <div class="grid grid-cols-1 gap-4">
        <div onclick="location.href='admin_users.html'" class="glass p-6 rounded-3xl flex items-center justify-between border-l-4 border-blue-500 active:scale-95 transition-all">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-xl bg-blue-500/10 flex items-center justify-center text-blue-500"><i class="fa-solid fa-user-gear"></i></div>
                <div><h3 class="text-[11px] font-black uppercase italic">Student Control</h3></div>
            </div>
            <i class="fa-solid fa-chevron-right text-gray-700"></i>
        </div>

        <div onclick="location.href='admin_notifications.html'" class="glass p-6 rounded-3xl flex items-center justify-between border-l-4 border-orange-500 active:scale-95 transition-all">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-xl bg-orange-500/10 flex items-center justify-center text-orange-500"><i class="fa-solid fa-bullhorn"></i></div>
                <div><h3 class="text-[11px] font-black uppercase italic">Push Notification</h3></div>
            </div>
            <i class="fa-solid fa-paper-plane text-orange-500 text-xs"></i>
        </div>
    </div>

    <nav class="fixed bottom-6 left-6 right-6 glass p-4 rounded-full flex justify-around items-center z-50 shadow-2xl border-white/10">
        <i class="fa-solid fa-house gold-glow"></i>
        <a href="admin_study.html"><i class="fa-solid fa-book-open text-gray-600"></i></a>
        <a href="admin_course.html"><i class="fa-solid fa-layer-group text-gray-600"></i></a>
        <a href="admin_test.html"><i class="fa-solid fa-pen-nib text-gray-600"></i></a>
        <a href="admin_mstore.html"><i class="fa-solid fa-store text-gray-600"></i></a>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58",
            authDomain: "mneet-spark.firebaseapp.com",
            projectId: "mneet-spark",
            databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com/",
            appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function loadBatches() {
            database.ref('courses').on('value', (snap) => {
                const select = document.getElementById('adminBatchSelect');
                const saved = localStorage.getItem('selectedBatchId');
                select.innerHTML = '<option value="">-- SELECT BATCH --</option>';
                snap.forEach(child => {
                    const selected = (child.key === saved) ? 'selected' : '';
                    select.innerHTML += `<option value="${child.key}" ${selected}>${child.val().title}</option>`;
                });
            });
        }

        function saveSelectedBatch(id) {
            if(id) localStorage.setItem('selectedBatchId', id);
        }

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
        loadBatches();
    </script>
</body>
</html>
