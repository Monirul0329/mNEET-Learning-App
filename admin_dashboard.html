<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(22, 33, 62, 0.75); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        body { background: #070b14; color: white; }
        input, textarea { background: rgba(0,0,0,0.3) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white; width: 100%; padding: 12px; border-radius: 12px; font-size: 12px; margin-bottom: 12px; outline: none; }
    </style>
</head>
<body class="p-6">
    <h1 class="text-xl font-black italic uppercase gold-glow mb-8 text-center">ADMIN COMMAND CENTER</h1>

    <div class="glass p-6 rounded-[2.5rem] border border-white/10">
        <h3 class="text-xs font-black uppercase text-gray-400 mb-6 tracking-widest text-center italic">Manage Course / Batch</h3>
        
        <input type="text" id="bTitle" placeholder="Batch Title">
        <textarea id="bDesc" placeholder="Short Description"></textarea>
        
        <div class="grid grid-cols-2 gap-4">
            <input type="text" id="bPrice" placeholder="Offer Price (₹)">
            <input type="text" id="bMrp" placeholder="MRP (₹)">
        </div>
        
        <div class="grid grid-cols-2 gap-4">
            <input type="text" id="bStart" placeholder="Start Date">
            <input type="text" id="bEnd" placeholder="End Date">
        </div>
        
        <input type="text" id="bThumb" placeholder="Thumbnail Image URL">
        <input type="text" id="bVid" placeholder="Video URL (Thumbnail Video)">
        <input type="text" id="bOff" placeholder="Discount Percentage (%)">

        <button onclick="updateBatch()" class="w-full bg-[#eab308] text-black py-4 rounded-2xl font-black uppercase text-xs mt-4">Update Student Dashboard</button>
    </div>

    <script>
        function updateBatch() {
            // Firebase Update Logic for 'admin/batch_details'
            alert("Dashboard Updated Successfully!");
        }
    </script>
</body>
</html>
