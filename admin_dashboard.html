<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style> 
        body { background: #070b14; color: white; } 
        .admin-nav { background: #eab308; color: black; font-weight: 900; }
    </style>
</head>
<body class="p-6">

    <div class="flex justify-between items-center mb-10">
        <h1 class="text-xl font-black gold-glow uppercase italic">Admin Mirror Panel</h1>
        <button onclick="logout()" class="text-[9px] font-black uppercase bg-red-600 px-4 py-2 rounded-xl">Exit Admin</button>
    </div>

    <div class="space-y-4">
        <div class="bg-[#16213e] p-6 rounded-[2.5rem] border border-yellow-500/20">
            <h3 class="text-xs font-black uppercase italic gold-glow mb-4">Batch Mirroring</h3>
            <button onclick="location.href='create_batch.html'" class="w-full bg-[#eab308] text-black py-4 rounded-2xl font-black uppercase text-[10px]">Create New Batch Profile</button>
        </div>

        <div class="bg-[#16213e] p-6 rounded-[2.5rem] border border-blue-500/20">
            <h3 class="text-xs font-black uppercase italic text-blue-400 mb-4">Study Zone Mirror</h3>
            <div class="space-y-3">
                <button onclick="upload('lecture')" class="w-full bg-white/5 border border-white/5 p-4 rounded-xl text-left text-[9px] font-black uppercase">+ Upload Lecture, Notes, DPP</button>
                <button onclick="upload('ncert')" class="w-full bg-white/5 border border-white/5 p-4 rounded-xl text-left text-[9px] font-black uppercase">+ Add NCERT PYQ Tags</button>
                <button onclick="upload('quiz')" class="w-full bg-white/5 border border-white/5 p-4 rounded-xl text-left text-[9px] font-black uppercase">+ Add Chapter Wise Quiz</button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-6 left-6 right-6 bg-[#eab308] p-4 rounded-full flex justify-around items-center z-50">
        <i class="fa-solid fa-house text-black"></i>
        <a href="admin_study.html"><i class="fa-solid fa-book-open text-black/50"></i></a>
        <a href="admin_batches.html"><i class="fa-solid fa-layer-group text-black/50 text-xl"></i></a>
        <a href="admin_test.html"><i class="fa-solid fa-pen-nib text-black/50"></i></a>
        <a href="admin_store.html"><i class="fa-solid fa-store text-black/50"></i></a>
    </nav>

</body>
</html>
