<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(22, 33, 62, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        .gold-glow { color: #eab308; text-shadow: 0 0 10px rgba(234, 179, 8, 0.4); }
        body { background: #070b14; color: white; }

</head>
<body class="p-4 pb-28 font-sans">

    <div class="flex justify-between items-center mb-10 px-1">
        <div class="flex items-center gap-4">
            <button onclick="location.href='dashboard.html'" class="w-10 h-10 glass rounded-2xl flex items-center justify-center text-gray-400 active:scale-90 transition-all"><i class="fa-solid fa-chevron-left"></i></button>

        <a href="profile.html" class="bg-yellow-500/10 px-3 py-1.5 rounded-full border border-yellow-500/20 text-xs font-black">🪙 <span id="uCoins">0</span></a>
    </div>

    <div class="space-y-5">
        
        <a href="lecture_notes_hub.html" class="glass p-6 rounded-[2.5rem] flex justify-between items-center border border-blue-500/20 border-l-4 border-l-blue-500 group">
            <div class="flex items-center gap-4">
                <div class="w-11 h-11 rounded-2xl bg-blue-500/10 flex items-center justify-center text-blue-500 group-hover:animate-pulse"><i class="fa-solid fa-clapperboard"></i></div>

                </div>
            </div>

        </a>

                <div class="w-11 h-11 rounded-2xl bg-yellow-500/10 flex items-center justify-center text-[#eab308] group-hover:animate-pulse"><i class="fa-solid fa-book-open"></i></div>

                    <h4 class="text-sm font-black uppercase italic">Chapter & Topic Wise Quiz</h4>

                </div>
            </div>

    <nav class="fixed bottom-6 left-6 right-6 glass p-4 rounded-full flex justify-around shadow-2xl border-white/10 z-50">

        <a href="test.html"><i class="fa-solid fa-pen-nib text-gray-500"></i></a>

</html>
