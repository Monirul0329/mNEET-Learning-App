<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#0b1120] p-6 text-white font-sans pb-20">
    
    <h2 class="text-[9px] font-black text-gray-500 uppercase tracking-widest mb-4 ml-1">My Enrolled Courses</h2>
    <div id="courseTabs" class="flex gap-3 overflow-x-auto pb-4 no-scrollbar">
        <p class="text-xs text-gray-600 animate-pulse">Checking access...</p>
    </div>

    <hr class="border-gray-800 mb-8 mt-2">

    <div id="chapterHeader" class="hidden mb-6">
        <h3 id="selectedCourseName" class="text-xl font-black text-[#eab308] italic"></h3>
        <p class="text-[9px] text-gray-500 uppercase font-bold tracking-tighter">Available Chapters & Topics</p>
    </div>

    <div id="materialList" class="space-y-4 text-center">
        <div class="py-20 opacity-30">
            <i class="fa-solid fa-book-open text-4xl mb-4"></i>
            <p class="text-xs uppercase font-bold tracking-widest">Select a course above to start learning</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBisQytTeFhjMd1kTUNwcmCelPy7C0ilIY", authDomain: "mneet-7699.firebaseapp.com", projectId: "mneet-7699", storageBucket: "mneet-7699.firebasestorage.app", messagingSenderId: "801664280357", appId: "1:801664280357:web:03da6173f29bedfeaa9ccc" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- 1. Load Courses as Tabs ---
        onSnapshot(collection(db, "courses"), (snap) => {
            const tabs = document.getElementById('courseTabs');
            tabs.innerHTML = "";
            if(snap.empty) { tabs.innerHTML = "<p class='text-xs text-red-500'>No active courses found.</p>"; return; }
            
            snap.forEach(d => {
                const c = d.data();
                tabs.innerHTML += `
                <button onclick="loadChapters('${d.id}', '${c.title}')" class="flex-shrink-0 bg-[#16213e] border border-gray-800 px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:border-[#eab308] transition-all active:scale-95 focus:bg-[#eab308] focus:text-black">
                    ${c.title}
                </button>`;
            });
        });

        // --- 2. Load Chapters based on Course ID ---
        window.loadChapters = (courseId, courseTitle) => {
            document.getElementById('chapterHeader').classList.remove('hidden');
            document.getElementById('selectedCourseName').innerText = courseTitle;
            
            const list = document.getElementById('materialList');
            list.innerHTML = `<p class="text-center text-xs text-gray-500 animate-pulse mt-10">Fetching ${courseTitle} materials...</p>`;

            // Query only materials for this courseId
            const q = query(collection(db, "study_material"), where("courseId", "==", courseId));
            
            onSnapshot(q, (snap) => {
                list.innerHTML = "";
                if(snap.empty) {
                    list.innerHTML = `<div class="py-20 text-gray-600"><p class="text-xs uppercase font-bold">No chapters added yet for this course.</p></div>`;
                    return;
                }

                snap.forEach(d => {
                    const s = d.data();
                    list.innerHTML += `
                    <div class="bg-[#16213e] p-6 rounded-[2.5rem] border-l-4 border-[#eab308] text-left shadow-2xl mb-4">
                        <p class="text-[9px] text-[#eab308] font-black uppercase mb-1 tracking-widest italic opacity-60">Chapter Content</p>
                        <h3 class="font-bold text-lg text-white mb-6 leading-tight">${s.chapter}</h3>
                        
                        <div class="grid grid-cols-3 gap-3">
                            <button onclick="window.open('https://youtube.com/watch?v=${s.video}', '_blank')" class="bg-[#0b1120] p-3 rounded-2xl text-[9px] font-black uppercase border border-gray-800 active:scale-90 transition-all"><i class="fa-solid fa-play text-[#eab308] mr-1"></i> Video</button>
                            <button onclick="window.open('${s.pdf}', '_blank')" class="bg-[#0b1120] p-3 rounded-2xl text-[9px] font-black uppercase border border-gray-800 active:scale-90 transition-all"><i class="fa-solid fa-file-pdf text-[#eab308] mr-1"></i> Notes</button>
                            <button onclick="window.open('${s.dpp}', '_blank')" class="bg-[#0b1120] p-3 rounded-2xl text-[9px] font-black uppercase border border-gray-800 active:scale-90 transition-all"><i class="fa-solid fa-bolt text-[#eab308] mr-1"></i> DPP</button>
                        </div>
                    </div>`;
                });
            });
        };
    </script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</body>
</html>
