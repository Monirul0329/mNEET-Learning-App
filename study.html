<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(22, 33, 62, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        .gold-glow { color: #eab308; text-shadow: 0 0 10px rgba(234, 179, 8, 0.4); }
        body { background: #070b14; color: white; }
    </style>
</head>
<body class="p-4 pb-28">

    <div class="flex justify-between items-center mb-10">
        <div class="flex items-center gap-4">
            <button onclick="history.back()" class="w-10 h-10 glass rounded-2xl flex items-center justify-center text-gray-400 active:scale-90 transition-all"><i class="fa-solid fa-chevron-left"></i></button>
            <h1 class="text-2xl font-black italic gold-glow uppercase tracking-tighter leading-none">STUDY ZONE</h1>
        </div>
        <div class="bg-yellow-500/10 px-3 py-1.5 rounded-full border border-yellow-500/20 text-xs font-black">🪙 <span id="uCoins">0</span></div>
    </div>

    <div class="space-y-4">
        
        <a href="core_resources.html" class="glass p-6 rounded-[2.5rem] flex justify-between items-center border-l-4 border-blue-500">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-2xl bg-blue-500/10 flex items-center justify-center text-blue-500"><i class="fa-solid fa-layer-group"></i></div>
                <div>
                    <h4 class="text-sm font-black uppercase italic">Lectures, Notes & DPP</h4>
                    <p class="text-[8px] text-gray-500 font-bold uppercase mt-1">Study materials & recorded sessions</p>
                </div>
            </div>
            <i class="fa-solid fa-chevron-right text-gray-800"></i>
        </a>

        <a href="ncert_hub.html" class="glass p-6 rounded-[2.5rem] flex justify-between items-center border-l-4 border-[#eab308]">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-2xl bg-[#eab308]/10 flex items-center justify-center text-[#eab308]"><i class="fa-solid fa-book-open"></i></div>
                <div>
                    <h4 class="text-sm font-black uppercase italic">NCERT Reading & PYQ Tags</h4>
                    <p class="text-[8px] text-gray-500 font-bold uppercase mt-1">Interactive Book Analysis</p>
                </div>
            </div>
            <i class="fa-solid fa-chevron-right text-gray-800"></i>
        </a>

        <a href="quiz_hub.html" class="glass p-6 rounded-[2.5rem] flex justify-between items-center border-l-4 border-purple-500">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-2xl bg-purple-500/10 flex items-center justify-center text-purple-400"><i class="fa-solid fa-vial"></i></div>
                <div>
                    <h4 class="text-sm font-black uppercase italic">Chapter & Topic Wise Quiz</h4>
                    <p class="text-[8px] text-gray-500 font-bold uppercase mt-1">Practice concept by concept</p>
                </div>
            </div>
            <i class="fa-solid fa-chevron-right text-gray-800"></i>
        </a>

        <div class="glass p-6 rounded-[2.5rem] border-l-4 border-red-500">
            <h4 class="text-[10px] font-black uppercase italic text-red-500 mb-4">Special Materials</h4>
            <p class="text-[9px] text-gray-600 italic">No new materials uploaded.</p>
        </div>

    </div>

    <nav class="fixed bottom-6 left-6 right-6 glass p-4 rounded-full flex justify-around shadow-2xl border-white/10 z-50">
        <a href="dashboard.html"><i class="fa-solid fa-house text-gray-500"></i></a>
        <i class="fa-solid fa-book-open gold-glow"></i>
        <a href="test.html"><i class="fa-solid fa-pen-nib text-gray-500"></i></a>
        <a href="mstore.html"><i class="fa-solid fa-store text-gray-500"></i></a>
    </nav>

</body>
</html>
