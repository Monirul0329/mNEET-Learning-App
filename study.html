<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(22, 33, 62, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        .gold-glow { color: #eab308; text-shadow: 0 0 10px rgba(234, 179, 8, 0.4); }
        body { background: #070b14; color: white; }
    </style>
</head>
<body class="p-4 pb-32">

    <div class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-4">
            <button onclick="location.href='dashboard.html'" class="w-10 h-10 glass rounded-2xl flex items-center justify-center text-gray-400"><i class="fa-solid fa-chevron-left"></i></button>
            <h1 class="text-2xl font-black italic gold-glow uppercase tracking-tighter">STUDY ZONE</h1>
        </div>
        <div class="bg-yellow-500/10 px-3 py-1.5 rounded-full border border-yellow-500/20 text-xs font-black">🪙 0</div>
    </div>

    <div class="glass p-5 rounded-3xl mb-8 border-b-2 border-blue-500/30">
        <div class="flex justify-between items-center mb-2">
            <span class="text-[9px] font-black uppercase text-gray-500 italic">Course Completion</span>
            <span class="text-[10px] font-black text-blue-400">45%</span>
        </div>
        <div class="w-full bg-white/5 h-1 rounded-full overflow-hidden">
            <div class="bg-blue-500 h-full" style="width: 45%"></div>
        </div>
    </div>

    <div class="space-y-4">
        <a href="lecture_hub.html" class="glass p-6 rounded-[2.5rem] flex justify-between items-center border-l-4 border-blue-500">
            <div class="flex items-center gap-4">
                <i class="fa-solid fa-layer-group text-blue-500 text-xl"></i>
                <h4 class="text-sm font-black uppercase italic">Lecture, Notes & DPP</h4>
            </div>
            <i class="fa-solid fa-chevron-right text-gray-800"></i>
        </a>

        <a href="ncert_hub.html" class="glass p-6 rounded-[2.5rem] flex justify-between items-center border-l-4 border-yellow-500">
            <div class="flex items-center gap-4">
                <i class="fa-solid fa-book-open text-yellow-500 text-xl"></i>
                <h4 class="text-sm font-black uppercase italic">NCERT Reading & PYQ Tags</h4>
            </div>
            <i class="fa-solid fa-chevron-right text-gray-800"></i>
        </a>

        <a href="special_hub.html" class="glass p-6 rounded-[2.5rem] flex justify-between items-center border-l-4 border-red-500">
            <div class="flex items-center gap-4">
                <i class="fa-solid fa-star text-red-500 text-xl"></i>
                <h4 class="text-sm font-black uppercase italic">Special Materials Hub</h4>
            </div>
            <i class="fa-solid fa-chevron-right text-gray-800"></i>
        </a>

        <a href="support.html" class="glass p-6 rounded-[2.5rem] flex justify-between items-center border-l-4 border-green-500">
            <div class="flex items-center gap-4">
                <i class="fa-solid fa-comment-dots text-green-500 text-xl"></i>
                <h4 class="text-sm font-black uppercase italic">Doubt & Support Box</h4>
            </div>
            <i class="fa-solid fa-chevron-right text-gray-800"></i>
        </a>
    </div>

</body>
</html>
