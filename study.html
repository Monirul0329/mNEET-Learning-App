<!DOCTYPE html>
<html lang="en">
<head><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-[#0b1120] p-6 text-white font-sans">
    <h2 class="text-[9px] text-gray-500 uppercase font-black mb-4 tracking-widest">Select Your Enrolled Course</h2>
    <div id="enrolledTabs" class="flex gap-3 overflow-x-auto pb-4 no-scrollbar"></div>
    <div id="contentList" class="mt-8 space-y-4">
        <p class="text-center text-xs text-gray-700 py-20 font-bold uppercase italic">Select a course to start</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, query, where, getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBisQytTeFhjMd1kTUNwcmCelPy7C0ilIY", authDomain: "mneet-7699.firebaseapp.com", projectId: "mneet-7699", storageBucket: "mneet-7699.firebasestorage.app", messagingSenderId: "801664280357", appId: "1:801664280357:web:03da6173f29bedfeaa9ccc" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if(user) {
                onSnapshot(doc(db, "users", user.uid), async (snap) => {
                    const enrolledIds = snap.data().enrolled || [];
                    const tabs = document.getElementById('enrolledTabs');
                    tabs.innerHTML = "";
                    
                    if(enrolledIds.length === 0) {
                        tabs.innerHTML = "<p class='text-xs text-red-400'>No courses enrolled yet.</p>";
                        return;
                    }

                    for(let cid of enrolledIds) {
                        tabs.innerHTML += `<button onclick="loadContent('${cid}')" class="flex-shrink-0 bg-[#16213e] px-6 py-3 rounded-2xl text-[10px] font-black uppercase border border-gray-800 focus:bg-[#eab308] focus:text-black">${cid.substring(0,6)}</button>`;
                    }
                });
            }
        });

        window.loadContent = (cid) => {
            const q = query(collection(db, "study_material"), where("courseId", "==", cid));
            onSnapshot(q, (snap) => {
                const list = document.getElementById('contentList');
                list.innerHTML = "";
                snap.forEach(d => {
                    const s = d.data();
                    list.innerHTML += `
                    <div class="bg-[#16213e] p-6 rounded-[2rem] border-l-4 border-[#eab308]">
                        <h3 class="font-bold text-white mb-6 uppercase italic">${s.chapter}</h3>
                        <div class="grid grid-cols-3 gap-2">
                            <button class="bg-[#0b1120] p-3 rounded-xl text-[8px] font-bold">VIDEO</button>
                            <button class="bg-[#0b1120] p-3 rounded-xl text-[8px] font-bold">NOTES</button>
                            <button class="bg-[#0b1120] p-3 rounded-xl text-[8px] font-bold text-yellow-500">DPP QUIZ</button>
                        </div>
                    </div>`;
                });
            });
        };
    </script>
</body>
</html>
