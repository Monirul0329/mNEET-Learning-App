<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(22, 33, 62, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        body { background: #070b14; color: white; font-family: sans-serif; min-height: 100vh; }
        .ch-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .ch-card:active { transform: scale(0.97); opacity: 0.8; }
        .gold-glow { color: #eab308; text-shadow: 0 0 10px rgba(234, 179, 8, 0.4); }
    </style>
</head>
<body class="p-4 pb-32">

    <div class="flex justify-between items-center mb-8 px-1 mt-2">
        <div class="flex items-center gap-4">
            <button onclick="location.href='study_zone.html'" class="w-10 h-10 glass rounded-2xl flex items-center justify-center text-gray-400 active:scale-90 transition-all"><i class="fa-solid fa-chevron-left"></i></button>
            <div>
                <h1 class="text-xl font-black italic gold-glow uppercase tracking-tighter">NCERT CHAPTERS</h1>
                <p class="text-[7px] text-gray-500 uppercase font-bold tracking-widest mt-0.5">Select chapter to read</p>
            </div>
        </div>
    </div>

    <div class="space-y-4" id="chaptersContainer">
        <div class="py-20 text-center text-gray-600 text-[10px] uppercase font-black tracking-widest">
            <i class="fa-solid fa-circle-notch animate-spin text-yellow-500 mr-2"></i> Syncing Hub...
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58", authDomain: "mneet-spark.firebaseapp.com", projectId: "mneet-spark", databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com/", appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const batchId = localStorage.getItem('selectedBatchId') || "B001";

        function loadStudentChapters() {
            database.ref(`courses/${batchId}/ncert`).on('value', snap => {
                const container = document.getElementById('chaptersContainer');
                container.innerHTML = "";

                if (!snap.exists()) {
                    container.innerHTML = `<p class="text-center text-gray-600 text-[9px] font-black uppercase tracking-widest py-10">No NCERT Chapters Published</p>`;
                    return;
                }

                snap.forEach(child => {
                    const c = child.val();
                    if (c.isHidden) return; // Automatic bypass hidden chapters

                    container.innerHTML += `
                        <div onclick="openReader('${child.key}')" class="glass p-6 rounded-[2.5rem] flex justify-between items-center ch-card border border-white/5 shadow-md">
                            <div class="flex items-center gap-4">
                                <div class="w-11 h-11 rounded-2xl bg-yellow-500/10 flex items-center justify-center text-yellow-500"><i class="fa-solid fa-book-bookmark"></i></div>
                                <div>
                                    <h4 class="text-sm font-black uppercase italic tracking-wide">${c.name}</h4>
                                    <p class="text-[7px] text-gray-500 uppercase font-bold mt-0.5">Smart Study Session Ready</p>
                                </div>
                            </div>
                            <i class="fa-solid fa-circle-play text-yellow-500 text-lg"></i>
                        </div>`;
                });
            });
        }

        function openReader(id) { location.href = `ncert_reader.html?id=${id}`; }
        loadStudentChapters();
    </script>
</body>
</html>
