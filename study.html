<!DOCTYPE html>
<html lang="en">
<head><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-[#0b1120] p-6 text-white pb-32">
    <div id="subTabs" class="flex gap-3 overflow-x-auto pb-4 no-scrollbar mb-8"></div>
    <div id="contentArea" class="space-y-6">
        <p class="text-center py-20 text-gray-700 font-black uppercase text-[10px]">Select subject to view materials</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, query, where, getAuth, onAuthStateChanged, getDocs } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
        const firebaseConfig = { apiKey: "AIzaSyBisQytTeFhjMd1kTUNwcmCelPy7C0ilIY", authDomain: "mneet-7699.firebaseapp.com", projectId: "mneet-7699", storageBucket: "mneet-7699.firebasestorage.app", messagingSenderId: "801664280357", appId: "1:801664280357:web:03da6173f29bedfeaa9ccc" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app); const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if(user) {
                onSnapshot(doc(db, "users", user.uid), async (snap) => {
                    const enrolled = snap.data().enrolled || [];
                    const tabs = document.getElementById('subTabs'); tabs.innerHTML = "";
                    for(let id of enrolled) {
                        const cDoc = await getDocs(query(collection(db, "courses")));
                        cDoc.forEach(d => {
                            if(d.id === id) tabs.innerHTML += `<button onclick="loadC('${d.id}')" class="flex-shrink-0 bg-[#16213e] border border-gray-800 px-6 py-3 rounded-2xl text-[10px] font-black uppercase focus:bg-[#eab308] focus:text-black">${d.data().title}</button>`;
                        });
                    }
                });
            }
        });

        window.loadC = (cid) => {
            const q = query(collection(db, "study_material"), where("courseId", "==", cid));
            onSnapshot(q, (snap) => {
                const area = document.getElementById('contentArea'); area.innerHTML = "";
                snap.forEach(d => {
                    const s = d.data();
                    area.innerHTML += `
                    <div class="bg-[#16213e] p-6 rounded-[2.5rem] border border-gray-800 shadow-2xl">
                        <h3 class="font-black text-white text-lg italic mb-4">${s.chapter}</h3>
                        ${s.pdf && (s.pdf.includes('.jpg') || s.pdf.includes('.png') || s.pdf.includes('.jpeg')) ? `<img src="${s.pdf}" class="w-full rounded-2xl mb-4 border border-gray-800">` : ''}
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="window.open('https://youtube.com/watch?v=${s.video}')" class="bg-[#0b1120] p-4 rounded-2xl text-[9px] font-black uppercase">Watch Video</button>
                            <button onclick="window.open('${s.pdf}')" class="bg-[#0b1120] p-4 rounded-2xl text-[9px] font-black uppercase">View Photo/PDF</button>
                        </div>
                    </div>`;
                });
            });
        };
    </script>
</body>
</html>
