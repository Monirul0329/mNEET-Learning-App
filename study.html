<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style> .no-scrollbar::-webkit-scrollbar { display: none; } </style>
</head>
<body class="bg-[#0b1120] p-6 text-white pb-32">
    <h2 class="text-[9px] font-black text-gray-500 uppercase tracking-widest mb-4 italic">My Enrolled Subjects</h2>
    <div id="enrolledTabs" class="flex gap-3 overflow-x-auto pb-4 no-scrollbar"></div>

    <div id="materialArea" class="mt-8 space-y-6">
        <p id="initMsg" class="text-center text-xs text-gray-700 py-20 font-bold uppercase italic">Select a subject to start learning</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, query, where, getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBisQytTeFhjMd1kTUNwcmCelPy7C0ilIY", authDomain: "mneet-7699.firebaseapp.com", projectId: "mneet-7699", storageBucket: "mneet-7699.firebasestorage.app", messagingSenderId: "801664280357", appId: "1:801664280357:web:03da6173f29bedfeaa9ccc" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app); const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if(user) {
                onSnapshot(doc(db, "users", user.uid), async (snap) => {
                    const enrolled = snap.data().enrolled || [];
                    const tabs = document.getElementById('enrolledTabs');
                    tabs.innerHTML = "";
                    if(enrolled.length === 0) return tabs.innerHTML = "<p class='text-xs text-red-500'>Enroll in a course first!</p>";
                    
                    for(let id of enrolled) {
                        const cSnap = await (await fetch(`https://firestore.googleapis.com/v1/projects/mneet-7699/databases/(default)/documents/courses/${id}`)).json();
                        const title = cSnap.fields ? cSnap.fields.title.stringValue : "Subject";
                        tabs.innerHTML += `<button onclick="loadContent('${id}')" class="flex-shrink-0 bg-[#16213e] border border-gray-800 px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest focus:bg-[#eab308] focus:text-black transition-all">${title}</button>`;
                    }
                });
            }
        });

        window.loadContent = (cid) => {
            document.getElementById('initMsg').style.display = "none";
            const q = query(collection(db, "study_material"), where("courseId", "==", cid));
            onSnapshot(q, (snap) => {
                const area = document.getElementById('materialArea'); area.innerHTML = "";
                snap.forEach(d => {
                    const s = d.data();
                    area.innerHTML += `
                    <div class="bg-[#16213e] p-6 rounded-[2.5rem] border-l-4 border-[#eab308] shadow-2xl">
                        <h3 class="font-black text-white mb-4 uppercase italic tracking-tighter">${s.chapter}</h3>
                        ${s.pdf ? `<img src="${s.pdf}" class="w-full h-40 object-cover rounded-2xl mb-4 border border-gray-800">` : ''}
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="window.open('https://youtube.com/watch?v=${s.video}')" class="bg-[#0b1120] p-3 rounded-xl text-[8px] font-black uppercase"><i class="fa-solid fa-play text-gold mr-1"></i> Video</button>
                            <button onclick="window.open('${s.pdf}')" class="bg-[#0b1120] p-3 rounded-xl text-[8px] font-black uppercase"><i class="fa-solid fa-image text-gold mr-1"></i> Photo</button>
                            <button onclick="parent.location.href='quiz.html?id=${s.quiz}'" class="bg-gold text-black p-3 rounded-xl text-[8px] font-black uppercase">Start Quiz</button>
                        </div>
                    </div>`;
                });
            });
        };
    </script>
</body>
</html>
