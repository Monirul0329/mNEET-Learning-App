<!DOCTYPE html>
<html lang="en">
<head><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-[#0b1120] p-6 text-white">
    <div class="bg-[#16213e] p-6 rounded-3xl border border-[#eab308]/20">
        <h2 class="text-[#eab308] text-xs font-bold mb-6 uppercase">Upload Study Material</h2>
        <input type="text" placeholder="Chapter Name" class="w-full bg-[#1e293b] p-4 rounded-xl mb-4 outline-none border border-gray-700">
        <input type="text" placeholder="Video ID" class="w-full bg-[#1e293b] p-4 rounded-xl mb-4 outline-none border border-gray-700">
        <input type="text" placeholder="PDF Link" class="w-full bg-[#1e293b] p-4 rounded-xl mb-4 outline-none border border-gray-700">
        <button class="w-full bg-[#eab308] text-black py-4 rounded-xl font-black uppercase text-xs">Add to Study</button>
    </div>
    <!DOCTYPE html>
<html lang="en">
<head><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-[#0b1120] p-6 text-white font-sans">
    <div class="bg-[#16213e] p-6 rounded-3xl border border-blue-900/30 mb-8">
        <h2 class="text-blue-400 text-xs font-bold mb-6 uppercase tracking-widest text-center">Upload Study Material</h2>
        <input type="text" id="chap" placeholder="Chapter Name" class="w-full bg-[#1e293b] p-4 rounded-xl mb-3 outline-none border border-gray-700 text-sm">
        <input type="text" id="vid" placeholder="YouTube Video ID" class="w-full bg-[#1e293b] p-4 rounded-xl mb-3 outline-none border border-gray-700 text-sm">
        <input type="text" id="pdf" placeholder="Notes PDF Link" class="w-full bg-[#1e293b] p-4 rounded-xl mb-3 outline-none border border-gray-700 text-sm">
        <input type="text" id="dpp" placeholder="DPP / Quiz Link" class="w-full bg-[#1e293b] p-4 rounded-xl mb-5 outline-none border border-gray-700 text-sm">
        <button onclick="saveStudy()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black uppercase text-[10px]">Add to Library</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBisQytTeFhjMd1kTUNwcmCelPy7C0ilIY",
  authDomain: "mneet-7699.firebaseapp.com",
  projectId: "mneet-7699",
  storageBucket: "mneet-7699.firebasestorage.app",
  messagingSenderId: "801664280357",
  appId: "1:801664280357:web:03da6173f29bedfeaa9ccc",
  measurementId: "G-EFNE8HTGZ3"
};
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.saveStudy = async () => {
            const chapter = document.getElementById('chap').value;
            const videoId = document.getElementById('vid').value;
            if(!chapter || !videoId) return alert("Chapter & Video required!");
            await addDoc(collection(db, "study_material"), {
                chapter, videoId, notes: document.getElementById('pdf').value, dpp: document.getElementById('dpp').value, timestamp: new Date()
            });
            alert("Added!");
            location.reload();
        };
    </script>
</body>
</html>
