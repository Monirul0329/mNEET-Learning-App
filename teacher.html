<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNeet Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b1120; color: white; font-family: sans-serif; }
        .card-navy { background-color: #16213e; border: 1px solid #1f2937; }
        .input-navy { background-color: #1e293b; border: 1px solid #334155; color: white; }
        .btn-gold { background-color: #eab308; color: #0b1120; font-weight: 800; }
    </style>
</head>
<body>
    <nav class="p-6 border-b border-gray-800 flex justify-between items-center bg-[#0b1120]">
        <h1 class="text-3xl font-black text-[#eab308] italic tracking-tighter">mNeet Admin</h1>
    </nav>

    <div class="p-6 max-w-lg mx-auto">
        <div class="card-navy p-8 rounded-[2.5rem] mb-10 shadow-2xl">
            <h2 class="text-xl font-bold mb-6 text-[#eab308] uppercase text-center">New Course</h2>
            <input type="text" id="cTitle" class="w-full input-navy p-4 rounded-2xl mb-4 outline-none" placeholder="Course Name">
            <input type="number" id="cPrice" class="w-full input-navy p-4 rounded-2xl mb-4 outline-none" placeholder="Price (₹)">
            <input type="text" id="cVideo" class="w-full input-navy p-4 rounded-2xl mb-4 outline-none" placeholder="YouTube Link (e.g. https://youtu.be/xyz)">
            <textarea id="cDesc" class="w-full input-navy p-4 rounded-2xl mb-6 outline-none h-32" placeholder="Course Features..."></textarea>
            <button onclick="saveCourse()" class="w-full btn-gold py-4 rounded-2xl font-bold uppercase shadow-lg">Publish Course</button>
        </div>

        <h3 class="text-xs font-bold text-gray-500 uppercase mb-4 ml-2">Active Courses</h3>
        <div id="adminCourseList" class="space-y-4"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBisQytTeFhjMd1kTUNwcmCelPy7C0ilIY",
            authDomain: "mneet-7699.firebaseapp.com",
            projectId: "mneet-7699",
            storageBucket: "mneet-7699.firebasestorage.app",
            messagingSenderId: "801664280357",
            appId: "1:801664280357:web:03da6173f29bedfeaa9ccc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.saveCourse = async () => {
            const title = document.getElementById('cTitle').value;
            const price = document.getElementById('cPrice').value;
            const videoLink = document.getElementById('cVideo').value;
            const desc = document.getElementById('cDesc').value;

            let videoId = "";
            if (videoLink.includes("v=")) videoId = videoLink.split("v=")[1].split("&")[0];
            else if (videoLink.includes("youtu.be/")) videoId = videoLink.split("youtu.be/")[1].split("?")[0];

            if(!title || !price) return alert("Title and Price are mandatory!");
            
            await addDoc(collection(db, "courses"), { 
                title, 
                price, 
                video: videoId, 
                desc, 
                timestamp: new Date() 
            });
            alert("Published!");
            location.reload();
        };

        window.delCourse = async (id) => {
            if(confirm("Delete this?")) await deleteDoc(doc(db, "courses", id));
        };

        onSnapshot(collection(db, "courses"), (snap) => {
            const container = document.getElementById('adminCourseList');
            container.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                container.innerHTML += `
                    <div class="card-navy p-4 rounded-2xl flex justify-between items-center shadow-md">
                        <span class="font-bold">${data.title}</span>
                        <button onclick="delCourse('${d.id}')" class="text-red-500 font-bold">DEL</button>
                    </div>`;
            });
        });
    </script>
</body>
</html>
