<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNEET Admin - Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b1120; color: white; padding-bottom: 80px; }
        .card-navy { background-color: #16213e; }
        .text-gold { color: #eab308; }
        .nav-active { color: #eab308; border-top: 2px solid #eab308; }
    </style>
</head>
<body>
    <div class="p-6 bg-[#16213e] rounded-b-[2.5rem] border-b border-gray-800">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black text-gold italic">mNEET <span class="text-xs text-white not-italic uppercase ml-1">Admin</span></h1>
            <button onclick="logout()" class="text-red-500 font-bold text-xs uppercase border border-red-900 px-3 py-1 rounded">Logout</button>
        </div>

        <div class="flex gap-4 mb-4 text-center">
            <div class="flex-1 bg-[#0b1120] p-4 rounded-2xl border border-gray-700">
                <p class="text-[10px] text-gray-500 uppercase font-bold">Total Students</p>
                <p id="totalStudents" class="text-2xl font-black text-gold">0</p>
            </div>
            <div class="flex-1 bg-[#0b1120] p-4 rounded-2xl border border-gray-700">
                <p class="text-[10px] text-gray-500 uppercase font-bold">Active Sales</p>
                <p id="totalSales" class="text-2xl font-black text-white">₹0</p>
            </div>
        </div>
    </div>

    <div class="p-6">
        <div id="adminPanelContent" class="space-y-4">
            <div class="card-navy p-6 rounded-3xl border border-gray-800 text-center">
                <i class="fa-solid fa-plus-circle text-4xl text-gold mb-2"></i>
                <h3 class="font-bold">Add New Content</h3>
                <p class="text-xs text-gray-500">Tap below to manage your mNEET store</p>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-[#16213e] border-t border-gray-800 flex justify-around p-3 z-50">
        <button onclick="setTab('store')" class="flex flex-col items-center nav-active" id="admin-store">
            <i class="fa-solid fa-bag-shopping text-lg"></i>
            <span class="text-[9px] uppercase font-bold mt-1">Manage Store</span>
        </button>
        <button onclick="setTab('study')" class="flex flex-col items-center text-gray-500" id="admin-study">
            <i class="fa-solid fa-book-medical text-lg"></i>
            <span class="text-[9px] uppercase font-bold mt-1">Study Material</span>
        </button>
        <button onclick="setTab('test')" class="flex flex-col items-center text-gray-500" id="admin-test">
            <i class="fa-solid fa-vial text-lg"></i>
            <span class="text-[9px] uppercase font-bold mt-1">Test Center</span>
        </button>
        <button onclick="setTab('mstore')" class="flex flex-col items-center text-gray-500" id="admin-mstore">
            <i class="fa-solid fa-boxes-stacked text-lg"></i>
            <span class="text-[9px] uppercase font-bold mt-1">Admin Store</span>
        </button>
    </div>
</body>
</html>
