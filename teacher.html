<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>mNeet Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b1120; color: white; font-family: sans-serif; }
        .card-navy { background-color: #16213e; border: 1px solid #1f2937; padding: 20px; border-radius: 20px; margin-bottom: 20px; }
        .input-navy { background-color: #1e293b; border: 1px solid #334155; color: white; width: 100%; padding: 12px; border-radius: 12px; margin-bottom: 10px; outline: none; }
        .tab-btn { flex: 1; padding: 15px; text-align: center; font-size: 10px; font-weight: bold; border-bottom: 2px solid #1f2937; }
        .active-tab { border-color: #eab308; color: #eab308; }
    </style>
</head>
<body class="p-4">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-xl font-bold text-[#eab308] italic">ADMIN PANEL</h1>
        <button onclick="logout()" class="bg-red-900/30 text-red-500 border border-red-900 px-3 py-1 rounded text-xs font-bold">LOGOUT</button>
    </div>

    <div class="flex mb-8">
        <button onclick="switchTab('courses')" id="t-courses" class="tab-btn active-tab uppercase">Courses</button>
        <button onclick="switchTab('payments')" id="t-payments" class="tab-btn uppercase">Payments</button>
        <button onclick="switchTab('students')" id="t-students" class="tab-btn uppercase">Students</button>
    </div>

    <div id="sec-courses" class="max-w-xl mx-auto">
        <div class="card-navy border-2 border-[#eab308]/20">
            <h2 id="formTitle" class="text-[#eab308] font-bold mb-4 uppercase text-xs">Create/Edit Course</h2>
            <input type="hidden" id="editId">
            <input type="text" id="cTitle" class="input-navy" placeholder="Course Title">
            <input type="number" id="cPrice" class="input-navy" placeholder="Price (₹)">
            <input type="text" id="cVideo" class="input-navy" placeholder="YouTube Video ID">
            <textarea id="cDesc" class="input-navy h-20" placeholder="Description"></textarea>
            <button onclick="saveCourse()" id="saveBtn" class="w-full bg-[#eab308] text-black py-3 rounded-xl font-bold uppercase text-xs">Publish Course</button>
        </div>
        <div id="courseList"></div>
    </div>

    <div id="sec-payments" class="max-w-xl mx-auto hidden">
        <h2 class="text-gray-500 uppercase text-[10px] mb-4">Pending Approvals</h2>
        <div id="reqList"></div>
    </div>

    <div id="sec-students" class="max-w-xl mx-auto hidden">
        <h2 class="text-gray-500 uppercase text-[10px] mb-4">Manage Students</h2>
        <div id="studentList"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
        import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

        const firebaseConfig = { /* Same as index.html */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.logout = () => signOut(auth).then(() => window.location.href="index.html");

        window.switchTab = (tab) => {
            ['courses', 'payments', 'students'].forEach(t => {
                document.getElementById('sec-'+t).classList.toggle('hidden', t !== tab);
                document.getElementById('t-'+t).classList.toggle('active-tab', t === tab);
            });
        };

        // --- COURSES ---
        window.saveCourse = async () => {
            const title = document.getElementById('cTitle').value;
            const price = document.getElementById('cPrice').value;
            const video = document.getElementById('cVideo').value;
            const desc = document.getElementById('cDesc').value;
            const eid = document.getElementById('editId').value;
            if(eid) { await updateDoc(doc(db, "courses", eid), {title, price, video, desc}); alert("Updated!"); }
            else { await addDoc(collection(db, "courses"), {title, price, video, desc, timestamp: new Date()}); alert("Added!"); }
            location.reload();
        };

        onSnapshot(collection(db, "courses"), (snap) => {
            const list = document.getElementById('courseList');
            list.innerHTML = "";
            snap.forEach(d => {
                const c = d.data();
                list.innerHTML += `<div class="card-navy flex justify-between items-center">
                    <div><b>${c.title}</b><p class="text-xs text-gold">₹${c.price}</p></div>
                    <div class="flex gap-2">
                        <button onclick="editC('${d.id}','${c.title}','${c.price}','${c.video||''}','${c.desc||''}')" class="text-blue-400 text-[10px] font-bold uppercase">Edit</button>
                        <button onclick="delC('${d.id}')" class="text-red-500 text-[10px] font-bold uppercase">Del</button>
                    </div>
                </div>`;
            });
        });
        window.editC = (id,t,p,v,d) => {
            document.getElementById('editId').value=id; document.getElementById('cTitle').value=t;
            document.getElementById('cPrice').value=p; document.getElementById('cVideo').value=v;
            document.getElementById('cDesc').value=d; document.getElementById('formTitle').innerText="Edit Course";
            window.scrollTo(0,0);
        };
        window.delC = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db, "courses", id)); };

        // --- PAYMENTS ---
        onSnapshot(collection(db, "requests"), (snap) => {
            const list = document.getElementById('reqList'); list.innerHTML = "";
            snap.forEach(d => { const r = d.data(); if(r.status==='pending') {
                list.innerHTML += `<div class="card-navy border-l-4 border-yellow-500">
                    <p class="text-xs text-gray-500">${r.email}</p><p class="font-bold">${r.courseTitle}</p>
                    <p class="text-gold font-mono text-xs mt-2">TRX: ${r.trxId}</p>
                    <button onclick="approve('${d.id}','${r.uid}')" class="w-full bg-green-600 py-2 rounded-xl mt-4 font-bold text-xs uppercase">Approve</button>
                </div>`;
            }});
        });
        window.approve = async (rid, uid) => { await updateDoc(doc(db, "requests", rid), {status:'approved'}); alert("Approved!"); };

        // --- STUDENTS ---
        onSnapshot(collection(db, "users"), (snap) => {
            const list = document.getElementById('studentList'); list.innerHTML = "";
            snap.forEach(d => { const s = d.data(); if(s.role !== 'admin') {
                list.innerHTML += `<div class="card-navy flex justify-between items-center">
                    <div><b>${s.name}</b><p class="text-[10px] text-gray-500">${s.city}</p></div>
                    <button onclick="toggleB('${d.id}',${s.isBlocked})" class="px-3 py-1 rounded text-[10px] font-bold ${s.isBlocked ? 'bg-green-600':'bg-red-900/30 text-red-500'}">${s.isBlocked ? 'UNBLOCK':'BLOCK'}</button>
                </div>`;
            }});
        });
        window.toggleB = async (id, status) => { await updateDoc(doc(db, "users", id), {isBlocked: !status}); };
    </script>
</body>
</html>
