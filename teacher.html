<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNEET Admin - Teacher Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#0a1128] text-white font-sans">

    <nav class="p-5 border-b border-gray-800 flex justify-between items-center bg-[#0a1128] sticky top-0 z-50">
        <h1 class="text-2xl font-bold text-[#d97706]">mNEET <span class="text-xs text-white">ADMIN</span></h1>
        <div class="bg-gray-800 px-3 py-1 rounded text-sm">Courses: <span id="courseCount">0</span></div>
    </nav>

    <div id="courseListPage" class="p-5 max-w-lg mx-auto">
        <button onclick="openModal()" class="w-full bg-[#d97706] text-[#0a1128] font-bold py-4 rounded-xl mb-8 shadow-lg">
            <i class="fas fa-plus-circle mr-2"></i> CREATE NEW COURSE
        </button>
        <h2 class="text-gray-400 uppercase text-xs font-bold mb-4 tracking-widest">Active Courses</h2>
        <div id="courseContainer" class="space-y-4"></div>
    </div>

    <div id="chapterPage" class="hidden p-5 max-w-lg mx-auto">
        <button onclick="showCourseList()" class="text-[#d97706] mb-4 flex items-center gap-2">
            <i class="fas fa-arrow-left"></i> Back to Courses
        </button>
        <h2 id="selectedCourseTitle" class="text-2xl font-bold mb-2 text-white"></h2>
        <p id="selectedCourseId" class="text-gray-500 text-xs mb-6 uppercase tracking-tighter"></p>
        
        <button onclick="openChapterModal()" class="w-full border-2 border-dashed border-gray-700 text-gray-400 py-4 rounded-xl mb-6 hover:border-[#d97706] hover:text-white transition">
            <i class="fas fa-plus mr-2"></i> Add New Chapter
        </button>

        <div id="chapterContainer" class="space-y-3">
            </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-6 z-[100]">
        <div class="bg-[#16213e] w-full max-w-md p-8 rounded-3xl border border-gray-700">
            <h2 id="modalTitle" class="text-xl font-bold mb-6 text-[#d97706]">New Course Info</h2>
            <input type="text" id="cTitle" placeholder="Name" class="w-full bg-[#0f172a] border border-gray-700 p-4 rounded-xl mb-4 text-white">
            <input type="number" id="cPrice" placeholder="Price (₹)" class="w-full bg-[#0f172a] border border-gray-700 p-4 rounded-xl mb-4 text-white">
            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 bg-gray-700 py-4 rounded-xl font-bold uppercase">Cancel</button>
                <button id="saveBtn" onclick="saveCourse()" class="flex-1 bg-[#d97706] text-[#0a1128] py-4 rounded-xl font-bold uppercase">Publish</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, onSnapshot, query, orderBy, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBisQytTeFhjMdlkTUNwcmCelPy7C9iI1Y",
            authDomain: "mneet-7699.firebaseapp.com",
            projectId: "mneet-7699",
            storageBucket: "mneet-7699.firebasestorage.app",
            messagingSenderId: "801664280357",
            appId: "1:801664280357:web:03da6173f29bedfeaa9ccc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentCourseDocId = "";

        // UI Controls
        window.openModal = () => document.getElementById('modal').classList.remove('hidden');
        window.closeModal = () => document.getElementById('modal').classList.add('hidden');
        
        window.showCourseList = () => {
            document.getElementById('courseListPage').classList.remove('hidden');
            document.getElementById('chapterPage').classList.add('hidden');
        };

        // --- Save Course ---
        window.saveCourse = async () => {
            const title = document.getElementById('cTitle').value;
            const price = document.getElementById('cPrice').value;
            if(!title || !price) return;
            const snapshot = await getDocs(collection(db, "courses"));
            await addDoc(collection(db, "courses"), {
                courseId: "Course " + (snapshot.size + 1),
                title, price, timestamp: new Date()
            });
            closeModal();
        };

        // --- Delete Course ---
        window.deleteCourse = async (id) => {
            if(confirm("Are you sure? All chapters inside will be lost!")) {
                await deleteDoc(doc(db, "courses", id));
            }
        };

        // --- Load Courses ---
        onSnapshot(query(collection(db, "courses"), orderBy("timestamp", "desc")), (snapshot) => {
            const container = document.getElementById('courseContainer');
            document.getElementById('courseCount').innerText = snapshot.size;
            container.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const card = document.createElement('div');
                card.className = "bg-[#16213e] p-5 rounded-2xl border border-gray-800 text-left relative shadow-lg cursor-pointer";
                card.innerHTML = `
                    <div onclick="openChapters('${doc.id}', '${data.title}')">
                        <div class="text-[#d97706] text-[10px] font-black uppercase mb-1">${data.courseId}</div>
                        <h3 class="text-xl font-bold">${data.title}</h3>
                        <p class="text-yellow-500 font-bold">₹${data.price}</p>
                    </div>
                    <button onclick="deleteCourse('${doc.id}')" class="absolute bottom-5 right-5 text-red-500 bg-red-500/10 p-2 rounded-lg">
                        <i class="fas fa-trash"></i>
                    </button>
                `;
                container.appendChild(card);
            });
        });

        // --- Chapter Management ---
        window.openChapters = (docId, title) => {
            currentCourseDocId = docId;
            document.getElementById('selectedCourseTitle').innerText = title;
            document.getElementById('selectedCourseId').innerText = "Course ID: " + docId;
            document.getElementById('courseListPage').classList.add('hidden');
            document.getElementById('chapterPage').classList.remove('hidden');
            loadChapters(docId);
        };

        window.openChapterModal = async () => {
            const name = prompt("Enter Chapter Name (e.g. Cell Structure):");
            if(!name) return;
            const snapshot = await getDocs(collection(db, `courses/${currentCourseDocId}/chapters`));
            await addDoc(collection(db, `courses/${currentCourseDocId}/chapters`), {
                name,
                order: snapshot.size + 1,
                timestamp: new Date()
            });
        };

        function loadChapters(courseId) {
            const container = document.getElementById('chapterContainer');
            onSnapshot(query(collection(db, `courses/${courseId}/chapters`), orderBy("order", "asc")), (snapshot) => {
                container.innerHTML = "";
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    container.innerHTML += `
                        <div class="bg-gray-800/50 p-4 rounded-xl flex justify-between items-center border border-gray-700">
                            <span class="font-bold text-gray-300">Chapter ${data.order}: ${data.name}</span>
                            <div class="flex gap-2">
                                <button class="text-blue-400 p-2"><i class="fas fa-chevron-right"></i></button>
                            </div>
                        </div>
                    `;
                });
            });
        }
    </script>
</body>
</html>
