<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style> body { background-color: #0b1120; color: white; padding-bottom: 90px; } .nav-btn { color: #6b7280; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; } .nav-active { color: #eab308 !important; } </style>
</head>
<body>
    <div class="p-6 bg-[#16213e] rounded-b-[2.5rem] shadow-2xl flex justify-between items-center border-b border-gray-800">
        <h1 class="text-2xl font-black text-[#eab308] italic">Admin Panel</h1>
        <button onclick="window.location.href='index.html'" class="text-red-500 text-2xl"><i class="fa-solid fa-power-off"></i></button>
    </div>
    <iframe id="adminFrame" src="admin_course.html" class="w-full h-[75vh] border-none"></iframe>
    <div class="fixed bottom-0 left-0 right-0 bg-[#16213e] border-t border-gray-800 flex h-20 z-50">
        <button onclick="nav('admin_course.html', 'c')" id="btn-c" class="nav-btn nav-active"><i class="fa-solid fa-layer-group text-xl"></i><span class="text-[9px] uppercase mt-1">Course</span></button>
        <button onclick="nav('admin_study.html', 's')" id="btn-s" class="nav-btn"><i class="fa-solid fa-book-medical text-xl"></i><span class="text-[9px] uppercase mt-1">Study</span></button>
        <button onclick="nav('test.html', 't')" id="btn-t" class="nav-btn"><i class="fa-solid fa-flask-vial text-xl"></i><span class="text-[9px] uppercase mt-1">Test</span></button>
        <button onclick="nav('mstore.html', 'm')" id="btn-m" class="nav-btn"><i class="fa-solid fa-shop text-xl"></i><span class="text-[9px] uppercase mt-1">mStore</span></button>
    </div>
    <script> function nav(f, id) { document.getElementById('adminFrame').src = f; document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active')); document.getElementById('btn-'+id).classList.add('nav-active'); } </script>
</body>
</html>
