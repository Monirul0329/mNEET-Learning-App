<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNEET Admin Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b1120; color: white; padding-bottom: 90px; }
        .nav-btn { color: #6b7280; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .nav-active { color: #eab308 !important; }
        .glass { background: rgba(22, 33, 62, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body>
    <div class="p-6 bg-[#16213e] rounded-b-[2.5rem] shadow-2xl border-b border-gray-800">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-black text-[#eab308] italic">mNEET <span class="not-italic text-xs text-white ml-1">ADMIN</span></h1>
            <button onclick="logout()" class="text-red-500"><i class="fa-solid fa-power-off"></i></button>
        </div>
        <div class="grid grid-cols-2 gap-4 text-center">
            <div class="bg-[#0b1120] p-3 rounded-2xl border border-gray-800">
                <p id="totalS" class="text-xl font-black text-gold">0</p>
                <p class="text-[8px] text-gray-500 uppercase font-bold">Users</p>
            </div>
            <div class="bg-[#0b1120] p-3 rounded-2xl border border-gray-800">
                <p id="pendingP" class="text-xl font-black text-white">0</p>
                <p class="text-[8px] text-gray-500 uppercase font-bold">Payments</p>
            </div>
        </div>
    </div>

    <iframe id="adminFrame" src="admin_course.html" class="w-full h-[60vh] border-none"></iframe>

    <div class="fixed bottom-0 left-0 right-0 glass border-t border-gray-800 flex h-20 z-50">
        <button onclick="nav('admin_course.html', 'course')" id="btn-course" class="nav-btn nav-active">
            <i class="fa-solid fa-layer-group text-xl"></i><span class="text-[9px] font-bold uppercase mt-1">Courses</span>
        </button>
        <button onclick="nav('admin_study.html', 'study')" id="btn-study" class="nav-btn">
            <i class="fa-solid fa-book-medical text-xl"></i><span class="text-[9px] font-bold uppercase mt-1">Study</span>
        </button>
        <button onclick="nav('admin_test.html', 'test')" id="btn-test" class="nav-btn">
            <i class="fa-solid fa-vial-circle-check text-xl"></i><span class="text-[9px] font-bold uppercase mt-1">Test</span>
        </button>
        <button onclick="nav('admin_mstore.html', 'mstore')" id="btn-mstore" class="nav-btn">
            <i class="fa-solid fa-boxes-packing text-xl"></i><span class="text-[9px] font-bold uppercase mt-1">mStore</span>
        </button>
    </div>

    <script>
        function nav(file, id) {
            document.getElementById('adminFrame').src = file;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            document.getElementById('btn-' + id).classList.add('nav-active');
        }
        function logout() { window.location.href = "index.html"; }
    </script>
</body>
</html>
