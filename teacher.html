<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>mNeet Admin - Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b1120; color: white; }
        .card { background-color: #16213e; padding: 20px; border-radius: 20px; margin-bottom: 20px; }
    </style>
</head>
<body class="p-6">
    <div class="flex justify-between items-center mb-10">
        <h1 class="text-2xl font-bold text-[#eab308]">ADMIN PANEL</h1>
        <button onclick="signOut(auth).then(()=>window.location.href='index.html')" class="bg-red-600 px-4 py-2 rounded-xl text-xs">LOGOUT</button>
    </div>

    <h2 class="text-gold font-bold mb-4">PAYMENT REQUESTS (TRX ID)</h2>
    <div id="reqList"></div>

    <h2 class="text-gold font-bold mt-10 mb-4">ALL STUDENTS</h2>
    <div id="studentList"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
        import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

        const firebaseConfig = { /* Sames as above */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Load Requests
        onSnapshot(collection(db, "requests"), (snap) => {
            const container = document.getElementById('reqList');
            container.innerHTML = "";
            snap.forEach(d => {
                const r = d.data();
                if(r.status === 'pending') {
                    container.innerHTML += `<div class="card border-l-4 border-yellow-500">
                        <p>${r.email} paid for ${r.courseTitle}</p>
                        <p class="text-gold font-bold">TRX ID: ${r.trxId}</p>
                        <button onclick="approve('${d.id}', '${r.uid}')" class="bg-green-600 px-3 py-1 rounded mt-2">APPROVE</button>
                    </div>`;
                }
            });
        });

        window.approve = async (rid, uid) => {
            await updateDoc(doc(db, "requests", rid), { status: 'approved' });
            await updateDoc(doc(db, "users", uid), { hasAccess: true });
            alert("Approved!");
        };

        // Load Students (Block/Unblock)
        onSnapshot(collection(db, "users"), (snap) => {
            const list = document.getElementById('studentList');
            list.innerHTML = "";
            snap.forEach(d => {
                const s = d.data();
                if(s.role === 'admin') return;
                list.innerHTML += `<div class="card flex justify-between items-center">
                    <div><b>${s.name}</b> (${s.city})</div>
                    <button onclick="toggleBlock('${d.id}', ${s.isBlocked})" class="bg-red-500 p-2 rounded text-xs">${s.isBlocked ? 'UNBLOCK' : 'BLOCK'}</button>
                </div>`;
            });
        });

        window.toggleBlock = async (id, status) => {
            await updateDoc(doc(db, "users", id), { isBlocked: !status });
        };
    </script>
</body>
</html>
