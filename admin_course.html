<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com/"></script>
</head>
<body class="bg-[#0b1120] p-6 text-white pb-32">
    
    <div class="bg-[#16213e] p-8 rounded-[2.5rem] border border-gray-800 shadow-2xl mb-12 max-w-lg mx-auto">
        <h2 class="text-[#eab308] text-[10px] font-black uppercase text-center mb-8 tracking-[0.3em] italic">mNEET Batch Publisher</h2>
        
        <input type="text" id="cTitle" placeholder="Batch Name (Physics, Bio etc.)" class="w-full bg-[#0b1120] p-4 rounded-2xl mb-3 border border-gray-700 outline-none focus:border-[#eab308]">
        <input type="text" id="cImg" placeholder="Thumbnail URL (Google theke chobir link)" class="w-full bg-[#0b1120] p-4 rounded-2xl mb-3 border border-gray-700 outline-none">
        <input type="number" id="cPrice" placeholder="Batch Price (₹)" class="w-full bg-[#0b1120] p-4 rounded-2xl mb-3 border border-gray-700 outline-none">
        <textarea id="cDesc" placeholder="Description..." class="w-full bg-[#0b1120] p-4 rounded-2xl mb-8 border border-gray-700 h-24 outline-none"></textarea>
        
        <button onclick="publish()" id="btn" class="w-full bg-[#eab308] text-black py-5 rounded-2xl font-black uppercase text-xs shadow-xl active:scale-95 transition-all">Publish Batch Now</button>
    </div>

    <div id="courseList" class="space-y-6 max-w-lg mx-auto"></div>

    <script>
        // Supabase Setup with Your Keys
        const SB_URL = 'https://aqosatoimyijcahpzauh.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFxb3NhdG9pbXlpamNhaHB6YXVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMzE5NDQsImV4cCI6MjA5MzcwNzk0NH0.F-CvTbRnr-2EI5UbvOycTMF_RR7xQCln0E95cwBUN6Y';

        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        async function publish() {
            const btn = document.getElementById('btn');
            const title = document.getElementById('cTitle').value;
            const price = document.getElementById('cPrice').value;
            const img = document.getElementById('cImg').value;

            if(!title || !price) return alert("Title and Price are required!");
            btn.innerText = "UPLOADING...";
            
            const { error } = await supabaseClient
                .from('courses')
                .insert([{ 
                    title: title,
                    price: parseInt(price),
                    img_url: img,
                    description: document.getElementById('cDesc').value
                }]);

            if (error) {
                alert("Error: " + error.message);
                btn.innerText = "RETRY";
            } else {
                alert("Batch Published Live! 🚀");
                location.reload();
            }
        }

        async function loadCourses() {
            const { data, error } = await supabaseClient.from('courses').select('*');
            if (data) {
                document.getElementById('courseList').innerHTML = data.map(c => `
                    <div class="bg-[#16213e] rounded-[2rem] overflow-hidden border border-gray-800 p-6 flex gap-4 items-center animate-fade-in">
                        <img src="${c.img_url || 'https://via.placeholder.com/150'}" class="w-20 h-20 rounded-2xl object-cover">
                        <div class="flex-1">
                            <h3 class="font-black italic uppercase text-sm">${c.title}</h3>
                            <p class="text-[#eab308] font-black italic">₹${c.price}</p>
                        </div>
                    </div>
                `).join('');
            }
        }
        loadCourses();
    </script>
</body>
</html>
