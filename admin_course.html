<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(22, 33, 62, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        .glass-input { background: #0b1120; border: 1px solid #1f2937; outline: none; transition: 0.3s; }
        .glass-input:focus { border-color: #eab308; }
        body { background: #070b14; color: white; font-family: sans-serif; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #eab308; border-radius: 10px; }
    </style>
</head>
<body class="p-4 pb-36">

    <!-- Top Bar -->
    <div class="flex justify-between items-center mb-6 px-1">
        <button onclick="history.back()" class="w-10 h-10 glass rounded-2xl flex items-center justify-center text-gray-400 active:scale-90">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
        <h2 class="text-xs font-black text-[#eab308] uppercase italic tracking-widest">Course Control</h2>
        <button onclick="logout()" class="w-10 h-10 bg-red-500/10 text-red-500 rounded-2xl flex items-center justify-center border border-red-500/20 active:scale-90">
            <i class="fa-solid fa-power-off"></i>
        </button>
    </div>

    <!-- Search Bar Row -->
    <div class="relative mb-8">
        <input type="text" id="courseSearch" oninput="searchBatch()" placeholder="Search Batches to Edit/Delete..." class="w-full glass p-5 rounded-2xl outline-none text-[11px] pl-12 border-none">
        <i class="fa-solid fa-magnifying-glass absolute left-5 top-5 text-gray-500"></i>
    </div>

    <div class="max-w-xl mx-auto">
        <!-- Create Form -->
        <div class="bg-[#16213e] p-8 rounded-[2.5rem] border border-gray-800 shadow-2xl mb-12">
            <h2 class="text-[9px] font-black uppercase text-gray-500 mb-6 text-center italic tracking-[0.3em]">Publish New Batch</h2>
            <div class="space-y-3">
                <input type="text" id="cTitle" placeholder="Batch Name" class="w-full glass-input p-4 rounded-2xl text-sm font-bold">
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="cPrice" placeholder="Price (₹)" class="w-full glass-input p-4 rounded-2xl text-sm">
                    <input type="number" id="cProg" placeholder="Initial %" class="w-full glass-input p-4 rounded-2xl text-sm">
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <input type="date" id="sDate" class="w-full glass-input p-4 rounded-2xl text-[9px] text-gray-400">
                    <input type="date" id="endDate" class="w-full glass-input p-4 rounded-2xl text-[9px] text-gray-400">
                    <input type="date" id="examDate" class="w-full glass-input p-4 rounded-2xl text-[9px] text-yellow-500">
                </div>
                <input type="text" id="cThumb" placeholder="Thumbnail URL" class="w-full glass-input p-4 rounded-2xl text-[10px]">
                <input type="text" id="cVideo" placeholder="Demo Video URL" class="w-full glass-input p-4 rounded-2xl text-[10px]">
                <textarea id="cDesc" placeholder="Description..." class="w-full glass-input p-4 rounded-2xl h-20 text-sm"></textarea>
                <button onclick="saveBatch()" id="publishBtn" class="w-full bg-[#eab308] text-black py-5 rounded-2xl font-black uppercase text-xs shadow-xl active:scale-95 transition-all">Publish Batch Now</button>
            </div>
        </div>

        <!-- Scrollable Batch List -->
        <h3 class="text-[10px] font-black uppercase text-gray-500 mb-6 px-2 italic">Created Batches</h3>
        <div id="batchList" class="space-y-6 overflow-y-auto"></div>
    </div>

    <!-- Navigation Bar -->
    <nav class="fixed bottom-6 left-6 right-6 glass p-4 rounded-full flex justify-around items-center z-50 shadow-2xl">
        <a href="admin_dashboard.html"><i class="fa-solid fa-house text-gray-600"></i></a>
        <a href="admin_study.html"><i class="fa-solid fa-book-open text-gray-600"></i></a>
        <i class="fa-solid fa-layer-group text-[#eab308]"></i>
        <a href="admin_test.html"><i class="fa-solid fa-pen-nib text-gray-600"></i></a>
        <a href="admin_mstore.html"><i class="fa-solid fa-store text-gray-600"></i></a>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58",
            authDomain: "mneet-spark.firebaseapp.com",
            projectId: "mneet-spark",
            databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com/",
            appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let allBatches = [];

        function saveBatch() {
            const data = {
                title: document.getElementById('cTitle').value,
                price: document.getElementById('cPrice').value,
                progress: document.getElementById('cProg').value || 0,
                startDate: document.getElementById('sDate').value,
                endDate: document.getElementById('endDate').value,
                examDate: document.getElementById('examDate').value,
                thumbnail: document.getElementById('cThumb').value,
                video: document.getElementById('cVideo').value,
                desc: document.getElementById('cDesc').value,
                isHidden: false
            };
            database.ref('courses').push(data).then(() => location.reload());
        }

        function loadBatches() {
            database.ref('courses').on('value', (snap) => {
                allBatches = [];
                snap.forEach(child => {
                    allBatches.push({ id: child.key, ...child.val() });
                });
                renderBatches(allBatches);
            });
        }

        function renderBatches(data) {
            const list = document.getElementById('batchList');
            list.innerHTML = data.map(b => `
                <div class="bg-[#16213e] rounded-[2.5rem] border ${b.isHidden ? 'border-red-900 opacity-50' : 'border-gray-800'} p-5 relative">
                    <div class="flex gap-4 items-center">
                        <img src="${b.thumbnail || 'https://via.placeholder.com/150'}" class="w-16 h-16 rounded-2xl object-cover border border-white/5">
                        <div class="flex-1">
                            <h3 class="font-black italic uppercase text-[11px] leading-tight">${b.title}</h3>
                            <p class="text-[#eab308] font-black text-sm">₹${b.price}</p>
                        </div>
                    </div>
                    <div class="flex gap-2 mt-4 pt-4 border-t border-white/5">
                        <button onclick="toggleHide('${b.id}', ${b.isHidden})" class="flex-1 bg-blue-600/10 text-blue-400 py-3 rounded-xl text-[9px] font-black uppercase border border-blue-500/10 active:scale-95 transition-all">Hide</button>
                        <button onclick="deleteBatch('${b.id}')" class="bg-red-600/10 text-red-500 px-5 py-3 rounded-xl text-[9px] border border-red-500/10 active:scale-95 transition-all"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function searchBatch() {
            const term = document.getElementById('courseSearch').value.toLowerCase();
            const filtered = allBatches.filter(b => b.title.toLowerCase().includes(term));
            renderBatches(filtered);
        }

        function toggleHide(id, status) { database.ref('courses/' + id).update({ isHidden: !status }); }
        function deleteBatch(id) { if(confirm("Delete Permanently?")) database.ref('courses/' + id).remove(); }
        function logout() { localStorage.clear(); window.location.href = 'index.html'; }

        loadBatches();
    </script>
</body>
</html>
