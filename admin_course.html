<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Firebase App & Database Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com/"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass-input { background: rgba(11, 17, 32, 0.7); border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .glass-input:focus { border-color: #eab308; outline: none; background: rgba(11, 17, 32, 0.9); }
    </style>
</head>
<body class="bg-[#0b1120] p-6 text-white pb-32">
    
    <div class="bg-[#16213e] p-8 rounded-[2.5rem] border border-gray-800 shadow-2xl mb-12 max-w-lg mx-auto">
        <h2 class="text-[#eab308] text-[10px] font-black uppercase text-center mb-8 tracking-[0.3em] italic">mNEET Batch Publisher</h2>
        
        <div class="space-y-4">
            <input type="text" id="cTitle" placeholder="Batch Name" class="w-full glass-input p-4 rounded-2xl">
            
            <div class="grid grid-cols-2 gap-3">
                <input type="text" id="cImg" placeholder="Thumbnail URL" class="w-full glass-input p-4 rounded-2xl text-[10px]">
                <input type="text" id="cVideo" placeholder="Promo Video URL" class="w-full glass-input p-4 rounded-2xl text-[10px]">
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="flex flex-col gap-1">
                    <label class="text-[8px] ml-2 text-gray-500 uppercase font-black">Start Date</label>
                    <input type="date" id="sDate" class="w-full glass-input p-4 rounded-2xl text-xs text-gray-400">
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-[8px] ml-2 text-gray-500 uppercase font-black">Exam Date</label>
                    <input type="date" id="eDate" class="w-full glass-input p-4 rounded-2xl text-xs text-gray-400">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <input type="number" id="cPrice" placeholder="Price (₹)" class="w-full glass-input p-4 rounded-2xl">
                <input type="number" id="cProg" placeholder="Initial %" class="w-full glass-input p-4 rounded-2xl">
            </div>

            <textarea id="cDesc" placeholder="Description..." class="w-full glass-input p-4 rounded-2xl h-20"></textarea>
            
            <button onclick="publish()" id="btn" class="w-full bg-[#eab308] text-black py-5 rounded-2xl font-black uppercase text-xs shadow-xl active:scale-95 transition-all">Publish Batch Now</button>
        </div>
    </div>

    <div id="courseList" class="space-y-6 max-w-lg mx-auto"></div>

    <script>
        // Config manually check
        const firebaseConfig = {
            apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58",
            authDomain: "mneet-spark.firebaseapp.com",
            projectId: "mneet-spark",
            databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com/",
            appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331"
        };

        // Initialize Firebase safely
        let database;
        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            database = firebase.database();
            console.log("Firebase Connected!");
        } catch (e) {
            console.error("Firebase Init Error:", e);
        }

        function publish() {
            const btn = document.getElementById('btn');
            const title = document.getElementById('cTitle').value;
            const price = document.getElementById('cPrice').value;

            if(!title || !price) return alert("Title and Price are required!");
            
            btn.innerText = "UPLOADING...";
            btn.disabled = true;

            const newBatch = {
                title: title,
                img: document.getElementById('cImg').value || "",
                video: document.getElementById('cVideo').value || "",
                startDate: document.getElementById('sDate').value || "",
                examDate: document.getElementById('eDate').value || "",
                price: price,
                progress: document.getElementById('cProg').value || 0,
                desc: document.getElementById('cDesc').value || "",
                isHidden: false,
                createdAt: Date.now()
            };

            database.ref('courses').push(newBatch)
                .then(() => {
                    alert("Batch Published! 🚀");
                    location.reload();
                })
                .catch(err => {
                    alert("Error: " + err.message);
                    btn.innerText = "RETRY";
                    btn.disabled = false;
                });
        }

        function loadCourses() {
            database.ref('courses').on('value', (snap) => {
                const list = document.getElementById('courseList');
                list.innerHTML = "";
                
                if (snap.exists()) {
                    snap.forEach((child) => {
                        const c = child.val();
                        const id = child.key;
                        
                        list.innerHTML += `
                            <div class="bg-[#16213e] rounded-[2rem] border ${c.isHidden ? 'border-red-900 opacity-60' : 'border-gray-800'} p-5">
                                <div class="flex gap-4 items-center mb-4">
                                    <img src="${c.img || 'https://via.placeholder.com/150'}" class="w-16 h-16 rounded-2xl object-cover">
                                    <div class="flex-1">
                                        <h3 class="font-black italic uppercase text-[11px]">${c.title}</h3>
                                        <p class="text-[#eab308] font-black text-sm">₹${c.price} <span class="text-gray-500 text-[8px] ml-2 uppercase">Exam: ${c.examDate || 'TBA'}</span></p>
                                    </div>
                                </div>
                                
                                <div class="flex gap-2 pt-3 border-t border-white/5">
                                    <button onclick="toggleHide('${id}', ${c.isHidden})" class="flex-1 bg-blue-600/10 text-blue-400 py-3 rounded-xl text-[9px] font-black uppercase border border-blue-500/10">
                                        ${c.isHidden ? 'Unhide' : 'Hide'}
                                    </button>
                                    <button onclick="deleteBatch('${id}')" class="bg-red-600/10 text-red-500 px-5 py-3 rounded-xl text-[9px] border border-red-500/10">
                                        <i class="fa-solid fa-trash"></i>
                                    </button>
                                </div>
                            </div>`;
                    });
                }
            });
        }

        function toggleHide(id, status) {
            database.ref('courses/' + id).update({ isHidden: !status });
        }

        function deleteBatch(id) {
            if(confirm("Permanently delete this batch?")) {
                database.ref('courses/' + id).remove();
            }
        }

        // Initialize display
        if (database) loadCourses();
    </script>
</body>
</html>
