<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#0b1120] p-6 text-white pb-32 font-sans">
    
    <div class="bg-[#16213e] p-8 rounded-[2.5rem] border border-gray-800 shadow-2xl mb-12">
        <h2 id="formTitle" class="text-gold text-[10px] font-black uppercase text-center mb-8 tracking-widest italic underline underline-offset-8">Course Factory</h2>
        
        <input type="hidden" id="editId">
        <input type="text" id="cTitle" placeholder="Course Name (e.g. NEET Biology 2026)" class="w-full bg-[#1e293b] p-4 rounded-xl mb-3 border border-gray-700 outline-none focus:border-gold">
        
        <div class="grid grid-cols-2 gap-3 mb-3">
            <input type="text" id="cImg" placeholder="Thumbnail URL" class="bg-[#1e293b] p-4 rounded-xl border border-gray-700 outline-none">
            <input type="text" id="cVid" placeholder="Intro Video Link/ID" class="bg-[#1e293b] p-4 rounded-xl border border-gray-700 outline-none">
        </div>
        
        <input type="number" id="cPrice" placeholder="Course Price (₹)" class="w-full bg-[#1e293b] p-4 rounded-xl mb-3 border border-gray-700 outline-none">
        
        <textarea id="cDesc" placeholder="Course Description (Ki ki pabe ai course-e...)" class="w-full bg-[#1e293b] p-4 rounded-xl mb-6 border border-gray-700 h-24 outline-none resize-none"></textarea>
        
        <button onclick="saveCourse()" id="saveBtn" class="w-full bg-[#eab308] text-black py-5 rounded-2xl font-black uppercase text-xs shadow-xl active:scale-95 transition-all">Publish Live Course</button>
    </div>

    <div id="courseList" class="grid grid-cols-1 gap-8"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBisQytTeFhjMd1kTUNwcmCelPy7C0ilIY", authDomain: "mneet-7699.firebaseapp.com", projectId: "mneet-7699", storageBucket: "mneet-7699.firebasestorage.app", messagingSenderId: "801664280357", appId: "1:801664280357:web:03da6173f29bedfeaa9ccc" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);

        window.saveCourse = async () => {
            const data = { 
                title: document.getElementById('cTitle').value, 
                img: document.getElementById('cImg').value, 
                vid: document.getElementById('cVid').value,
                price: document.getElementById('cPrice').value,
                desc: document.getElementById('cDesc').value,
                isHidden: false 
            };
            const eid = document.getElementById('editId').value;
            if(!data.title || !data.price) return alert("Title and Price are mandatory!");

            if(eid) await updateDoc(doc(db, "courses", eid), data);
            else await addDoc(collection(db, "courses"), data);
            location.reload();
        };

        onSnapshot(collection(db, "courses"), (snap) => {
            const list = document.getElementById('courseList'); list.innerHTML = "";
            snap.forEach(d => {
                const c = d.data();
                list.innerHTML += `
                <div class="bg-[#16213e] rounded-[3rem] overflow-hidden border border-gray-800 shadow-2xl relative">
                    <img src="${c.img || 'https://via.placeholder.com/400x200'}" class="w-full h-52 object-cover ${c.isHidden ? 'opacity-20 grayscale' : 'opacity-60'}">
                    <div class="p-8">
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="text-2xl font-black italic uppercase leading-none">${c.title}</h3>
                            <span class="text-gold font-black text-xl italic">₹${c.price}</span>
                        </div>
                        <p class="text-gray-500 text-[10px] mb-8 line-clamp-2 uppercase font-bold tracking-wider">${c.desc || 'No description added'}</p>
                        
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="editC('${d.id}','${c.title}','${c.img}','${c.vid}','${c.price}','${c.desc.replace(/'/g, "\\'")}')" class="bg-white/5 py-4 rounded-xl font-black text-[8px] uppercase border border-white/10 hover:bg-white/10 transition-all">Edit</button>
                            <button onclick="toggleHide('${d.id}', ${c.isHidden})" class="bg-blue-500/10 py-4 rounded-xl font-black text-[8px] uppercase border border-blue-500/20 text-blue-400 hover:bg-blue-500/20">${c.isHidden ? 'Show' : 'Hide'}</button>
                            <button onclick="delC('${d.id}')" class="bg-red-500/10 py-4 rounded-xl font-black text-[8px] uppercase border border-red-500/20 text-red-500 hover:bg-red-500/20">Delete</button>
                        </div>
                    </div>
                </div>`;
            });
        });

        window.delC = async (id) => { if(confirm("Permanently delete this course?")) await deleteDoc(doc(db, "courses", id)); };
        window.toggleHide = async (id, status) => { await updateDoc(doc(db, "courses", id), { isHidden: !status }); };
        window.editC = (id,t,i,v,p,d) => {
            document.getElementById('editId').value=id; document.getElementById('cTitle').value=t;
            document.getElementById('cImg').value=i; document.getElementById('cVid').value=v;
            document.getElementById('cPrice').value=p; document.getElementById('cDesc').value=d;
            document.getElementById('saveBtn').innerText="Update & Sync"; window.scrollTo(0,0);
        };
    </script>
</body>
</html>
