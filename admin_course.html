<script>
    // ... (Firebase Config same as above)
    function saveBatch() {
        const btn = document.getElementById('publishBtn');
        const data = {
            title: document.getElementById('cTitle').value,
            price: document.getElementById('cPrice').value,
            progress: document.getElementById('cProg').value || 0,
            startDate: document.getElementById('sDate').value,
            endDate: document.getElementById('endDate').value,
            examDate: document.getElementById('examDate').value,
            thumbnail: document.getElementById('cThumb').value,
            video: document.getElementById('cVideo').value,
            desc: document.getElementById('cDesc').value,
            isHidden: false,
            timestamp: Date.now()
        };

        if(!data.title || !data.price) return alert("Batch Name & Price is required!");
        
        btn.innerText = "Publishing...";
        btn.disabled = true;

        database.ref('courses').push(data).then(() => {
            alert("Batch Published Successfully!");
            btn.innerText = "Publish New Batch";
            btn.disabled = false;
            // Clear inputs
            document.querySelectorAll('input, textarea').forEach(i => i.value = "");
        });
    }
    // ... loadBatches and other functions remain same but with better error handling
</script>
