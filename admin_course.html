<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com/"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#0b1120] p-6 text-white pb-32">
    
    <div class="bg-[#16213e] p-8 rounded-[2.5rem] border border-gray-800 shadow-2xl mb-12 max-w-lg mx-auto">
        <h2 class="text-[#eab308] text-[10px] font-black uppercase text-center mb-8 tracking-[0.3em] italic">mNEET Batch Publisher</h2>
        
        <div class="space-y-3">
            <input type="text" id="cTitle" placeholder="Batch Name (Physics, Bio etc.)" class="w-full bg-[#0b1120] p-4 rounded-2xl border border-gray-700 outline-none focus:border-[#eab308]">
            <input type="text" id="cImg" placeholder="Thumbnail URL" class="w-full bg-[#0b1120] p-4 rounded-2xl border border-gray-700 outline-none">
            <input type="text" id="cVideo" placeholder="Promo Video URL" class="w-full bg-[#0b1120] p-4 rounded-2xl border border-gray-700 outline-none">
            
            <div class="grid grid-cols-2 gap-2">
                <input type="date" id="sDate" class="w-full bg-[#0b1120] p-4 rounded-2xl border border-gray-700 text-xs text-gray-400">
                <input type="date" id="eDate" class="w-full bg-[#0b1120] p-4 rounded-2xl border border-gray-700 text-xs text-gray-400">
            </div>

            <div class="grid grid-cols-2 gap-2">
                <input type="number" id="cPrice" placeholder="Batch Price (₹)" class="w-full bg-[#0b1120] p-4 rounded-2xl border border-gray-700 outline-none">
                <input type="number" id="cProg" placeholder="Initial %" class="w-full bg-[#0b1120] p-4 rounded-2xl border border-gray-700 outline-none">
            </div>

            <textarea id="cDesc" placeholder="Description..." class="w-full bg-[#0b1120] p-4 rounded-2xl border border-gray-700 h-24 outline-none"></textarea>
            
            <button onclick="publish()" id="btn" class="w-full bg-[#eab308] text-black py-5 rounded-2xl font-black uppercase text-xs shadow-xl active:scale-95 transition-all">Publish Batch Now</button>
        </div>
    </div>

    <div id="courseList" class="space-y-6 max-w-lg mx-auto"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58",
            authDomain: "mneet-spark.firebaseapp.com",
            projectId: "mneet-spark",
            databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com/",
            appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function publish() {
            const btn = document.getElementById('btn');
            const data = {
                title: document.getElementById('cTitle').value,
                img: document.getElementById('cImg').value,
                video: document.getElementById('cVideo').value,
                startDate: document.getElementById('sDate').value,
                examDate: document.getElementById('eDate').value,
                price: document.getElementById('cPrice').value,
                progress: document.getElementById('cProg').value || 0,
                desc: document.getElementById('cDesc').value,
                isHidden: false
            };

            if(!data.title || !data.price) return alert("Fill Name and Price!");
            btn.innerText = "UPLOADING...";

            database.ref('courses').push(data).then(() => {
                alert("Batch Published! 🚀");
                location.reload();
            });
        }

        function loadCourses() {
            database.ref('courses').on('value', (snap) => {
                const list = document.getElementById('courseList');
                list.innerHTML = "";
                snap.forEach((child) => {
                    const c = child.val();
                    const id = child.key;
                    list.innerHTML += `
                        <div class="bg-[#16213e] rounded-[2rem] border ${c.isHidden ? 'border-red-900 opacity-50' : 'border-gray-800'} p-5 flex gap-4 items-center">
                            <img src="${c.img || 'https://via.placeholder.com/150'}" class="w-20 h-20 rounded-2xl object-cover">
                            <div class="flex-1">
                                <h3 class="font-black italic uppercase text-sm">${c.title}</h3>
                                <p class="text-[#eab308] font-black italic">₹${c.price}</p>
                                <div class="flex gap-2 mt-2">
                                    <button onclick="toggleHide('${id}', ${c.isHidden})" class="text-[8px] bg-blue-600 px-2 py-1 rounded uppercase font-black">${c.isHidden ? 'Unhide' : 'Hide'}</button>
                                    <button onclick="deleteBatch('${id}')" class="text-[8px] bg-red-600 px-2 py-1 rounded uppercase font-black text-white">Delete</button>
                                </div>
                            </div>
                        </div>`;
                });
            });
        }

        function toggleHide(id, status) { database.ref('courses/' + id).update({ isHidden: !status }); }
        function deleteBatch(id) { if(confirm("Delete Batch?")) database.ref('courses/' + id).remove(); }
        loadCourses();
    </script>
</body>
</html>
