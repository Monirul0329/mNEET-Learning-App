<!DOCTYPE html>
<html lang="en">
<head><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-[#0b1120] p-6 text-white">
    <div class="bg-[#16213e] p-6 rounded-3xl border border-gray-800">
        <h2 class="text-gold text-[10px] font-black uppercase mb-6 tracking-widest text-center">Course Management</h2>
        <input type="text" id="cTitle" placeholder="Course Name" class="w-full bg-[#1e293b] p-4 rounded-xl mb-3 border border-gray-700 text-white outline-none">
        <input type="text" id="cImg" placeholder="Course Image URL (Thumbnail)" class="w-full bg-[#1e293b] p-4 rounded-xl mb-3 border border-gray-700 text-white outline-none">
        <input type="number" id="cPrice" placeholder="Price (₹)" class="w-full bg-[#1e293b] p-4 rounded-xl mb-3 border border-gray-700 text-white outline-none">
        <textarea id="cDesc" placeholder="Course Description..." class="w-full bg-[#1e293b] p-4 rounded-xl mb-6 border border-gray-700 text-white outline-none h-24"></textarea>
        <button onclick="saveC()" class="w-full bg-gold text-black py-4 rounded-xl font-black uppercase text-xs">Publish Course</button>
    </div>

    <div id="courseList" class="mt-10 space-y-4"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
        const firebaseConfig = { apiKey: "AIzaSyBisQytTeFhjMd1kTUNwcmCelPy7C0ilIY", authDomain: "mneet-7699.firebaseapp.com", projectId: "mneet-7699", storageBucket: "mneet-7699.firebasestorage.app", messagingSenderId: "801664280357", appId: "1:801664280357:web:03da6173f29bedfeaa9ccc" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);

        window.saveC = async () => {
            const title = document.getElementById('cTitle').value;
            const img = document.getElementById('cImg').value;
            const price = document.getElementById('cPrice').value;
            const desc = document.getElementById('cDesc').value;
            if(!title || !price) return alert("Fields Required!");
            await addDoc(collection(db, "courses"), { title, img, price, desc, timestamp: new Date() });
            alert("Published!"); location.reload();
        };

        onSnapshot(collection(db, "courses"), (snap) => {
            const list = document.getElementById('courseList'); list.innerHTML = "";
            snap.forEach(d => {
                const c = d.data();
                list.innerHTML += `<div class="bg-[#16213e] p-4 rounded-2xl flex justify-between items-center border border-gray-800">
                    <img src="${c.img || 'https://via.placeholder.com/100'}" class="w-12 h-12 rounded-lg object-cover">
                    <div class="flex-1 ml-4"><p class="font-bold text-sm">${c.title}</p><p class="text-gold text-xs">₹${c.price}</p></div>
                    <button onclick="deleteDoc(doc(db, 'courses', '${d.id}'))" class="text-red-500 font-bold text-xs">DELETE</button>
                </div>`;
            });
        });
    </script>
</body>
</html>
