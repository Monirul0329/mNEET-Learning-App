<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#0b1120] p-6 text-white pb-32 font-sans">
    
    <div class="bg-[#16213e] p-8 rounded-[2.5rem] border border-gray-800 shadow-2xl mb-12">
        <h2 class="text-gold text-[10px] font-black uppercase text-center mb-8 tracking-[0.3em] italic">Course Publisher</h2>
        
        <label class="block text-[9px] font-black text-gray-500 uppercase mb-2 ml-1">Upload Thumbnail (Gallery)</label>
        <input type="file" id="imgFile" accept="image/*" class="w-full bg-[#0b1120] p-4 rounded-2xl border border-gray-700 text-xs mb-4">

        <input type="text" id="cTitle" placeholder="Course Title" class="w-full bg-[#1e293b] p-4 rounded-2xl mb-3 border border-gray-700 outline-none focus:border-gold">
        <input type="text" id="cVid" placeholder="Google Drive Intro Link" class="w-full bg-[#1e293b] p-4 rounded-2xl mb-3 border border-gray-700 outline-none">
        <input type="number" id="cPrice" placeholder="Price (₹)" class="w-full bg-[#1e293b] p-4 rounded-2xl mb-3 border border-gray-700 outline-none">
        <textarea id="cDesc" placeholder="Course Description..." class="w-full bg-[#1e293b] p-4 rounded-2xl mb-8 border border-gray-700 h-24 outline-none"></textarea>
        
        <button onclick="publishCourse()" id="saveBtn" class="w-full bg-[#eab308] text-[#0b1120] py-5 rounded-[1.5rem] font-black uppercase text-xs shadow-xl active:scale-95 transition-all">
            <span id="btnText">Publish Batch</span>
        </button>
    </div>

    <div id="courseList" class="space-y-8"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-storage.js";

        const firebaseConfig = { apiKey: "AIzaSyBisQytTeFhjMd1kTUNwcmCelPy7C0ilIY", authDomain: "mneet-7699.firebaseapp.com", projectId: "mneet-7699", storageBucket: "mneet-7699.firebasestorage.app", messagingSenderId: "801664280357", appId: "1:801664280357:web:03da6173f29bedfeaa9ccc" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        window.publishCourse = async () => {
            const file = document.getElementById('imgFile').files[0];
            const title = document.getElementById('cTitle').value;
            const btn = document.getElementById('btnText');

            if(!file || !title) return alert("Select Image & Enter Title!");
            btn.innerText = "UPLOADING...";

            try {
                const sRef = ref(storage, 'courses/' + Date.now() + "_" + file.name);
                await uploadBytes(sRef, file);
                const url = await getDownloadURL(sRef);

                await addDoc(collection(db, "courses"), {
                    title, img: url, vid: document.getElementById('cVid').value,
                    price: document.getElementById('cPrice').value,
                    desc: document.getElementById('cDesc').value,
                    timestamp: new Date()
                });
                alert("Batch Live! 🚀"); location.reload();
            } catch(e) { alert(e.message); btn.innerText = "RETRY"; }
        };

        onSnapshot(collection(db, "courses"), (snap) => {
            const list = document.getElementById('courseList'); list.innerHTML = "";
            snap.forEach(d => {
                const c = d.data();
                list.innerHTML += `
                <div class="bg-[#16213e] rounded-[3rem] overflow-hidden border border-gray-800 shadow-2xl relative">
                    <img src="${c.img}" class="w-full h-56 object-cover opacity-60">
                    <div class="p-8">
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="text-2xl font-black italic uppercase">${c.title}</h3>
                            <span class="text-gold font-black text-xl italic">₹${c.price}</span>
                        </div>
                        <p class="text-gray-500 text-[10px] uppercase font-bold mb-6">${c.desc}</p>
                        <button onclick="deleteDoc(doc(db, 'courses', '${d.id}'))" class="bg-red-500/10 w-full py-4 rounded-2xl text-red-500 font-black uppercase text-[9px] border border-red-500/20">Remove Batch</button>
                    </div>
                </div>`;
            });
        });
    </script>
</body>
</html>
