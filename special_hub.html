<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(22, 33, 62, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        body { background: #070b14; color: white; font-family: sans-serif; min-height: 100vh; }
        .material-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .material-card:active { transform: scale(0.97); opacity: 0.8; }
        .red-glow { color: #ef4444; text-shadow: 0 0 10px rgba(239, 68, 68, 0.4); }
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="p-4 pb-32">

    <div class="flex justify-between items-center mb-8 px-1 mt-2">
        <div class="flex items-center gap-4">
            <button onclick="history.back()" class="w-10 h-10 glass rounded-2xl flex items-center justify-center text-gray-400 active:scale-90 transition-all">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <div>
                <h1 class="text-xl font-black italic red-glow uppercase tracking-tighter">SPECIAL HUB</h1>
                <p class="text-[7px] text-gray-500 uppercase font-bold mt-0.5 tracking-widest">Premium Study Resources</p>
            </div>
        </div>
        <div class="w-10"></div>
    </div>

    <div class="space-y-1" id="specialMaterials">
        <div class="py-20 text-center">
            <i class="fa-solid fa-circle-notch animate-spin text-red-500 mb-3 text-lg"></i>
            <p class="text-[9px] text-gray-600 uppercase font-black tracking-widest">Syncing Materials Hub...</p>
        </div>
    </div>

    <nav class="fixed bottom-6 left-6 right-6 glass p-4 rounded-full flex justify-around items-center shadow-2xl border-white/10 z-50">
        <a href="dashboard.html"><i class="fa-solid fa-house text-gray-600"></i></a>
        <a href="study_zone.html"><i class="fa-solid fa-book-open text-gray-600"></i></a>
        <a href="all_batches.html"><div class="bg-blue-600 w-11 h-11 rounded-full flex items-center justify-center -mt-8 border-4 border-[#070b14] shadow-xl"><i class="fa-solid fa-layer-group text-white text-lg"></i></div></a>
        <a href="test.html"><i class="fa-solid fa-pen-nib text-gray-600"></i></a>
        <a href="mstore.html"><i class="fa-solid fa-store text-gray-600"></i></a>
    </nav>

    <script>
        // Real-time Database Config Initialization
        const firebaseConfig = { 
            apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58", 
            authDomain: "mneet-spark.firebaseapp.com", 
            projectId: "mneet-spark", 
            databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com/", 
            appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331" 
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const batchId = localStorage.getItem('selectedBatchId');

        function loadSpecialMaterials() {
            // Safety connection fallback logic
            if (!batchId) {
                alert("Session Expired! Please select a batch.");
                window.location.href = 'all_batches.html';
                return;
            }

            // Real-time listener initialization 
            database.ref(`courses/${batchId}/special`).on('value', snap => {
                const list = document.getElementById('specialMaterials');
                list.innerHTML = "";
                
                if (!snap.exists()) {
                    list.innerHTML = `
                        <div class="text-center py-20 bg-white/5 rounded-[2.5rem] border border-dashed border-white/10 p-6">
                            <i class="fa-solid fa-folder-open text-gray-700 text-xl mb-2"></i>
                            <p class="text-[9px] text-gray-500 font-black uppercase tracking-wider">No Special Materials Uploaded Yet</p>
                        </div>`;
                    return;
                }

                snap.forEach(child => {
                    const s = child.val();
                    
                    // Hide handling logic: Admin jodi module back-end lock/hide rakhe, student deck automatic block thakbe
                    if (s.isHidden) return;

                    list.innerHTML += `
                        <div class="glass p-5 rounded-[2.5rem] flex justify-between items-center border border-white/5 mb-4 material-card shadow-md">
                            <div class="flex items-center gap-4 flex-1 pr-2">
                                <div class="w-11 h-11 rounded-2xl bg-red-500/10 flex items-center justify-center text-red-500 shadow-inner">
                                    <i class="fa-solid fa-file-pdf"></i>
                                </div>
                                <div class="truncate">
                                    <h4 class="text-xs font-black uppercase italic tracking-wide text-white truncate">${s.topic || 'Untitled Resource'}</h4>
                                    <p class="text-[7px] text-gray-500 uppercase font-bold mt-0.5">Premium Study Sheet</p>
                                </div>
                            </div>
                            <a href="${s.url}" target="_blank" class="w-9 h-9 glass rounded-full flex items-center justify-center text-gray-400 hover:text-red-500 hover:border-red-500/30 transition-all active:scale-75">
                                <i class="fa-solid fa-download text-xs"></i>
                            </a>
                        </div>`;
                });
            });
        }

        // Initialize execution on content render
        loadSpecialMaterials();
    </script>
</body>
</html>
