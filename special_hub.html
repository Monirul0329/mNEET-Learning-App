<script>
    // ... Firebase Init
    const batchId = localStorage.getItem('selectedBatchId');
    database.ref(`courses/${batchId}/special`).on('value', snap => {
        const list = document.getElementById('specialMaterials');
        list.innerHTML = "";
        snap.forEach(child => {
            const s = child.val();
            list.innerHTML += `
                <div class="glass p-5 rounded-[2rem] flex justify-between items-center border border-white/5 mb-4">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-xl bg-red-500/10 flex items-center justify-center text-red-500"><i class="fa-solid fa-file-pdf"></i></div>
                        <div><h4 class="text-[10px] font-black uppercase italic">${s.topic}</h4></div>
                    </div>
                    <a href="${s.url}" class="w-8 h-8 glass rounded-full flex items-center justify-center text-gray-400"><i class="fa-solid fa-download text-[10px]"></i></a>
                </div>`;
        });
    });
</script>
