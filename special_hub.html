<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(22, 33, 62, 0.75); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        .gold-glow { color: #eab308; text-shadow: 0 0 10px rgba(234, 179, 8, 0.4); }
        body { background: #070b14; color: white; }
    </style>
</head>
<body class="p-4 pb-28">

    <div class="flex justify-between items-center mb-8 px-1">
        <div class="flex items-center gap-4">
            <button onclick="history.back()" class="w-10 h-10 glass rounded-2xl flex items-center justify-center text-gray-400 active:scale-90 transition-all"><i class="fa-solid fa-chevron-left"></i></button>
            <h1 class="text-sm font-black italic uppercase text-red-500 tracking-tighter">SPECIAL HUB</h1>
        </div>
        <div class="bg-yellow-500/10 px-3 py-1.5 rounded-full border border-yellow-500/20 text-xs font-black">🪙 <span id="uCoins">0</span></div>
    </div>

    <div class="glass p-5 rounded-3xl mb-8 border-b-2 border-red-500/30">
        <div class="flex justify-between items-center mb-2">
            <span class="text-[9px] font-black uppercase text-gray-500 italic">Material Mastery</span>
            <span class="text-[10px] font-black text-red-500">20%</span>
        </div>
        <div class="w-full bg-white/5 h-1 rounded-full overflow-hidden">
            <div class="bg-red-500 h-full" style="width: 20%"></div>
        </div>
    </div>

    <div id="specialMaterials" class="space-y-4">
        <div class="glass p-5 rounded-[2rem] flex justify-between items-center border border-white/5">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-xl bg-red-500/10 flex items-center justify-center text-red-500"><i class="fa-solid fa-file-zipper"></i></div>
                <div>
                    <h4 class="text-[10px] font-black uppercase italic italic">Bio Mindmaps (Unit 01)</h4>
                    <p class="text-[7px] text-gray-500 font-bold uppercase mt-1">Exclusive for Pro Students</p>
                </div>
            </div>
            <a href="#" class="w-8 h-8 glass rounded-full flex items-center justify-center text-gray-400"><i class="fa-solid fa-download text-[10px]"></i></a>
        </div>
    </div>

    <script>
        // Use existing Firebase Syncing logic for uCoins and Materials
    </script>
</body>
</html>
