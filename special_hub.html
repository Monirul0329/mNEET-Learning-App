<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(22, 33, 62, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        body { background: #070b14; color: white; font-family: sans-serif; min-height: 100vh; }
        .red-glow { color: #ef4444; text-shadow: 0 0 10px rgba(239, 68, 68, 0.4); }
    </style>
</head>
<body class="p-4 pb-32">

    <div class="flex justify-between items-center mb-8 px-1 mt-2">
        <div class="flex items-center gap-4">
            <button onclick="history.back()" class="w-10 h-10 glass rounded-2xl flex items-center justify-center text-gray-400"><i class="fa-solid fa-chevron-left"></i></button>
            <div>
                <h1 class="text-xl font-black italic red-glow uppercase tracking-tighter">SPECIAL HUB</h1>
                <p class="text-[7px] text-gray-500 uppercase font-bold tracking-widest mt-0.5">Premium Study Resources</p>
            </div>
        </div>
    </div>

    <div class="space-y-1" id="specialMaterials">
        <p class="text-center py-10 text-xs text-gray-500">Syncing materials...</p>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58", authDomain: "mneet-spark.firebaseapp.com", projectId: "mneet-spark", databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com/", appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const batchId = localStorage.getItem('selectedBatchId');

        if(batchId) {
            database.ref(`courses/${batchId}/special`).on('value', snap => {
                const list = document.getElementById('specialMaterials'); list.innerHTML = "";
                if(!snap.exists()) { list.innerHTML = '<p class="text-center text-xs text-gray-500 py-10">No Materials Yet</p>'; return; }
                snap.forEach(child => {
                    const s = child.val(); if(s.isHidden) return;
                    list.innerHTML += `
                        <div class="glass p-5 rounded-[2.5rem] flex justify-between items-center border border-white/5 mb-4">
                            <div class="flex items-center gap-4 flex-1 truncate">
                                <div class="w-11 h-11 rounded-2xl bg-red-500/10 flex items-center justify-center text-red-500"><i class="fa-solid fa-file-pdf"></i></div>
                                <div class="truncate"><h4 class="text-xs font-black uppercase italic tracking-wide text-white truncate">${s.topic}</h4></div>
                            </div>
                            <a href="${s.url}" target="_blank" class="w-9 h-9 glass rounded-full flex items-center justify-center text-gray-400"><i class="fa-solid fa-download text-xs"></i></a>
                        </div>`;
                });
            });
        }
    </script>
</body>
</html>
