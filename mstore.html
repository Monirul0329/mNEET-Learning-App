<script>
    const firebaseConfig = { apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58", authDomain: "mneet-spark.firebaseapp.com", projectId: "mneet-spark", databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com/", appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const userKey = localStorage.getItem('mUserEmail');

    function loadStore() {
        if(!userKey) window.location.href = 'index.html';
        // Sync Coins & Address
        database.ref('users/' + userKey).on('value', (s) => {
            const d = s.val() || {};
            document.getElementById('uCoins').innerText = d.coins || 0;
            if(d.address) document.getElementById('uAddr').value = d.address;
        });
        // Correct path for universal store products
        database.ref('mstore/products').on('value', (snap) => {
            const list = document.getElementById('productList');
            list.innerHTML = "";
            snap.forEach(child => {
                const p = child.val();
                list.innerHTML += `
                    <div class="glass p-4 rounded-[2rem] product-card border border-white/5">
                        <img src="${p.img}" class="w-full h-32 object-cover rounded-2xl mb-4 bg-black/20">
                        <h4 class="text-[10px] font-black uppercase italic leading-tight">${p.name}</h4>
                        <div class="flex items-center gap-2 mt-2 mb-4">
                            <span class="text-sm font-black text-[#eab308]">₹${p.price}</span>
                            <span class="text-[8px] text-gray-500 line-through">₹${p.mrp || p.oldPrice}</span>
                        </div>
                        <button onclick="buyNow('${child.key}', '${p.name}', ${p.price})" class="w-full bg-white text-black py-3 rounded-xl font-black uppercase text-[9px]">Buy Now</button>
                    </div>`;
            });
        });
    }
    loadStore();
                </script>
