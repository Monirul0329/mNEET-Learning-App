<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(22, 33, 62, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        body { background: #070b14; color: white; font-family: sans-serif; min-height: 100vh; }
        .green-glow { color: #22c55e; text-shadow: 0 0 10px rgba(34, 197, 94, 0.4); }
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="p-4 pb-32">

    <div class="flex justify-between items-center mb-8 px-1 mt-2">
        <div class="flex items-center gap-4">
            <button onclick="location.href='dashboard.html'" class="w-10 h-10 glass rounded-2xl flex items-center justify-center text-gray-400 active:scale-90 transition-all"><i class="fa-solid fa-chevron-left"></i></button>
            <div>
                <h1 class="text-xl font-black italic green-glow uppercase tracking-tighter">M-STORE</h1>
                <p class="text-[7px] text-gray-500 uppercase font-bold tracking-widest mt-0.5">Unlock Premium Rewards Store</p>
            </div>
        </div>
        <div class="bg-yellow-500/10 px-4 py-2 rounded-full text-[10px] font-black italic border border-yellow-500/20">
            🪙 <span id="storeVaultBalance">0</span>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4" id="storeItemsGrid">
        <div class="col-span-2 text-center py-20 text-gray-600 text-[10px] font-black uppercase tracking-widest">
            <i class="fa-solid fa-circle-notch animate-spin text-green-500 mr-2"></i> Initializing Rewards Vault...
        </div>
    </div>

    <nav class="fixed bottom-6 left-6 right-6 glass p-4 rounded-full flex justify-around items-center shadow-2xl border-white/10 z-50">
        <a href="dashboard.html"><i class="fa-solid fa-house text-gray-600"></i></a>
        <a href="study_zone.html"><i class="fa-solid fa-book-open text-gray-600"></i></a>
        <a href="all_batches.html"><div class="bg-blue-600 w-11 h-11 rounded-full flex items-center justify-center -mt-8 border-4 border-[#070b14] shadow-xl"><i class="fa-solid fa-layer-group text-white text-lg"></i></div></a>
        <a href="test.html"><i class="fa-solid fa-pen-nib text-gray-600"></i></a>
        <i class="fa-solid fa-store text-[#22c55e] green-glow"></i>
    </nav>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58", authDomain: "mneet-spark.firebaseapp.com", projectId: "mneet-spark", databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com/", appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331" };
        firebase.initializeApp(firebaseConfig); const database = firebase.database();
        
        const userEmail = localStorage.getItem('mUserEmail');
        let currentCoins = 0;

        function initStoreEngine() {
            if (userEmail) {
                const safeEmail = userEmail.replace(/\./g, ',');
                
                // Track User Vault Balance
                database.ref(`users/${safeEmail}/coins`).on('value', snap => {
                    currentCoins = snap.val() || 0;
                    document.getElementById('storeVaultBalance').innerText = currentCoins;
                });
            }
            loadStoreProducts();
        }

        function loadStoreProducts() {
            database.ref(`storeProducts`).on('value', snap => {
                const grid = document.getElementById('storeItemsGrid'); grid.innerHTML = "";
                
                if(!snap.exists()) {
                    grid.innerHTML = '<p class="col-span-2 text-center text-xs text-gray-600 py-10 uppercase font-black">No Rewards Listed Currently</p>';
                    return;
                }

                snap.forEach(child => {
                    const p = child.val();
                    grid.innerHTML += `
                        <div class="glass p-4 rounded-[2rem] border border-white/5 flex flex-col justify-between space-y-3 shadow-md">
                            <div class="w-full h-24 bg-black/40 rounded-xl flex items-center justify-center text-green-500 text-2xl shadow-inner border border-white/5">
                                <i class="fa-solid fa-box-open"></i>
                            </div>
                            <div>
                                <h4 class="text-[10px] font-black uppercase text-white tracking-wide truncate">${p.title || 'Premium Item'}</h4>
                                <p class="text-[8px] font-black text-yellow-500 italic mt-0.5">🪙 ${p.cost || 0} Coins</p>
                            </div>
                            <button onclick="purchaseRewardItem('${child.key}', ${p.cost})" class="w-full py-2 bg-green-600 text-white font-black uppercase rounded-xl text-[8px] tracking-widest active:scale-95 transition-all">Unlock</button>
                        </div>`;
                });
            });
        }

        function purchaseRewardItem(productId, cost) {
            if(!userEmail) return alert("Please Login First!");
            if(currentCoins < cost) return alert("Insufficient Vault Coins! Complete quizzes to earn points.");

            if(confirm("Confirm to unlock this premium reward asset?")) {
                const safeEmail = userEmail.replace(/\./g, ',');
                const newBalance = currentCoins - cost;

                // Process Secure Transaction Matrix Data Node
                database.ref(`users/${safeEmail}/coins`).set(newBalance).then(() => {
                    database.ref(`users/${safeEmail}/unlockedRewards/${productId}`).set(true).then(() => {
                        alert("Reward unlocked successfully! Assets added to your vault items profile.");
                    });
                });
            }
        }

        initStoreEngine();
    </script>
</body>
</html>
