<!DOCTYPE html>
<html lang="en">
<head><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-[#0b1120] p-6 text-white font-sans">
    <h2 class="text-[10px] text-gray-500 font-black uppercase mb-8 tracking-[0.3em] text-center italic">mNEET Official Store</h2>
    <div id="storeList" class="grid grid-cols-2 gap-4"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBisQytTeFhjMd1kTUNwcmCelPy7C0ilIY", authDomain: "mneet-7699.firebaseapp.com", projectId: "mneet-7699", storageBucket: "mneet-7699.firebasestorage.app", messagingSenderId: "801664280357", appId: "1:801664280357:web:03da6173f29bedfeaa9ccc" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        onSnapshot(collection(db, "products"), (snap) => {
            const grid = document.getElementById('storeList');
            grid.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                grid.innerHTML += `
                <div class="bg-[#16213e] rounded-[2rem] border border-gray-800 p-4">
                    <img src="${p.img || 'https://via.placeholder.com/150'}" class="h-24 w-full object-contain mb-4 rounded-xl">
                    <h3 class="font-bold text-[9px] uppercase h-8 overflow-hidden">${p.name}</h3>
                    <div class="flex justify-between items-center mt-4">
                        <span class="text-green-400 font-black text-xs">₹${p.price}</span>
                        <button class="bg-white text-black px-3 py-1 rounded-lg font-black text-[8px] uppercase">BUY</button>
                    </div>
                </div>`;
            });
        });
    </script>
</body>
</html>
