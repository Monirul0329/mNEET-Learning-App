<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#0b1120] p-6 text-white font-sans">
    
    <h2 class="text-[9px] font-black text-gray-500 uppercase tracking-widest mb-4">Store Categories</h2>
    <div id="storeTabs" class="flex gap-3 overflow-x-auto pb-4 no-scrollbar"></div>

    <div id="productGrid" class="grid grid-cols-2 gap-4 mt-8">
        <p class="col-span-2 text-center text-xs text-gray-700 py-20 font-bold uppercase italic">Select a category to browse</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBisQytTeFhjMd1kTUNwcmCelPy7C0ilIY", authDomain: "mneet-7699.firebaseapp.com", projectId: "mneet-7699", storageBucket: "mneet-7699.firebasestorage.app", messagingSenderId: "801664280357", appId: "1:801664280357:web:03da6173f29bedfeaa9ccc" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Load Categories
        onSnapshot(collection(db, "courses"), (snap) => {
            const tabs = document.getElementById('storeTabs');
            tabs.innerHTML = "";
            snap.forEach(d => {
                tabs.innerHTML += `<button onclick="loadProducts('${d.id}')" class="flex-shrink-0 bg-[#16213e] border border-gray-800 px-6 py-3 rounded-2xl text-[10px] font-black uppercase focus:bg-white focus:text-black transition-all">${d.data().title}</button>`;
            });
        });

        // Load Products
        window.loadProducts = (cid) => {
            const q = query(collection(db, "products"), where("cid", "==", cid));
            onSnapshot(q, (snap) => {
                const grid = document.getElementById('productGrid');
                grid.innerHTML = "";
                if(snap.empty) { grid.innerHTML = "<p class='col-span-2 text-center text-xs text-gray-600 py-10'>No products found.</p>"; return; }
                
                snap.forEach(d => {
                    const p = d.data();
                    grid.innerHTML += `
                    <div class="bg-[#16213e] rounded-[2rem] overflow-hidden border border-gray-800 shadow-2xl">
                        <div class="h-32 bg-[#0b1120] flex items-center justify-center p-4">
                            <img src="${p.img || 'https://via.placeholder.com/150'}" class="max-h-full rounded-xl">
                        </div>
                        <div class="p-4">
                            <h3 class="font-bold text-[10px] text-white h-8 overflow-hidden uppercase leading-tight">${p.name}</h3>
                            <div class="mt-4 flex justify-between items-center">
                                <span class="text-sm font-black text-green-400">₹${p.price}</span>
                                <button class="bg-white text-black px-3 py-1.5 rounded-lg font-black text-[8px] uppercase active:scale-90">Buy</button>
                            </div>
                        </div>
                    </div>`;
                });
            });
        };
    </script>
</body>
</html>
