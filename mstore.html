<!DOCTYPE html>
<html lang="en">
<head><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-[#0b1120] p-6 text-white pb-32">
    <h2 class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-10 text-center italic">mNEET Official Shop</h2>
    <div id="storeGrid" class="grid grid-cols-2 gap-4"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
        const firebaseConfig = { apiKey: "AIzaSyBisQytTeFhjMd1kTUNwcmCelPy7C0ilIY", authDomain: "mneet-7699.firebaseapp.com", projectId: "mneet-7699", storageBucket: "mneet-7699.firebasestorage.app", messagingSenderId: "801664280357", appId: "1:801664280357:web:03da6173f29bedfeaa9ccc" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);

        onSnapshot(collection(db, "products"), (snap) => {
            const grid = document.getElementById('storeGrid'); grid.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                const mainImg = p.images ? p.images[0] : 'https://via.placeholder.com/150';
                grid.innerHTML += `
                <div class="bg-[#16213e] rounded-[2rem] border border-gray-800 p-4 shadow-xl flex flex-col">
                    <img src="${mainImg}" class="h-28 w-full object-contain mb-4 rounded-xl">
                    <h3 class="font-bold text-[9px] uppercase h-8 overflow-hidden">${p.title || p.name}</h3>
                    <p class="text-[7px] text-gray-500 mt-2 flex-1 line-clamp-3">${p.desc || ''}</p>
                    <div class="flex justify-between items-center mt-4">
                        <span class="text-green-400 font-black text-xs">₹${p.price}</span>
                        <button class="bg-white text-black px-4 py-1.5 rounded-lg font-black text-[8px] uppercase">BUY</button>
                    </div>
                </div>`;
            });
        });
    </script>
</body>
</html>
