<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .glass-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); outline: none; color: white; }
        body { background: #070b14; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .scroll-area { flex: 1; overflow-y: auto; padding-bottom: 120px; }
        ::-webkit-scrollbar { width: 0px; }
        .gold-text { color: #eab308; text-shadow: 0 0 10px rgba(234, 179, 8, 0.3); }
    </style>
</head>
<body>

    <div class="flex justify-between items-center p-6 bg-[#16213e] border-b border-white/5 shadow-xl">
        <button onclick="history.back()" class="w-10 h-10 glass rounded-2xl flex items-center justify-center text-gray-400">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
        <h2 class="text-sm font-black gold-text uppercase italic tracking-[0.2em]">NCERT Study Control</h2>
        <button onclick="logout()" class="w-10 h-10 bg-red-500/10 text-red-500 rounded-2xl flex items-center justify-center border border-red-500/20">
            <i class="fa-solid fa-power-off text-xs"></i>
        </button>
    </div>

    <div class="p-4 bg-[#070b14]">
        <div class="relative">
            <input type="text" id="chapterSearch" onkeyup="searchChapter()" placeholder="Search NCERT Chapter..." class="w-full glass p-4 rounded-2xl outline-none text-xs pl-12 border-none text-white">
            <i class="fa-solid fa-magnifying-glass absolute left-5 top-4 text-gray-500"></i>
        </div>
    </div>

    <div class="scroll-area p-4">
        <div id="formSection" class="bg-[#16213e] p-6 rounded-[2.5rem] border border-gray-800 mb-10 shadow-2xl">
            <p id="formTitle" class="text-[8px] font-black uppercase text-gray-500 mb-6 text-center italic tracking-widest">Create Smart NCERT Environment</p>
            <div class="space-y-3">
                <input type="hidden" id="editId">
                <input type="text" id="cName" placeholder="Chapter Name (e.g. Molecular Biology)" class="w-full glass-input p-4 rounded-xl text-xs font-bold">
                
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="pdfLink" placeholder="NCERT PDF URL" class="w-full glass-input p-4 rounded-xl text-[10px]">
                    <input type="text" id="audioLink" placeholder="Revision Audio URL" class="w-full glass-input p-4 rounded-xl text-[10px]">
                </div>
                
                <input type="text" id="videoLink" placeholder="NCERT Line-by-Line Reading Video URL" class="w-full glass-input p-4 rounded-xl text-[10px]">
                <input type="text" id="pyqLink" placeholder="PYQ Tagged PDF URL" class="w-full glass-input p-4 rounded-xl text-[10px]">

                <button onclick="saveChapter()" id="saveBtn" class="w-full bg-[#eab308] text-black py-4 rounded-xl font-black uppercase text-xs active:scale-95 shadow-lg">Publish Smart Chapter</button>
            </div>
        </div>

        <h3 class="text-[10px] font-black uppercase text-gray-500 mb-6 px-2 italic tracking-widest">Active NCERT Chapters</h3>
        <div id="chapterList" class="space-y-4"></div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58", authDomain: "mneet-spark.firebaseapp.com", projectId: "mneet-spark", databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com/", appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const batchId = localStorage.getItem('selectedBatchId');

        function saveChapter() {
            const editId = document.getElementById('editId').value;
            const data = {
                name: document.getElementById('cName').value,
                pdf: document.getElementById('pdfLink').value,
                audio: document.getElementById('audioLink').value,
                video: document.getElementById('videoLink').value,
                pyq: document.getElementById('pyqLink').value,
                isHidden: false,
                timestamp: Date.now()
            };

            if(!data.name) return alert("Chapter Name Required!");

            const path = `courses/${batchId}/ncert`;
            if(editId) {
                database.ref(`${path}/${editId}`).update(data).then(() => resetForm());
            } else {
                database.ref(path).push(data).then(() => resetForm());
            }
        }

        database.ref(`courses/${batchId}/ncert`).on('value', snap => {
            const list = document.getElementById('chapterList');
            list.innerHTML = "";
            snap.forEach(child => {
                const c = child.val();
                list.innerHTML += `
                    <div class="glass p-5 rounded-[2rem] border ${c.isHidden ? 'border-red-900 opacity-50' : 'border-white/5'}">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h4 class="text-xs font-black uppercase italic">${c.name}</h4>
                                <div class="flex gap-2 mt-2">
                                    ${c.pdf ? '<span class="text-[7px] text-yellow-500 font-bold uppercase"><i class="fa-solid fa-file-pdf"></i> PDF</span>' : ''}
                                    ${c.audio ? '<span class="text-[7px] text-blue-400 font-bold uppercase"><i class="fa-solid fa-headphones"></i> Audio</span>' : ''}
                                    ${c.video ? '<span class="text-[7px] text-red-500 font-bold uppercase"><i class="fa-solid fa-play"></i> Reading</span>' : ''}
                                </div>
                            </div>
                        </div>
                        <div class="flex gap-2 border-t border-white/5 pt-4">
                            <button onclick="editChapter('${child.key}')" class="flex-1 bg-white/5 text-[8px] font-black py-2 rounded-xl uppercase">Edit</button>
                            <button onclick="toggleHide('${child.key}', ${c.isHidden})" class="flex-1 bg-blue-500/10 text-blue-400 text-[8px] font-black py-2 rounded-xl uppercase">${c.isHidden ? 'Unhide' : 'Hide'}</button>
                            <button onclick="deleteChapter('${child.key}')" class="bg-red-500/10 text-red-500 px-4 py-2 rounded-xl"><i class="fa-solid fa-trash text-[8px]"></i></button>
                        </div>
                    </div>`;
            });
        });

        function editChapter(id) {
            database.ref(`courses/${batchId}/ncert/${id}`).once('value', s => {
                const c = s.val();
                document.getElementById('editId').value = id;
                document.getElementById('cName').value = c.name;
                document.getElementById('pdfLink').value = c.pdf || "";
                document.getElementById('audioLink').value = c.audio || "";
                document.getElementById('videoLink').value = c.video || "";
                document.getElementById('pyqLink').value = c.pyq || "";
                document.getElementById('saveBtn').innerText = "Update Environment";
                window.scrollTo({top: 0, behavior: 'smooth'});
            });
        }

        function resetForm() {
            document.querySelectorAll('input').forEach(i => i.value = "");
            document.getElementById('editId').value = "";
            document.getElementById('saveBtn').innerText = "Publish Smart Chapter";
        }

        function toggleHide(id, status) { database.ref(`courses/${batchId}/ncert/${id}`).update({ isHidden: !status }); }
        function deleteChapter(id) { if(confirm("Delete Permanently?")) database.ref(`courses/${batchId}/ncert/${id}`).remove(); }
        function logout() { localStorage.clear(); location.href='index.html'; }
    </script>
</body>
    </html>
