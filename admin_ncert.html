<script>
    // ... Firebase Init
    const batchId = localStorage.getItem('selectedBatchId');
    if(!batchId) { alert("Select Batch from Dashboard!"); location.href='admin_dashboard.html'; }

    function saveChapter() {
        const name = document.getElementById('cName').value;
        const pdf = document.getElementById('pdfUrl').value;
        const audio = document.getElementById('audioUrl').value;
        const subject = document.getElementById('cSubject').value;

        if(!name || !pdf) return alert("Fill required fields!");

        // Storing inside: courses/{batchId}/ncert
        database.ref(`courses/${batchId}/ncert`).push({
            name, pdf, audio, subject, timestamp: Date.now()
        }).then(() => {
            alert("NCERT Smart Chapter Added!");
            document.querySelectorAll('input').forEach(i => i.value = "");
        });
    }
</script>
