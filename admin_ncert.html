<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .glass-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); outline: none; color: white; }
        body { background: #070b14; color: white; font-family: sans-serif; min-height: 100vh; }
    </style>
</head>
<body class="pb-24">

    <div class="sticky top-0 z-50 p-6 glass border-b border-white/5 flex justify-between items-center">
        <button onclick="handleBack()" class="w-10 h-10 glass rounded-2xl flex items-center justify-center text-gray-400"><i class="fa-solid fa-arrow-left"></i></button>
        <h2 id="titleText" class="text-xs font-black text-yellow-500 uppercase tracking-widest">NCERT Admin</h2>
        <div class="w-10"></div>
    </div>

    <div class="p-4 max-w-lg mx-auto space-y-6">
        <div id="mainForm" class="bg-[#16213e] p-6 rounded-[2.5rem] border border-white/5 shadow-2xl">
            <p id="formLabel" class="text-[8px] font-black uppercase text-gray-500 mb-4 text-center">Step 1: Create Chapter</p>
            <div class="space-y-3">
                <input type="hidden" id="editId"><input type="text" id="itemName" placeholder="Chapter Name..." class="w-full glass-input p-4 rounded-xl text-xs font-bold">
                <div id="contentSection" class="hidden space-y-3 pt-2">
                    <input type="text" id="pdfLink" placeholder="PDF URL" class="w-full glass-input p-3 rounded-lg text-[10px]">
                    <input type="text" id="audioLink" placeholder="Audio URL" class="w-full glass-input p-3 rounded-lg text-[10px]">
                    <button onclick="goToMapper()" class="w-full py-3 border border-dashed border-blue-500/50 text-blue-400 rounded-xl text-[9px] font-black uppercase italic">Open Interactive Mapper</button>
                </div>
                <button onclick="saveData()" class="w-full bg-[#eab308] text-black py-4 rounded-xl font-black uppercase text-xs shadow-lg">Confirm & Save</button>
            </div>
        </div>
        <div class="space-y-4" id="listArea"></div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58", authDomain: "mneet-spark.firebaseapp.com", projectId: "mneet-spark", databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com/", appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331" };
        firebase.initializeApp(firebaseConfig); const db = firebase.database();
        const batchId = localStorage.getItem('selectedBatchId') || "B001";
        let viewMode = "LIST"; let activeChapterId = "";

        function loadData() {
            db.ref(`courses/${batchId}/ncert`).on('value', snap => {
                const listArea = document.getElementById('listArea'); listArea.innerHTML = "";
                if(!snap.exists()) return;
                snap.forEach(child => {
                    const data = child.val();
                    listArea.innerHTML += `
                        <div class="glass p-5 rounded-[2rem] border mb-3">
                            <div class="flex justify-between items-center cursor-pointer" onclick="enterChapter('${child.key}', '${data.name}')">
                                <h4 class="text-xs font-black uppercase italic">${data.name}</h4><i class="fa-solid fa-chevron-right text-yellow-500 text-[10px]"></i>
                            </div>
                            <div class="flex gap-2 mt-4 pt-4 border-t border-white/5">
                                <button onclick="quickEdit('${child.key}', '${data.name}')" class="flex-1 py-2 bg-white/5 rounded-lg text-[8px] font-black uppercase">Edit Name</button>
                                <button onclick="toggleHide('${child.key}', ${data.isHidden})" class="flex-1 py-2 bg-blue-500/10 text-blue-400 rounded-lg text-[8px] font-black uppercase">${data.isHidden?'Show':'Hide'}</button>
                                <button onclick="deleteItem('${child.key}')" class="px-4 py-2 bg-red-500/10 text-red-500 rounded-lg"><i class="fa-solid fa-trash text-[8px]"></i></button>
                            </div>
                        </div>`;
                });
            });
        }
        function enterChapter(id, name) { viewMode = "CHAPTER_EDIT"; activeChapterId = id; document.getElementById('formLabel').innerText = "Step 2: Edit Material"; document.getElementById('contentSection').classList.remove('hidden'); document.getElementById('itemName').value = name; db.ref(`courses/${batchId}/ncert/${id}`).once('value', s => { const d = s.val(); document.getElementById('pdfLink').value = d.pdf||""; document.getElementById('audioLink').value = d.audio||""; }); }
        function saveData() { const name = document.getElementById('itemName').value; const pdf = document.getElementById('pdfLink').value; const audio = document.getElementById('audioLink').value; const path = `courses/${batchId}/ncert/` + (viewMode === "CHAPTER_EDIT" ? activeChapterId : ""); const payload = { name: name }; if(viewMode === "CHAPTER_EDIT") { payload.pdf = pdf; payload.audio = audio; } db.ref(path).update(payload).then(() => { alert("Saved!"); resetForm(); viewMode="LIST"; document.getElementById('contentSection').classList.add('hidden'); }); }
        function handleBack() { if(viewMode === "CHAPTER_EDIT") { viewMode = "LIST"; document.getElementById('contentSection').classList.add('hidden'); resetForm(); } else { history.back(); } }
        function quickEdit(id, name) { document.getElementById('editId').value = id; document.getElementById('itemName').value = name; }
        function toggleHide(id, status) { db.ref(`courses/${batchId}/ncert/${id}`).update({ isHidden: !status }); }
        function deleteItem(id) { if(confirm("Delete?")) db.ref(`courses/${batchId}/ncert/${id}`).remove(); }
        function resetForm() { document.getElementById('itemName').value = ""; document.getElementById('pdfLink').value = ""; document.getElementById('audioLink').value = ""; }
        function goToMapper() { location.href = `admin_ncert_mapper.html?id=${activeChapterId}`; }
        loadData();
    </script>
</body>
</html>
