<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNEET Admin - NCERT Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">
    <div class="flex">
        <aside class="w-64 bg-slate-950 p-6 min-h-screen border-r border-slate-800">
            <h2 class="text-xl font-bold text-yellow-400 mb-8"><i class="fa-solid fa-user-shield mr-2"></i>mNEET Admin</h2>
            <nav class="space-y-3">
                <a href="admin_dashboard.html" class="block py-2.5 px-4 rounded-xl hover:bg-slate-800 text-slate-400 hover:text-white transition"><i class="fa-solid fa-chart-pie mr-2"></i>Dashboard</a>
                <a href="admin_ncert.html" class="block py-2.5 px-4 rounded-xl bg-indigo-600 text-white font-medium shadow-md"><i class="fa-solid fa-book mr-2"></i>NCERT Manager</a>
                <a href="admin_quiz_chapters.html" class="block py-2.5 px-4 rounded-xl hover:bg-slate-800 text-slate-400 hover:text-white transition"><i class="fa-solid fa-vial mr-2"></i>Quiz Engine</a>
                <a href="admin_mstore.html" class="block py-2.5 px-4 rounded-xl hover:bg-slate-800 text-slate-400 hover:text-white transition"><i class="fa-solid fa-shop mr-2"></i>mStore Setup</a>
                <a href="dashboard.html" class="block py-2.5 px-4 rounded-xl text-amber-400 hover:bg-amber-950/30 transition"><i class="fa-solid fa-arrow-left-long mr-2"></i>Exit Portal</a>
            </nav>
        </aside>

        <main class="flex-1 p-8">
            <header class="mb-8 flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-bold">NCERT Audio Reader Configuration</h1>
                    <p class="text-slate-400 text-sm">Upload and deploy content endpoints directly to student dashboard models</p>
                </div>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-1 bg-slate-950 p-6 rounded-2xl border border-slate-800 h-fit">
                    <h2 class="text-md font-semibold text-slate-200 mb-4"><i class="fa-solid fa-plus-circle text-indigo-500 mr-2"></i>Deploy New Sheet</h2>
                    <form id="ncertForm" onsubmit="saveNcertMaterial(event)" class="space-y-4">
                        <div>
                            <label class="block text-xs uppercase text-slate-400 font-bold tracking-wider mb-1">Chapter Name</label>
                            <input type="text" id="chapName" required placeholder="e.g., Cell: The Unit of Life" class="w-full px-3 py-2 bg-slate-900 border border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                        </div>
                        <div>
                            <label class="block text-xs uppercase text-slate-400 font-bold tracking-wider mb-1">Subject / Stream</label>
                            <select id="subject" class="w-full px-3 py-2 bg-slate-900 border border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm text-slate-300">
                                <option value="Biology">Biology (Botany/Zoology)</option>
                                <option value="Physics">Physics</option>
                                <option value="Chemistry">Chemistry</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs uppercase text-slate-400 font-bold tracking-wider mb-1">Google Drive Link (PDF)</label>
                            <input type="url" id="driveLink" required placeholder="https://drive.google.com/..." class="w-full px-3 py-2 bg-slate-900 border border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                        </div>
                        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 rounded-xl transition text-sm shadow-lg shadow-indigo-600/20 active:scale-95">Push to Student Database</button>
                    </form>
                </div>

                <div class="lg:col-span-2 bg-slate-950 p-6 rounded-2xl border border-slate-800">
                    <h2 class="text-md font-semibold text-slate-200 mb-4"><i class="fa-solid fa-layer-group text-yellow-500 mr-2"></i>Active Global Repository Storage</h2>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm text-slate-300">
                            <thead class="bg-slate-900 text-xs uppercase text-slate-400 border-b border-slate-800">
                                <tr>
                                    <th class="py-3 px-4">Chapter Title</th>
                                    <th class="py-3 px-4">Subject</th>
                                    <th class="py-3 px-4">Data Source Path</th>
                                    <th class="py-3 px-4 text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="ncertTableBody">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let dbMaterials = JSON.parse(localStorage.getItem('mneet_ncert_store')) || [];

        function renderTable() {
            const tbody = document.getElementById('ncertTableBody');
            tbody.innerHTML = dbMaterials.length === 0 ? 
                `<tr><td colspan="4" class="text-center py-8 text-slate-500 italic">No assets mapped to dynamic cloud structures yet.</td></tr>` : '';
            
            dbMaterials.forEach((item, idx) => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-slate-900 hover:bg-slate-900/40 transition";
                tr.innerHTML = `
                    <td class="py-3 px-4 font-medium text-slate-100">${item.name}</td>
                    <td class="py-3 px-4"><span class="px-2 py-0.5 rounded-full text-xs bg-indigo-950 text-indigo-400 border border-indigo-900">${item.subject}</span></td>
                    <td class="py-3 px-4 text-xs font-mono text-slate-400">${item.link.substring(0, 35)}...</td>
                    <td class="py-3 px-4 text-right">
                        <button onclick="deleteAsset(${idx})" class="text-rose-400 hover:text-rose-500 transition px-2 py-1"><i class="fa-solid fa-trash-can"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function saveNcertMaterial(e) {
            e.preventDefault();
            const payload = {
                name: document.getElementById('chapName').value,
                subject: document.getElementById('subject').value,
                link: document.getElementById('driveLink').value
            };
            dbMaterials.push(payload);
            localStorage.setItem('mneet_ncert_store', JSON.stringify(dbMaterials));
            document.getElementById('ncertForm').reset();
            renderTable();
        }

        function deleteAsset(index) {
            if(confirm("Delete this content resource?")) {
                dbMaterials.splice(index, 1);
                localStorage.setItem('mneet_ncert_store', JSON.stringify(dbMaterials));
                renderTable();
            }
        }

        window.onload = renderTable;
    </script>
</body>
</html>
