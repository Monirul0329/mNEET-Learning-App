<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style> .glass { background: rgba(22, 33, 62, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); } .gold-glow { color: #eab308; } </style>
</head>
<body class="bg-[#070b14] text-white p-4 pb-32">
    <div class="glass p-6 rounded-[2.5rem] mb-10 border border-[#eab308]/20">
        <h3 class="text-xs font-black uppercase italic gold-glow mb-6">Create New Mock Exam</h3>
        <input type="text" id="mockName" placeholder="Mock Test Name (e.g. Full Syllabus 01)" class="w-full bg-[#16213e] p-4 rounded-2xl mb-3 outline-none text-[10px] text-white">
        <button onclick="createMock()" class="w-full bg-[#eab308] text-black py-4 rounded-2xl font-black uppercase text-[10px]">Create Mock Test Folder</button>
    </div>

    <h4 class="text-[10px] font-black uppercase text-gray-500 mb-4 italic px-2">Active Mock Folders</h4>
    <div id="mockFolders" class="space-y-4"></div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58", authDomain: "mneet-spark.firebaseapp.com", projectId: "mneet-spark", databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com/", appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const batchId = localStorage.getItem('selectedBatchId');

        function createMock() {
            const name = document.getElementById('mockName').value;
            if(!name) return alert("Enter Name!");
            database.ref(`courses/${batchId}/tests`).push({ name: name, status: "Open" })
            .then(() => { document.getElementById('mockName').value = ""; alert("Mock Created!"); });
        }

        database.ref(`courses/${batchId}/tests`).on('value', snap => {
            const list = document.getElementById('mockFolders');
            list.innerHTML = "";
            snap.forEach(child => {
                const m = child.val();
                list.innerHTML += `
                    <div class="glass p-5 rounded-[2rem] flex justify-between items-center border border-white/5 mb-3">
                        <div><h5 class="text-xs font-black italic uppercase">${m.name}</h5><p class="text-[8px] text-gray-500 uppercase mt-1">Status: ${m.status}</p></div>
                        <button onclick="location.href='admin_test_questions.html?id=${child.key}&batch=${batchId}'" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[8px] font-black uppercase">+ Add Questions</button>
                    </div>`;
            });
        });
    </script>
</body>
</html>
