<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .glass-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); outline: none; color: white; }
        body { background: #070b14; color: white; font-family: sans-serif; min-height: 100vh; }
    </style>
</head>
<body class="pb-24">

    <div class="sticky top-0 z-50 p-6 glass border-b border-white/5 flex justify-between items-center">
        <button onclick="history.back()" class="w-10 h-10 glass rounded-2xl flex items-center justify-center text-gray-400"><i class="fa-solid fa-arrow-left"></i></button>
        <h2 class="text-xs font-black text-red-500 uppercase tracking-widest">Test Paper Management</h2>
        <div class="w-10"></div>
    </div>

    <div class="p-4 max-w-lg mx-auto space-y-6">
        <div class="bg-[#16213e] p-6 rounded-[2.5rem] border border-white/5 shadow-2xl space-y-3">
            <p class="text-[8px] font-black uppercase text-gray-500 text-center tracking-widest">Publish New Exam Paper</p>
            <input type="text" id="testName" placeholder="Exam Name (e.g. Minor Test 01)" class="w-full glass-input p-4 rounded-xl text-xs font-bold">
            <input type="text" id="testUrl" placeholder="Google Form / Evaluation Test Link" class="w-full glass-input p-4 rounded-xl text-xs font-bold">
            <button onclick="publishTestPaper()" class="w-full bg-red-600 text-white py-4 rounded-xl font-black uppercase text-xs shadow-lg">Publish Live Test</button>
        </div>

        <div class="space-y-3" id="adminTestContainer"></div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58", authDomain: "mneet-spark.firebaseapp.com", projectId: "mneet-spark", databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com/", appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331" };
        firebase.initializeApp(firebaseConfig); const db = firebase.database();
        const batchId = localStorage.getItem('selectedBatchId') || "B001";

        function publishTestPaper() {
            const name = document.getElementById('testName').value;
            const url = document.getElementById('testUrl').value;
            if(!name || !url) return alert("Fill All Fields!");

            db.ref(`courses/${batchId}/tests`).push({ name, url, timestamp: Date.now() }).then(() => { alert("Exam Paper Published!"); document.getElementById('testName').value = ""; document.getElementById('testUrl').value = ""; });
        }

        function loadExamPapers() {
            db.ref(`courses/${batchId}/tests`).on('value', snap => {
                const c = document.getElementById('adminTestContainer'); c.innerHTML = "";
                if(!snap.exists()) return;
                snap.forEach(child => {
                    const data = child.val();
                    c.innerHTML += `
                        <div class="glass p-5 rounded-[2rem] border border-white/5 flex justify-between items-center">
                            <div><h4 class="text-xs font-black uppercase italic">${data.name}</h4></div>
                            <button onclick="deleteExam('${child.key}')" class="w-8 h-8 rounded-full bg-red-500/10 text-red-500 flex items-center justify-center"><i class="fa-solid fa-trash text-[10px]"></i></button>
                        </div>`;
                });
            });
        }
        function deleteExam(id) { if(confirm("Remove Paper?")) db.ref(`courses/${batchId}/tests/${id}`).remove(); }
        loadExamPapers();
    </script>
</body>
</html>
