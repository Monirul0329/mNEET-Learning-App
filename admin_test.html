<body class="bg-[#070b14] text-white p-4 pb-32">
    <div class="glass p-6 rounded-[2.5rem] mb-10 border border-[#eab308]/20">
        <h3 class="text-xs font-black uppercase italic gold-glow mb-6">Create New Mock Exam</h3>
        <input type="text" id="mockName" placeholder="Mock Test Name (e.g. Full Syllabus 01)" class="w-full bg-[#16213e] p-4 rounded-2xl mb-3 outline-none text-[10px]">
        <button class="w-full bg-[#eab308] text-black py-4 rounded-2xl font-black uppercase text-[10px]">Create Mock Test Folder</button>
    </div>

    <h4 class="text-[10px] font-black uppercase text-gray-500 mb-4 italic px-2">Active Mock Folders</h4>
    <div id="mockFolders" class="space-y-4">
        <div class="glass p-5 rounded-[2rem] flex justify-between items-center border border-white/5">
            <div>
                <h5 class="text-xs font-black italic">MOCK TEST - 01</h5>
                <p class="text-[8px] text-gray-500 uppercase mt-1">Status: Open for students</p>
            </div>
            <button class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[8px] font-black uppercase">+ Add Questions</button>
        </div>
    </div>
</body>
