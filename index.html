<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNeet - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b1120; color: white; }
        .input-navy { background-color: #1e293b; border: 1px solid #334155; color: white; width: 100%; padding: 15px; border-radius: 15px; margin-bottom: 12px; outline: none; }
        .btn-gold { background-color: #eab308; color: #0b1120; font-weight: 900; width: 100%; padding: 15px; border-radius: 15px; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-md bg-[#16213e] p-8 rounded-[2.5rem] shadow-2xl text-center">
        <h1 class="text-4xl font-black text-[#eab308] mb-8 italic">mNeet</h1>
        
        <div id="regFields" class="hidden">
            <input type="text" id="userName" class="input-navy" placeholder="Full Name">
            <input type="text" id="userCity" class="input-navy" placeholder="City">
        </div>
        <input type="email" id="email" class="input-navy" placeholder="Email">
        <input type="password" id="password" class="input-navy" placeholder="Password">
        
        <button onclick="handleAuth()" id="authBtn" class="btn-gold uppercase">Login</button>
        <button onclick="toggleAuth()" id="toggleBtn" class="mt-6 text-[#eab308] text-xs font-bold uppercase">Create Account</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBisQytTeFhjMd1kTUNwcmCelPy7C0ilIY",
          authDomain: "mneet-7699.firebaseapp.com",
          projectId: "mneet-7699",
          storageBucket: "mneet-7699.firebasestorage.app",
          messagingSenderId: "801664280357",
          appId: "1:801664280357:web:03da6173f29bedfeaa9ccc"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let isLogin = true;

        window.toggleAuth = () => {
            isLogin = !isLogin;
            document.getElementById('regFields').classList.toggle('hidden');
            document.getElementById('authBtn').innerText = isLogin ? "Login" : "Sign Up";
            document.getElementById('toggleBtn').innerText = isLogin ? "Create Account" : "Login Here";
        };

        window.handleAuth = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if(!email || !pass) return alert("Fill all fields");

            try {
                if(isLogin) {
                    const res = await signInWithEmailAndPassword(auth, email, pass);
                    const userSnap = await getDoc(doc(db, "users", res.user.uid));
                    if(userSnap.exists() && userSnap.data().role === 'admin') window.location.href = "teacher.html";
                    else window.location.href = "dashboard.html";
                } else {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await setDoc(doc(db, "users", res.user.uid), {
                        name: document.getElementById('userName').value,
                        city: document.getElementById('userCity').value,
                        email: email, coins: 0, isBlocked: false, role: 'student'
                    });
                    location.reload();
                }
            } catch (e) { alert(e.code); }
        };
    </script>
</body>
</html>
