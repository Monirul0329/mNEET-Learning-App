<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNeet - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b1120; color: white; font-family: sans-serif; }
        .card-navy { background-color: #16213e; border: 1px solid #1f2937; }
        .input-navy { background-color: #1e293b; border: 1px solid #334155; color: white; }
        .btn-gold { background-color: #eab308; color: #0b1120; font-weight: 900; }
        .text-gold { color: #eab308; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-md card-navy p-10 rounded-[2.5rem] shadow-2xl">
        <h1 class="text-5xl font-black text-gold text-center mb-10 italic tracking-tighter">mNeet</h1>
        
        <div id="authForm">
            <input type="email" id="email" class="w-full input-navy p-4 rounded-2xl mb-4 outline-none focus:border-yellow-500" placeholder="Email Address">
            <input type="password" id="password" class="w-full input-navy p-4 rounded-2xl mb-8 outline-none focus:border-yellow-500" placeholder="Password">
            
            <button onclick="handleAuth()" id="authBtn" class="w-full btn-gold py-4 rounded-2xl text-lg uppercase tracking-wider mb-6 shadow-lg">
                LOGIN NOW
            </button>
            
            <div class="flex justify-between text-xs font-bold uppercase tracking-tight">
                <button class="text-gold">Forgot Password?</button>
                <button onclick="toggleAuth()" id="toggleBtn" class="text-gold">Create Account</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBisQytTeFhjMd1kTUNwcmCelPy7C0ilIY",
          authDomain: "mneet-7699.firebaseapp.com",
          projectId: "mneet-7699",
          storageBucket: "mneet-7699.firebasestorage.app",
          messagingSenderId: "801664280357",
          appId: "1:801664280357:web:03da6173f29bedfeaa9ccc",
          measurementId: "G-EFNE8HTGZ3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        let isLogin = true;

        window.toggleAuth = () => {
            isLogin = !isLogin;
            document.getElementById('authBtn').innerText = isLogin ? "LOGIN NOW" : "SIGN UP NOW";
            document.getElementById('toggleBtn').innerText = isLogin ? "Create Account" : "Login Here";
        };

               window.handleAuth = async () => {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;
            const btn = document.getElementById('authBtn');

            if(!email || !pass) return alert("Fill all fields");
            btn.innerText = "PROCESSING...";

            try {
                if(isLogin) {
                    const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                    const user = userCredential.user;

                    // ADMIN LOGIC: Jodi apnar email hobe admin email
                    if(email === "mi4286803@gmail.com") { 
                        alert("Welcome Admin!");
                        window.location.href = "teacher.html"; // Admin panel-e niye jabe
                    } else {
                        alert("Login Success!");
                        window.location.href = "dashboard.html"; // Student dashboard-e niye jabe
                    }
                } else {
                    await createUserWithEmailAndPassword(auth, email, pass);
                    alert("Account Created!");
                    toggleAuth();
                }
            } catch (err) { alert("Error: " + err.code); }
            btn.innerText = "LOGIN NOW";
        };
    </script>
</body>
</html>
