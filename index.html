<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>mNEET - Entry</title>
</head>
<body class="bg-[#0b1120] flex items-center justify-center min-h-screen p-6 font-sans">
    <div class="bg-[#16213e] p-10 rounded-[3rem] border border-gray-800 w-full max-w-md shadow-2xl text-white">
        <h1 class="text-4xl font-black italic uppercase text-center mb-2 tracking-tighter italic">m<span class="text-[#eab308]">NEET</span></h1>
        <p class="text-gray-500 text-center text-[10px] uppercase tracking-[0.3em] mb-10 font-black">Future Surgeon's Portal</p>
        
        <div class="space-y-4">
            <input type="text" id="userName" placeholder="Your Name" class="w-full bg-[#0b1120] p-5 rounded-2xl border border-gray-700 outline-none focus:border-[#eab308] transition-all">
            <input type="text" id="targetCollege" placeholder="Dream Medical College" class="w-full bg-[#0b1120] p-5 rounded-2xl border border-gray-700 outline-none focus:border-[#eab308] transition-all">
        </div>
        
        <button onclick="saveUser()" class="w-full bg-[#eab308] text-black py-5 rounded-2xl font-black uppercase text-xs mt-10 shadow-xl active:scale-95 transition-all">Start Journey</button>
    </div>

    <script>
        function saveUser() {
            const name = document.getElementById('userName').value;
            const college = document.getElementById('targetCollege').value;
            if(!name || !college) return alert("Enter details first!");
            
            localStorage.setItem('mNEET_User', JSON.stringify({
                name: name,
                college: college,
                xp: 0,
                hours: 0,
                questions: 0
            }));
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
