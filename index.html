<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNEET - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b1120; color: white; font-family: sans-serif; }
        .card-navy { background-color: #16213e; border: 1px solid #1f2937; }
        .input-navy { background-color: #1e293b; border: 1px solid #334155; color: white; width: 100%; padding: 15px; border-radius: 15px; margin-bottom: 12px; outline: none; }
        .btn-gold { background-color: #eab308; color: #0b1120; font-weight: 900; width: 100%; padding: 15px; border-radius: 15px; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-md card-navy p-10 rounded-[2.5rem] shadow-2xl text-center">
        <h1 class="text-4xl font-black text-[#eab308] mb-10 italic">mNEET</h1>
        <div id="regFields" class="hidden">
            <input type="text" id="userName" class="input-navy" placeholder="Full Name">
            <input type="text" id="userCity" class="input-navy" placeholder="City">
        </div>
        <input type="email" id="email" class="input-navy" placeholder="Email Address">
        <input type="password" id="password" class="input-navy" placeholder="Password">
        <button onclick="handleAuth()" id="authBtn" class="btn-gold uppercase tracking-widest">Login Now</button>
        <button onclick="toggleAuth()" id="toggleBtn" class="mt-6 block w-full text-[#eab308] text-[10px] font-bold uppercase tracking-widest">Create Account</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = { /* APNAR CONFIG */ };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let isLogin = true;

        window.toggleAuth = () => {
            isLogin = !isLogin;
            document.getElementById('regFields').classList.toggle('hidden');
            document.getElementById('authBtn').innerText = isLogin ? "Login Now" : "Sign Up Now";
            document.getElementById('toggleBtn').innerText = isLogin ? "Create Account" : "Login Here";
        };

        window.handleAuth = async () => {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;
            try {
                if(isLogin) {
                    const res = await signInWithEmailAndPassword(auth, email, pass);
                    const snap = await getDoc(doc(db, "users", res.user.uid));
                    if(snap.exists() && snap.data().role === 'admin') window.location.href = "teacher.html";
                    else window.location.href = "dashboard.html";
                } else {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await setDoc(doc(db, "users", res.user.uid), {
                        name: document.getElementById('userName').value,
                        city: document.getElementById('userCity').value,
                        email: email, coins: 0, progress: 0, isBlocked: false, role: 'student'
                    });
                    location.reload();
                }
            } catch (e) { alert(e.code); }
        };
    </script>
</body>
</html>
