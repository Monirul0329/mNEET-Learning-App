<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNEET - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a1128; color: white; font-family: sans-serif; }
        .input-box { background-color: #16213e; border: 1px solid #1f2937; color: white; width: 100%; padding: 15px; border-radius: 12px; margin-bottom: 15px; outline: none; }
        .input-box:focus { border-color: #d97706; }
        .btn-gold { background-color: #d97706; color: #0a1128; font-weight: bold; width: 100%; padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .btn-gold:active { transform: scale(0.95); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-md bg-[#16213e]/50 p-8 rounded-[2rem] border border-gray-800 shadow-2xl">
        <h1 class="text-5xl font-black text-[#d97706] text-center mb-2 italic">mNEET</h1>
        <p class="text-center text-gray-500 text-xs mb-10 tracking-widest uppercase">Future Doctors' Hub</p>

        <h2 id="authTitle" class="text-xl font-bold mb-6 text-center text-white">Login to Account</h2>
        
        <input type="email" id="email" class="input-box" placeholder="Email Address">
        <input type="password" id="password" class="input-box" placeholder="Password">
        
        <button onclick="handleAuth()" id="authBtn" class="btn-gold uppercase tracking-widest">Login Now</button>

        <p class="text-center mt-8 text-sm text-gray-400">
            <span id="toggleText">Don't have an account?</span>
            <button onclick="toggleAuth()" id="toggleBtn" class="text-[#d97706] font-bold ml-1">Create Account</button>
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBisQytTeFhjMdlkTUNwcmCelPy7C9iI1Y",
            authDomain: "mneet-7699.firebaseapp.com",
            projectId: "mneet-7699",
            storageBucket: "mneet-7699.firebasestorage.app",
            messagingSenderId: "801664280357",
            appId: "1:801664280357:web:03da6173f29bedfeaa9ccc"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        let isLogin = true;

        window.toggleAuth = () => {
            isLogin = !isLogin;
            document.getElementById('authTitle').innerText = isLogin ? "Login to Account" : "Create New Account";
            document.getElementById('authBtn').innerText = isLogin ? "Login Now" : "Sign Up Free";
            document.getElementById('toggleText').innerText = isLogin ? "Don't have an account?" : "Already have an account?";
            document.getElementById('toggleBtn').innerText = isLogin ? "Create Account" : "Login Here";
        };

        window.handleAuth = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const btn = document.getElementById('authBtn');

            if(!email || !pass) return alert("Please fill all fields!");
            
            btn.innerText = "PROCESSING...";
            btn.disabled = true;

            try {
                if(isLogin) {
                    await signInWithEmailAndPassword(auth, email, pass);
                    alert("Welcome to mNEET!");
                    window.location.href = "dashboard.html"; 
                } else {
                    await createUserWithEmailAndPassword(auth, email, pass);
                    alert("Account Created! Now you can login.");
                    toggleAuth(); 
                }
            } catch (err) {
                alert("Error: " + err.code);
            }
            btn.disabled = false;
            btn.innerText = isLogin ? "Login Now" : "Sign Up Free";
        };
    </script>
</body>
</html>
