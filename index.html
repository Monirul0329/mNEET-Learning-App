<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNEET - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0a1128] text-white flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-md bg-[#16213e] p-8 rounded-[2rem] border border-gray-800 shadow-2xl text-center">
        <h1 class="text-[#d97706] text-4xl font-black mb-10 italic">mNEET</h1>
        
        <input type="email" id="email" class="w-full bg-[#0f172a] border border-gray-700 p-4 rounded-xl mb-4 text-white outline-none" placeholder="Email">
        <input type="password" id="password" class="w-full bg-[#0f172a] border border-gray-700 p-4 rounded-xl mb-6 text-white outline-none" placeholder="Password">
        
        <button onclick="handleAuth()" id="authBtn" class="w-full bg-[#d97706] text-[#0a1128] py-4 rounded-xl font-bold uppercase">Login/Signup</button>
        
        <p class="mt-6 text-xs text-gray-500">Please make sure Email/Password is enabled in Firebase Console.</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

        // Apnar deya original config
        const firebaseConfig = {
          apiKey: "AIzaSyBisQytTeFhjMd1kTUNwcmCelPy7C0ilIY",
          authDomain: "mneet-7699.firebaseapp.com",
          projectId: "mneet-7699",
          storageBucket: "mneet-7699.firebasestorage.app",
          messagingSenderId: "801664280357",
          appId: "1:801664280357:web:03da6173f29bedfeaa9ccc",
          measurementId: "G-EFNE8HTGZ3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.handleAuth = async () => {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;
            const btn = document.getElementById('authBtn');

            if(!email || pass.length < 6) return alert("Email and 6-digit password required!");
            btn.innerText = "PROCESSING...";

            try {
                // Prothome Signup cheshtha korbe, account thakle Login korbe
                try {
                    await createUserWithEmailAndPassword(auth, email, pass);
                    alert("Account Created!");
                    window.location.href = "dashboard.html";
                } catch (e) {
                    await signInWithEmailAndPassword(auth, email, pass);
                    window.location.href = "dashboard.html";
                }
            } catch (err) { 
                alert("Firebase Error: " + err.code); 
                console.log(err);
            }
            btn.innerText = "Login/Signup";
        };
    </script>
</body>
</html>
