<div id="regFields" class="hidden">
    <input type="text" id="userName" class="w-full bg-[#1e293b] border border-gray-700 p-4 rounded-xl mb-4 text-white outline-none" placeholder="Full Name">
    <input type="text" id="userCity" class="w-full bg-[#1e293b] border border-gray-700 p-4 rounded-xl mb-4 text-white outline-none" placeholder="City">
</div>

<script type="module">
    // Firebase imports (auth, db)
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
    const db = getFirestore(app);

    window.handleAuth = async () => {
        const email = document.getElementById('email').value.trim();
        const pass = document.getElementById('password').value;
        const name = document.getElementById('userName').value;
        const city = document.getElementById('userCity').value;

        try {
            if(isLogin) {
                await signInWithEmailAndPassword(auth, email, pass);
                window.location.href = "dashboard.html";
            } else {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                // Student-er profile save kora
                await setDoc(doc(db, "users", res.user.uid), {
                    name: name,
                    city: city,
                    email: email,
                    coins: 0,
                    isBlocked: false,
                    role: 'student'
                });
                alert("Account Created!");
                location.reload();
            }
        } catch (err) { alert(err.code); }
    };

    window.toggleAuth = () => {
        isLogin = !isLogin;
        document.getElementById('regFields').classList.toggle('hidden');
        // Ager toggle logic...
    };
</script>
