<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(22, 33, 62, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        body { background: #070b14; color: white; font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .main-editor { display: flex; flex: 1; overflow: hidden; }
        .pdf-section { flex: 1; overflow: auto; background: #111; position: relative; cursor: crosshair; }
        .sidebar { width: 350px; background: #16213e; border-left: 1px solid #1f2937; overflow-y: auto; padding: 20px; }
        #pdf-canvas { display: block; margin: 0 auto; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .marker { position: absolute; width: 14px; height: 14px; background: #eab308; border: 2px solid white; border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); box-shadow: 0 0 10px #eab308; }
        .mapping-card { background: rgba(255,255,255,0.03); border-radius: 15px; padding: 12px; border-left: 4px solid #eab308; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="h-[70px] bg-[#16213e] flex justify-between items-center px-6 border-b border-white/5">
        <div class="flex items-center gap-4">
            <button onclick="history.back()" class="w-10 h-10 glass rounded-xl flex items-center justify-center text-gray-400"><i class="fa-solid fa-chevron-left"></i></button>
            <h1 class="text-xs font-black uppercase text-yellow-500 italic tracking-widest">Interactive PYQ Mapper</h1>
        </div>
        <button onclick="saveAllPoints()" class="bg-green-600 px-6 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg active:scale-95">Save Smart Map</button>
    </div>

    <div class="main-editor">
        <div class="pdf-section" id="pdfContainer" onclick="placeMarker(event)">
            <canvas id="pdf-canvas"></canvas>
            <div id="marker-layer" class="absolute inset-0 pointer-events-none"></div>
        </div>

        <div class="sidebar">
            <h3 class="text-[10px] font-black uppercase text-gray-500 mb-6 italic tracking-widest">Mapping Sequence</h3>
            
            <div id="configForm" class="glass p-5 rounded-2xl mb-8 hidden">
                <p class="text-[8px] text-yellow-500 font-black uppercase mb-4 italic">Configure Point</p>
                <div class="space-y-4">
                    <div>
                        <label class="text-[7px] uppercase font-bold text-gray-400 ml-1">Audio Time (Seconds)</label>
                        <input type="number" id="pointTime" placeholder="e.g. 45.5" class="w-full bg-black/40 p-3 rounded-xl border border-white/10 outline-none text-xs text-yellow-500 font-bold">
                    </div>
                    <div>
                        <label class="text-[7px] uppercase font-bold text-gray-400 ml-1">PYQ Tag / Question</label>
                        <textarea id="pointQuiz" placeholder="Type NEET Question here..." class="w-full bg-black/40 p-3 rounded-xl border border-white/10 outline-none text-xs h-24"></textarea>
                    </div>
                    <button onclick="addPointToList()" class="w-full bg-[#eab308] text-black py-3 rounded-xl font-black uppercase text-[10px]">Sync Point</button>
                </div>
            </div>

            <div id="pointsList" class="space-y-3">
                <p class="text-center text-gray-600 text-[9px] py-10 uppercase font-black">Click on PDF to start mapping</p>
            </div>
        </div>
    </div>

    <script>
        const database = firebase.database();
        const batchId = localStorage.getItem('selectedBatchId');
        const chapterId = new URLSearchParams(window.location.search).get('id');
        
        let pdfDoc = null;
        let points = [];
        let tempX, tempY;

        async function initMapper() {
            // Fetch PDF Link from Chapter
            database.ref(`courses/${batchId}/ncert/${chapterId}`).once('value', async snap => {
                const data = snap.val();
                if(data && data.pdf) loadPDF(data.pdf);
                if(data && data.map) { points = data.map; renderPoints(); }
            });
        }

        function loadPDF(url) {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
            pdfjsLib.getDocument(url).promise.then(pdf => {
                pdfDoc = pdf;
                renderPage(1);
            });
        }

        async function renderPage(num) {
            const page = await pdfDoc.getPage(num);
            const viewport = page.getViewport({ scale: 1.5 });
            const canvas = document.getElementById('pdf-canvas');
            const ctx = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            await page.render({ canvasContext: ctx, viewport }).promise;
            renderVisualMarkers(); // Draw existing markers
        }

        function placeMarker(e) {
            const rect = document.getElementById('pdf-canvas').getBoundingClientRect();
            tempX = e.clientX - rect.left;
            tempY = e.clientY - rect.top;

            document.getElementById('configForm').classList.remove('hidden');
            document.getElementById('pointTime').focus();
        }

        function addPointToList() {
            const time = document.getElementById('pointTime').value;
            const quiz = document.getElementById('pointQuiz').value;
            if(!time) return alert("Enter Seconds!");

            points.push({ x: tempX, y: tempY, time: parseFloat(time), quiz: quiz });
            points.sort((a,b) => a.time - b.time);
            
            renderPoints();
            document.getElementById('configForm').classList.add('hidden');
            document.getElementById('pointTime').value = "";
            document.getElementById('pointQuiz').value = "";
        }

        function renderPoints() {
            const list = document.getElementById('pointsList');
            list.innerHTML = points.map((p, i) => `
                <div class="mapping-card">
                    <div class="flex justify-between">
                        <span class="text-[10px] font-black text-yellow-500 italic">${p.time}s</span>
                        <button onclick="points.splice(${i},1); renderPoints();" class="text-red-500 text-[10px]"><i class="fa-solid fa-trash"></i></button>
                    </div>
                    <p class="text-[8px] text-gray-500 mt-1 truncate">${p.quiz || 'Sync Marker Only'}</p>
                </div>
            `).join('');
            renderVisualMarkers();
        }

        function renderVisualMarkers() {
            const layer = document.getElementById('marker-layer');
            layer.innerHTML = "";
            points.forEach(p => {
                const m = document.createElement('div');
                m.className = 'marker';
                m.style.left = p.x + 'px';
                m.style.top = p.y + 'px';
                layer.appendChild(m);
            });
        }

        function saveAllPoints() {
            database.ref(`courses/${batchId}/ncert/${chapterId}/map`).set(points).then(() => {
                alert("Smart Logic Saved! Student app updated.");
                history.back();
            });
        }

        initMapper();
    </script>
</body>
</html>
