<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(22, 33, 62, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        body { background: #070b14; color: white; font-family: sans-serif; overflow: hidden; height: 100vh; }
        .editor-container { display: flex; height: calc(100vh - 70px); }
        .pdf-viewer { flex: 1; overflow: auto; position: relative; background: #111; cursor: crosshair; }
        .side-panel { width: 320px; background: #16213e; border-left: 1px solid #1f2937; overflow-y: auto; padding: 20px; }
        #pdf-canvas { display: block; margin: 0 auto; }
        .map-point { position: absolute; width: 12px; height: 12px; background: #eab308; border-radius: 50%; transform: translate(-50%, -50%); border: 2px solid white; pointer-events: none; }
        .sync-row { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 10px; margin-bottom: 10px; border-left: 3px solid #eab308; }
    </style>
</head>
<body>

    <div class="flex justify-between items-center h-[70px] px-6 bg-[#16213e] border-b border-white/5 shadow-2xl">
        <div class="flex items-center gap-4">
            <button onclick="history.back()" class="w-10 h-10 glass rounded-xl flex items-center justify-center text-gray-400"><i class="fa-solid fa-chevron-left"></i></button>
            <h1 class="text-xs font-black gold-text uppercase italic tracking-widest">PYQ & Audio Mapper</h1>
        </div>
        <div class="flex gap-2">
             <button onclick="saveFullMap()" class="bg-green-600 px-6 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg shadow-green-900/20">Finalize Map</button>
        </div>
    </div>

    <div class="editor-container">
        <div class="pdf-viewer" id="pdf-area" onclick="markPoint(event)">
            <canvas id="pdf-canvas"></canvas>
            <div id="marker-layer"></div>
        </div>

        <div class="side-panel">
            <h3 class="text-[10px] font-black uppercase text-gray-500 mb-6 italic tracking-widest border-b border-white/5 pb-2">Mapping Logic</h3>
            
            <div id="pointInfo" class="glass p-5 rounded-2xl mb-6 hidden">
                <p class="text-[8px] text-yellow-500 font-black uppercase mb-3 italic">Active Point Settings</p>
                <div class="space-y-3">
                    <input type="number" id="timestamp" placeholder="Audio Seconds (e.g. 12.5)" class="w-full bg-black/20 p-3 rounded-xl border border-white/10 text-xs outline-none">
                    <textarea id="quizText" placeholder="Add PYQ Question (Optional)..." class="w-full bg-black/20 p-3 rounded-xl border border-white/10 text-xs h-24 outline-none"></textarea>
                    <button onclick="confirmPoint()" class="w-full bg-[#eab308] text-black py-3 rounded-xl font-black uppercase text-[10px]">Add To Sequence</button>
                </div>
            </div>

            <div id="mapSequence" class="space-y-2">
                <p class="text-center text-[9px] text-gray-600 uppercase font-bold py-10">Click on PDF to map points</p>
            </div>
        </div>
    </div>

    <script>
        // Use same Firebase Config
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const batchId = localStorage.getItem('selectedBatchId');
        const chapterId = new URLSearchParams(window.location.search).get('id');

        let points = [];
        let tempX, tempY;

        // Load PDF
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        
        async function loadPDF() {
            // In reality, fetch this URL from your Chapter data
            const pdfUrl = 'YOUR_UPLOADED_PDF_LINK'; 
            const loadingTask = pdfjsLib.getDocument(pdfUrl);
            const pdf = await loadingTask.promise;
            const page = await pdf.getPage(1);
            const viewport = page.getViewport({ scale: 1.5 });
            const canvas = document.getElementById('pdf-canvas');
            const context = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            await page.render({ canvasContext: context, viewport }).promise;
        }

        function markPoint(e) {
            const rect = document.getElementById('pdf-canvas').getBoundingClientRect();
            tempX = e.clientX - rect.left;
            tempY = e.clientY - rect.top;

            document.getElementById('pointInfo').classList.remove('hidden');
            document.getElementById('timestamp').focus();
        }

        function confirmPoint() {
            const time = document.getElementById('timestamp').value;
            const quiz = document.getElementById('quizText').value;
            
            if(!time) return alert("Timestamp is required!");

            const point = { x: tempX, y: tempY, time: time, quiz: quiz };
            points.push(point);
            
            // Visual Marker
            const marker = document.createElement('div');
            marker.className = 'map-point';
            marker.style.left = tempX + 'px';
            marker.style.top = tempY + 'px';
            document.getElementById('marker-layer').appendChild(marker);

            renderSequence();
            document.getElementById('pointInfo').classList.add('hidden');
            document.getElementById('timestamp').value = "";
            document.getElementById('quizText').value = "";
        }

        function renderSequence() {
            const list = document.getElementById('mapSequence');
            list.innerHTML = points.sort((a,b) => a.time - b.time).map((p, i) => `
                <div class="sync-row">
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] font-black text-yellow-500">${p.time}s</span>
                        <button onclick="points.splice(${i},1); renderSequence();" class="text-red-500 text-[10px]"><i class="fa-solid fa-trash"></i></button>
                    </div>
                    <p class="text-[8px] text-gray-500 truncate mt-1">${p.quiz || 'Audio Only Point'}</p>
                </div>
            `).join('');
        }

        function saveFullMap() {
            if(points.length === 0) return alert("Add at least one point!");
            database.ref(`courses/${batchId}/ncert/${chapterId}/map`).set(points).then(() => {
                alert("Smart Map Published to Students! 🚀");
                history.back();
            });
        }

        loadPDF();
    </script>
</body>
</html>
