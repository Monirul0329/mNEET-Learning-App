<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0c101b; color: white; font-family: sans-serif; }
        #canvas-container { position: relative; overflow: auto; background: #000; border: 2px dashed #334155; margin-top: 20px; }
        .marker { position: absolute; width: 12px; height: 12px; background: #eab308; border-radius: 50%; transform: translate(-50%, -50%); border: 2px solid #000; }
    </style>
</head>
<body class="p-6">

    <div class="flex justify-between items-center mb-6">
        <button onclick="history.back()" class="bg-gray-800 px-4 py-2 rounded-xl text-xs font-bold">Back</button>
        <h2 class="text-sm font-black uppercase text-yellow-500">Interactive Line Mapper</h2>
        <div class="w-10"></div>
    </div>

    <!-- Mapping Configuration Form -->
    <div class="bg-slate-900 p-4 rounded-2xl border border-white/5 space-y-3 max-w-md mx-auto">
        <p class="text-[9px] uppercase font-bold text-gray-400">Click on PDF line first, then fill details:</p>
        <div class="grid grid-cols-2 gap-2">
            <input type="number" id="markerX" placeholder="X Coord" readonly class="bg-black/50 p-3 rounded-xl text-xs text-gray-500 outline-none">
            <input type="number" id="markerY" placeholder="Y Coord" readonly class="bg-black/50 p-3 rounded-xl text-xs text-gray-500 outline-none">
        </div>
        <input type="number" id="audioTime" placeholder="Audio Target Time (In Seconds e.g. 45)" class="w-full bg-black p-3 rounded-xl text-xs outline-none border border-white/10">
        <input type="text" id="quizText" placeholder="NEET PYQ Target Question Challenge (Optional)" class="w-full bg-black p-3 rounded-xl text-xs outline-none border border-white/10">
        <button onclick="addMappingPoint()" class="w-full bg-blue-600 py-3 rounded-xl text-xs font-black uppercase">Save Dynamic Node</button>
    </div>

    <!-- Visual Tracking Map Frame Wrapper -->
    <div id="canvas-container" class="mx-auto max-w-3xl">
        <canvas id="pdf-mapper-canvas" onclick="captureCoordinates(event)"></canvas>
        <div id="markers-layer"></div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58", authDomain: "mneet-spark.firebaseapp.com", projectId: "mneet-spark", databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com/", appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331" };
        firebase.initializeApp(firebaseConfig); const database = firebase.database();
        const params = new URLSearchParams(window.location.search);
        const batchId = localStorage.getItem('selectedBatchId') || "B001";
        const chapterId = params.get('id');
        let currentMap = [];

        async function initMapper() {
            if(!chapterId) return;
            database.ref(`courses/${batchId}/ncert/${chapterId}`).once('value', async snap => {
                const data = snap.val();
                if(data && data.pdf) {
                    currentMap = data.map || [];
                    await renderMapperPDF(data.pdf);
                    showSavedMarkers();
                }
            });
        }
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        async function renderMapperPDF(url) {
            const pdf = await pdfjsLib.getDocument(url).promise; const page = await pdf.getPage(1);
            const viewport = page.getViewport({ scale: 1.5 });
            const canvas = document.getElementById('pdf-mapper-canvas');
            canvas.height = viewport.height; canvas.width = viewport.width;
            await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
        }
        function captureCoordinates(e) {
            const rect = e.target.getBoundingClientRect();
            const x = Math.round(e.clientX - rect.left); const y = Math.round(e.clientY - rect.top);
            document.getElementById('markerX').value = x; document.getElementById('markerY').value = y;
        }
        function addMappingPoint() {
            const x = parseInt(document.getElementById('markerX').value); const y = parseInt(document.getElementById('markerY').value);
            const time = parseFloat(document.getElementById('audioTime').value); const quiz = document.getElementById('quizText').value;
            if(!x || !time) return alert("Select Point & Input Time!");
            currentMap.push({ x, y, time, quiz });
            database.ref(`courses/${batchId}/ncert/${chapterId}/map`).set(currentMap).then(() => { alert("Node Added!"); showSavedMarkers(); });
        }
        function showSavedMarkers() {
            const layer = document.getElementById('markers-layer'); layer.innerHTML = "";
            currentMap.forEach(p => {
                const m = document.createElement('div'); m.className = 'marker';
                m.style.left = p.x + 'px'; m.style.top = p.y + 'px'; layer.appendChild(m);
            });
        }
        initMapper();
    </script>
</body>
</html>
