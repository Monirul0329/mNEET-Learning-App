<script>
    function sendReply(id) {
        const replyInput = document.getElementById('reply-' + id);
        const replyText = replyInput.value;
        if(!replyText) return alert("Please type a reply!");

        database.ref(`admin/supports/${id}`).update({ 
            status: 'Replied', 
            adminReply: replyText,
            replyTime: Date.now() 
        }).then(() => {
            replyInput.value = "";
            alert("Reply Sent to Student!");
        });
    }
</script>
