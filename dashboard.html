<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNEET Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b1120; color: white; padding-bottom: 100px; font-family: sans-serif; }
        .card-navy { background-color: #16213e; border: 1px solid #1f2937; padding: 20px; border-radius: 20px; }
        .nav-btn { color: #6b7280; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: none; border: none; outline: none; }
        .nav-active { color: #eab308 !important; }
        .glass { background: rgba(22, 33, 62, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body>
    <div class="p-6 bg-[#16213e] rounded-b-[2.5rem] shadow-2xl border-b border-gray-800">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black text-[#eab308] italic">mNEET</h1>
            <div class="flex items-center gap-3">
                <div class="bg-[#eab308] text-black px-3 py-1 rounded-full text-xs font-bold shadow-lg"><span id="userCoins">0</span> BP</div>
                <button onclick="logout()" class="text-red-500 text-xl"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </div>
        <div class="bg-[#0b1120] p-4 rounded-2xl border border-gray-700">
            <div class="flex justify-between text-[10px] font-black uppercase mb-2">
                <span class="text-gray-500 tracking-widest">Course Progress</span>
                <span class="text-[#eab308] font-bold"><span id="progressText">0</span>%</span>
            </div>
            <div class="w-full bg-gray-800 h-2 rounded-full overflow-hidden">
                <div id="progressBar" class="bg-[#eab308] h-full" style="width: 0%"></div>
            </div>
        </div>
        <div class="flex justify-between gap-2 mt-6">
            <button class="flex-1 bg-gray-800/30 p-3 rounded-xl border border-gray-700 text-center">
                <i class="fa-solid fa-graduation-cap text-[#eab308]"></i>
                <p class="text-[8px] font-bold uppercase mt-1">Study</p>
            </button>
            <button class="flex-1 bg-gray-800/30 p-3 rounded-xl border border-gray-700 text-center">
                <i class="fa-solid fa-bell text-[#eab308]"></i>
                <p class="text-[8px] font-bold uppercase mt-1">Alerts</p>
            </button>
            <button class="flex-1 bg-gray-800/30 p-3 rounded-xl border border-gray-700 text-center">
                <i class="fa-solid fa-trophy text-[#eab308]"></i>
                <p class="text-[8px] font-bold uppercase mt-1">Ranks</p>
            </button>
        </div>
    </div>

    <div id="mainDisplay" class="p-6"></div>

    <div class="fixed bottom-0 left-0 right-0 glass border-t border-gray-800 flex h-20 z-50">
        <button onclick="changeTab('course')" id="tab-course" class="nav-btn nav-active"><i class="fa-solid fa-circle-play text-xl"></i><span class="text-[9px] font-bold uppercase mt-1">Course</span></button>
        <button onclick="changeTab('study')" id="tab-study" class="nav-btn"><i class="fa-solid fa-book-open-reader text-xl"></i><span class="text-[9px] font-bold uppercase mt-1">Study</span></button>
        <button onclick="changeTab('test')" id="tab-test" class="nav-btn"><i class="fa-solid fa-flask-vial text-xl"></i><span class="text-[9px] font-bold uppercase mt-1">Test</span></button>
        <button onclick="changeTab('mstore')" id="tab-mstore" class="nav-btn"><i class="fa-solid fa-shop text-xl"></i><span class="text-[9px] font-bold uppercase mt-1">mStore</span></button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

        const firebaseConfig = { /* CONFIG */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                onSnapshot(doc(db, "users", user.uid), (snap) => {
                    const d = snap.data();
                    if(d) {
                        document.getElementById('userCoins').innerText = d.coins || 0;
                        document.getElementById('progressText').innerText = d.progress || 0;
                        document.getElementById('progressBar').style.width = (d.progress || 0) + '%';
                    }
                });
                changeTab('course');
            } else { window.location.href = "index.html"; }
        });

        window.changeTab = (t) => {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            document.getElementById('tab-' + t).classList.add('nav-active');
            const el = document.getElementById('mainDisplay');
            if(t === 'course') el.innerHTML = `<p class="text-center mt-10">Loading Course Catalog...</p>`;
            else el.innerHTML = `<p class="text-center mt-10 uppercase text-[10px] tracking-widest text-gray-600">${t} is empty</p>`;
        };

        window.logout = () => signOut(auth).then(() => window.location.href="index.html");
    </script>
</body>
</html>
