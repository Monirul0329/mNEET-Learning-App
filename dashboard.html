<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNeet - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b1120; color: white; font-family: sans-serif; }
        .card-navy { background-color: #16213e; border: 1px solid #1f2937; }
        .btn-gold { background-color: #eab308; color: #0b1120; font-weight: 800; }
        .modal-bg { background-color: rgba(0, 0, 0, 0.9); display: none; }
    </style>
</head>
<body>
    <nav class="p-6 border-b border-gray-800 flex justify-between items-center bg-[#0b1120] sticky top-0 z-50">
        <h1 class="text-2xl font-black text-[#eab308] italic">mNeet</h1>
        <div class="flex items-center gap-4">
            <div class="bg-yellow-600/20 text-[#eab308] px-3 py-1 rounded-full text-xs font-bold">
                <span id="userCoins">0</span> BP
            </div>
            <button onclick="logout()" class="text-[10px] text-red-500 font-bold border border-red-900 px-2 py-1 rounded">LOGOUT</button>
        </div>
    </nav>

    <div class="p-6 max-w-lg mx-auto">
        <p id="welcomeMsg" class="text-xs text-gray-500 mb-6 uppercase tracking-widest"></p>
        <div id="courseList" class="space-y-8"></div>
    </div>

    <div id="payModal" class="modal-bg fixed inset-0 z-[100] flex items-center justify-center p-6">
        <div class="card-navy w-full max-w-md p-8 rounded-[2.5rem] text-center border-2 border-[#eab308]">
            <h2 class="text-2xl font-bold text-[#eab308] mb-2">Enroll Now</h2>
            <div class="bg-white p-4 rounded-2xl mb-4 inline-block">
                <img id="qrImg" src="" alt="QR">
            </div>
            
            <p class="text-xs text-gray-400 mb-6">Scan and pay. Then enter Transaction ID (TRX ID) below.</p>
            
            <input type="text" id="trxId" class="w-full bg-[#0b1120] border border-gray-700 p-4 rounded-xl mb-4 text-white outline-none focus:border-[#eab308]" placeholder="Enter TRX ID (e.g. 12345678)">
            
            <button onclick="submitRequest()" class="w-full btn-gold py-4 rounded-2xl uppercase shadow-lg">Submit for Approval</button>
            <button onclick="closePay()" class="text-gray-500 text-[10px] mt-6 uppercase font-bold">Cancel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, getDoc, addDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBisQytTeFhjMd1kTUNwcmCelPy7C0ilIY",
            authDomain: "mneet-7699.firebaseapp.com",
            projectId: "mneet-7699",
            storageBucket: "mneet-7699.firebasestorage.app",
            messagingSenderId: "801664280357",
            appId: "1:801664280357:web:03da6173f29bedfeaa9ccc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let selectedCourse = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userSnap = await getDoc(doc(db, "users", user.uid));
                if(userSnap.exists()){
                    const d = userSnap.data();
                    document.getElementById('welcomeMsg').innerText = `Welcome, ${d.name} (${d.city})`;
                    document.getElementById('userCoins').innerText = d.coins || 0;
                }
            } else { window.location.href = "index.html"; }
        });

        window.logout = () => signOut(auth).then(() => window.location.href = "index.html");

        window.openPay = (price, title) => {
            selectedCourse = title;
            const upi = "mt40@ptyes"; 
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=upi://pay?pa=${upi}%26pn=mNeet%26am=${price}%26cu=INR`;
            document.getElementById('qrImg').src = qrUrl;
            document.getElementById('payModal').style.display = 'flex';
        };

        window.closePay = () => document.getElementById('payModal').style.display = 'none';

        window.submitRequest = async () => {
            const trx = document.getElementById('trxId').value;
            if(!trx) return alert("Enter Transaction ID");
            
            await addDoc(collection(db, "requests"), {
                uid: auth.currentUser.uid,
                email: auth.currentUser.email,
                trxId: trx,
                courseTitle: selectedCourse,
                status: 'pending',
                timestamp: new Date()
            });
            alert("Request Sent! Admin will approve soon.");
            closePay();
        };

        onSnapshot(collection(db, "courses"), (snap) => {
            const container = document.getElementById('courseList');
            container.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                const videoHTML = data.video ? 
                    `<div class="aspect-video w-full rounded-t-[2rem] overflow-hidden">
                        <iframe width="100%" height="100%" src="https://www.youtube.com/embed/${data.video}?modestbranding=1&rel=0" frameborder="0" allowfullscreen></iframe>
                    </div>` : "";

                container.innerHTML += `
                    <div class="card-navy rounded-[2rem] overflow-hidden shadow-2xl">
                        ${videoHTML}
                        <div class="p-6">
                            <h3 class="text-2xl font-bold mb-1">${data.title}</h3>
                            <p class="text-gray-400 text-sm mb-4">${data.desc || 'Quality Education.'}</p>
                            <div class="flex justify-between items-center mt-6">
                                <span class="text-2xl font-black text-[#eab308]">₹${data.price}</span>
                                <button onclick="openPay('${data.price}', '${data.title}')" class="btn-gold px-8 py-3 rounded-xl text-sm uppercase font-bold">Enroll</button>
                            </div>
                        </div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
