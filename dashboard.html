<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body class="bg-[#0b1120] text-white p-6 pb-32">

    <div class="mb-10 text-center">
        <h2 id="dispName" class="text-3xl font-black italic uppercase">Dr. Loading...</h2>
        <div id="dispCollege" class="inline-block bg-[#eab308]/10 text-[#eab308] border border-[#eab308]/30 px-6 py-2 rounded-full text-[10px] font-black uppercase mt-2 tracking-widest">
            AIIMS DELHI (DREAM)
        </div>
    </div>

    <div class="bg-[#16213e] p-8 rounded-[3rem] border border-gray-800 text-center mb-8">
        <p class="text-[9px] text-gray-500 uppercase font-black tracking-widest mb-4">NEET 2026 Countdown</p>
        <div id="timer" class="text-3xl font-black text-[#eab308] italic tabular-nums">00 : 00 : 00 : 00</div>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-8">
        <div class="bg-[#16213e] p-6 rounded-[2.5rem] border border-gray-800 text-center">
            <h4 id="dispHours" class="text-2xl font-black">0.0h</h4>
            <p class="text-[8px] text-gray-500 uppercase font-black">Study Hours</p>
        </div>
        <div class="bg-[#16213e] p-6 rounded-[2.5rem] border border-gray-800 text-center">
            <h4 id="dispRank" class="text-[10px] font-black text-[#eab308] uppercase">Aspirant</h4>
            <p class="text-[8px] text-gray-500 uppercase font-black">Current Rank</p>
        </div>
    </div>

    <div class="bg-gradient-to-r from-yellow-500 to-orange-600 p-6 rounded-[2.5rem] text-black shadow-lg">
        <p class="text-[10px] font-black uppercase tracking-tighter">Daily Dose</p>
        <h3 class="text-lg font-black italic mt-1 leading-tight">"A surgeon is born in the library, not just the O.T."</h3>
    </div>

    <script>
        // Firebase initialization (Same as above)
        const firebaseConfig = { /* SAME AS ABOVE */ };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const userKey = localStorage.getItem('mUserEmail');

        // SYNC DATA FROM FIREBASE
        function loadDashboard() {
            if(!userKey) window.location.href = 'index.html';
            
            database.ref('users/' + userKey).on('value', (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    document.getElementById('dispName').innerText = "Dr. " + data.name;
                    document.getElementById('dispCollege').innerText = data.college + " (DREAM)";
                    document.getElementById('dispHours').innerText = data.hours + "h";
                    document.getElementById('dispRank').innerText = data.rank;
                }
            });
        }
        loadDashboard();

        // COUNTDOWN TIMER LOGIC
        setInterval(() => {
            const target = new Date("May 3, 2026 10:00:00").getTime();
            const now = new Date().getTime();
            const d = target - now;
            const days = Math.floor(d / 86400000), hours = Math.floor((d % 86400000) / 3600000), mins = Math.floor((d % 3600000) / 60000), secs = Math.floor((d % 60000) / 1000);
            document.getElementById('timer').innerText = `${days} : ${hours} : ${mins} : ${secs}`;
        }, 1000);
    </script>
</body>
</html>
