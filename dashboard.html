<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNEET - Student Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b1120; color: white; font-family: 'Inter', sans-serif; padding-bottom: 80px; }
        .card-navy { background-color: #16213e; border: 1px solid #1f2937; }
        .text-gold { color: #eab308; }
        .bg-gold { background-color: #eab308; }
        .nav-active { color: #eab308; border-top: 2px solid #eab308; }
    </style>
</head>
<body>
    <div class="p-6 bg-[#16213e] rounded-b-[2.5rem] shadow-2xl border-b border-gray-800">
        <div class="flex justify-between items-start mb-6">
            <div>
                <h1 class="text-3xl font-black text-gold italic">mNEET</h1>
                <p id="userName" class="text-xs text-gray-400 mt-1 uppercase tracking-widest">Loading...</p>
            </div>
            <button onclick="logout()" class="text-red-500 text-xl"><i class="fa-solid fa-power-off"></i></button>
        </div>

        <div class="flex gap-4 items-center mb-4">
            <div class="flex-1 bg-[#0b1120] p-4 rounded-2xl border border-gray-700 flex items-center justify-between">
                <div>
                    <p class="text-[10px] text-gray-500 uppercase font-bold">BP Balance</p>
                    <p id="userCoins" class="text-2xl font-black text-gold">0</p>
                </div>
                <i class="fa-solid fa-coins text-3xl text-gold opacity-50"></i>
            </div>
            <div class="flex-1 bg-[#0b1120] p-4 rounded-2xl border border-gray-700">
                <p class="text-[10px] text-gray-500 uppercase font-bold mb-1">Course Progress</p>
                <div class="w-full bg-gray-800 h-2 rounded-full mt-2">
                    <div id="progressBar" class="bg-gold h-2 rounded-full" style="width: 0%"></div>
                </div>
                <p class="text-right text-[10px] mt-1 text-gold font-bold"><span id="progressText">0</span>%</p>
            </div>
        </div>

        <div class="flex justify-between gap-2 mt-4 text-center">
            <button class="flex-1 bg-gray-800/50 p-3 rounded-xl border border-gray-700">
                <i class="fa-solid fa-book-open text-gold mb-1"></i>
                <p class="text-[10px] font-bold uppercase">Study</p>
            </button>
            <button class="flex-1 bg-gray-800/50 p-3 rounded-xl border border-gray-700">
                <i class="fa-solid fa-bell text-gold mb-1"></i>
                <p class="text-[10px] font-bold uppercase">Notify</p>
            </button>
            <button class="flex-1 bg-gray-800/50 p-3 rounded-xl border border-gray-700">
                <i class="fa-solid fa-trophy text-gold mb-1"></i>
                <p class="text-[10px] font-bold uppercase">Rank</p>
            </button>
        </div>
    </div>

    <div id="mainContent" class="p-6">
        <div id="courseList" class="space-y-6">
            </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-[#16213e] border-t border-gray-800 flex justify-around p-3 z-50 shadow-2xl">
        <button onclick="changePage('store')" class="flex flex-col items-center text-gray-500 nav-active" id="btn-store">
            <i class="fa-solid fa-cart-shopping text-lg"></i>
            <span class="text-[9px] uppercase font-bold mt-1">Store</span>
        </button>
        <button onclick="changePage('study')" class="flex flex-col items-center text-gray-500" id="btn-study">
            <i class="fa-solid fa-graduation-cap text-lg"></i>
            <span class="text-[9px] uppercase font-bold mt-1">Study</span>
        </button>
        <button onclick="changePage('test')" class="flex flex-col items-center text-gray-500" id="btn-test">
            <i class="fa-solid fa-file-lines text-lg"></i>
            <span class="text-[9px] uppercase font-bold mt-1">Test</span>
        </button>
        <button onclick="changePage('mstore')" class="flex flex-col items-center text-gray-500" id="btn-mstore">
            <i class="fa-solid fa-store text-lg"></i>
            <span class="text-[9px] uppercase font-bold mt-1">mStore</span>
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, doc, getDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

        const firebaseConfig = { /* Apnar config ekhane thakbe */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                onSnapshot(doc(db, "users", user.uid), (snap) => {
                    const d = snap.data();
                    document.getElementById('userName').innerText = d.name;
                    document.getElementById('userCoins').innerText = d.coins || 0;
                    document.getElementById('progressText').innerText = d.progress || 0;
                    document.getElementById('progressBar').style.width = (d.progress || 0) + '%';
                });
            } else { window.location.href = "index.html"; }
        });

        window.logout = () => signOut(auth).then(() => window.location.href="index.html");

        window.changePage = (page) => {
            // Logic for different pages like Study, Test, mStore
            console.log("Navigating to: " + page);
        };
    </script>
</body>
</html>
