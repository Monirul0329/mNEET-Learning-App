<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style> .glass { background: rgba(22,33,62,0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); } </style>
</head>
<body class="bg-[#0b1120] text-white p-5 pb-32 font-sans">

    <div id="notif-bar" class="hidden mb-6 bg-red-600/20 border border-red-500/30 p-4 rounded-3xl flex items-center gap-3">
        <i class="fa-solid fa-bullhorn text-red-500 animate-bounce"></i>
        <p id="notif-text" class="text-[10px] font-black uppercase tracking-tighter">ALERT MESSAGE</p>
    </div>

    <div class="flex justify-between items-center mb-8">
        <div><h2 id="uName" class="text-xl font-black italic uppercase text-[#eab308]">DR. LOADER</h2><p id="uCollege" class="text-[8px] text-gray-500 font-black tracking-widest italic uppercase">AIIMS DELHI</p></div>
        <div id="uRank" class="bg-[#eab308] text-black px-4 py-1 rounded-full text-[9px] font-black uppercase italic">Aspirant</div>
    </div>

    <div class="glass p-6 rounded-[2.5rem] mb-6 text-center border-yellow-500/20">
        <p class="text-[7px] text-gray-500 uppercase font-black mb-2 tracking-[0.3em]">NEET 2026 BATTLE</p>
        <div id="timer" class="text-xl font-black italic text-[#eab308]">00D : 00H : 00M : 00S</div>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-8">
        <div class="glass p-6 rounded-[2.5rem] text-center border-red-500/10">
            <i class="fa-solid fa-satellite-dish text-red-500 mb-2"></i>
            <h4 class="text-[10px] font-black uppercase italic">Live Now</h4>
        </div>
        <div class="glass p-6 rounded-[2.5rem] text-center border-blue-500/10">
            <i class="fa-solid fa-folder-open text-blue-400 mb-2"></i>
            <h4 class="text-[10px] font-black uppercase italic">Notes</h4>
        </div>
    </div>

    <h3 class="text-[10px] font-black uppercase mb-4 tracking-widest text-gray-500">Recent Materials</h3>
    <div id="matList" class="space-y-3"></div>

    <a href="https://wa.me/YOUR_NUM" class="fixed bottom-24 right-6 w-12 h-12 bg-green-500 rounded-full flex items-center justify-center shadow-2xl z-50 animate-bounce"><i class="fa-brands fa-whatsapp text-white text-2xl"></i></a>

    <nav class="fixed bottom-6 left-6 right-6 glass p-4 rounded-full flex justify-around shadow-2xl border-white/5">
        <i class="fa-solid fa-house text-[#eab308]"></i>
        <i class="fa-solid fa-book-open text-gray-500"></i>
        <i class="fa-solid fa-vial text-gray-500"></i>
        <i class="fa-solid fa-user-doctor text-gray-500"></i>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58",
            authDomain: "mneet-spark.firebaseapp.com",
            projectId: "mneet-spark",
            databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com/",
            appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const userKey = localStorage.getItem('mUserEmail');

        function sync() {
            if(!userKey) window.location.href = 'index.html';
            
            // Sync User
            database.ref('users/' + userKey).on('value', (s) => {
                const d = s.val(); if(d){ 
                    document.getElementById('uName').innerText = "DR. " + d.name.toUpperCase();
                    document.getElementById('uCollege').innerText = d.college.toUpperCase();
                    document.getElementById('uRank').innerText = d.rank;
                }
            });

            // Sync Notif
            database.ref('admin/notification').on('value', (s) => {
                const v = s.val(); const b = document.getElementById('notif-bar');
                if(v && v.active){ b.classList.remove('hidden'); document.getElementById('notif-text').innerText = v.msg; }
                else b.classList.add('hidden');
            });

            // Sync Materials
            database.ref('materials').limitToLast(5).on('value', (s) => {
                const list = document.getElementById('matList'); list.innerHTML = "";
                s.forEach(c => {
                    const m = c.val();
                    list.innerHTML += `<a href="${m.link}" class="glass p-4 rounded-2xl flex justify-between items-center border-white/5">
                        <p class="text-[10px] font-black italic uppercase">${m.title}</p><i class="fa-solid fa-chevron-right text-gray-600 text-xs"></i>
                    </a>`;
                });
            });
        }
        sync();

        // TIMER 2026
        setInterval(() => {
            const diff = new Date("May 3, 2026 10:00:00") - new Date();
            const d = Math.floor(diff/86400000), h = Math.floor((diff/3600000)%24), m = Math.floor((diff/60000)%60), s = Math.floor((diff/1000)%60);
            document.getElementById('timer').innerText = `${d}D : ${h}H : ${m}M : ${s}S`;
        }, 1000);
    </script>
</body>
</html>
