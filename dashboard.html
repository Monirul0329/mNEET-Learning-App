<script>
    // ... (Firebase Config setup same as above)
    function init() {
        if(!userKey) window.location.href = 'index.html';
        
        // Sync Coins & Profile
        database.ref('users/' + userKey).on('value', s => {
            const u = s.val() || {};
            document.getElementById('uCoins').innerText = u.coins || 0;
            document.getElementById('sLectures').innerText = (u.hours || 0) + 'h';
            document.getElementById('sStudy').innerText = (u.selfStudy || 0.0) + 'h';
            document.getElementById('sMCQs').innerText = u.questions || 0;
            document.getElementById('uName').innerText = (u.name || "Aspirant").toUpperCase();
        });

        // Load Batches that student is enrolled in
        database.ref('courses').on('value', snap => {
            const select = document.getElementById('activeBatch');
            select.innerHTML = '<option value="">-- SWITCH ACTIVE BATCH --</option>';
            snap.forEach(child => { 
                if(!child.val().isHidden) select.innerHTML += `<option value="${child.key}">${child.val().title}</option>`; 
            });
        });
    }

    function syncBatchData(id) {
        if(!id) return;
        localStorage.setItem('selectedBatchId', id); // Store selection for other pages
        database.ref('courses/' + id).on('value', s => {
            const b = s.val();
            document.getElementById('progPercent').innerText = b.progress + "%";
            document.getElementById('progBar').style.width = b.progress + "%";
            if(b.examDate) startTimer(b.examDate);
        });
    }
    // ... countdown timer logic as original
</script>
