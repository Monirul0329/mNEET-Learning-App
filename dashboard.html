<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(22, 33, 62, 0.75); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .gold-glow { color: #eab308; text-shadow: 0 0 15px rgba(234, 179, 8, 0.4); }
        body { background: #070b14; color: white; }
        .timer-box { display: flex; flex-direction: column; align-items: center; }
        .timer-label { font-size: 7px; text-transform: uppercase; margin-bottom: 4px; color: #6b7280; font-weight: 900; }
    </style>
</head>
<body class="p-4 pb-36">

    <div class="flex justify-between items-start mb-6">
        <div>
            <h2 id="uName" class="text-xl font-black italic gold-glow uppercase">DR. MONIRUL</h2>
            <p class="text-[10px] text-gray-500 font-bold uppercase italic">AIIMS (TARGET)</p>
        </div>
        <div class="flex gap-2">
            <div class="bg-yellow-500/10 px-3 py-1.5 rounded-full border border-yellow-500/20 text-xs font-black">🪙 <span id="uCoins">0</span> BP</div>
            <button onclick="logout()" class="w-9 h-9 bg-red-500/10 text-red-500 rounded-full border border-red-500/20"><i class="fa-solid fa-power-off text-sm"></i></button>
        </div>
    </div>

    <div class="glass p-8 rounded-[3rem] mb-6 border-b-4 border-[#eab308]/30">
        <p class="text-[8px] text-gray-500 uppercase font-black tracking-[0.4em] mb-6 text-center">COUNTDOWN TO VICTORY</p>
        <div class="flex justify-around items-center">
            <div class="timer-box"><span class="timer-label">Days</span><span id="d_d" class="text-2xl font-black italic gold-glow">000</span></div>
            <span class="text-xl opacity-20 font-black">:</span>
            <div class="timer-box"><span class="timer-label">Hours</span><span id="d_h" class="text-2xl font-black italic gold-glow">00</span></div>
            <span class="text-xl opacity-20 font-black">:</span>
            <div class="timer-box"><span class="timer-label">Minutes</span><span id="d_m" class="text-2xl font-black italic gold-glow">00</span></div>
            <span class="text-xl opacity-20 font-black">:</span>
            <div class="timer-box"><span class="timer-label">Seconds</span><span id="d_s" class="text-2xl font-black italic gold-glow">00</span></div>
        </div>
    </div>

    <div class="grid grid-cols-3 gap-3 mb-8">
        <div class="glass p-4 rounded-3xl text-center border-b-2 border-blue-500">
            <h4 id="sLectures" class="text-lg font-black text-blue-400 drop-shadow-md">0.0h</h4>
            <p class="text-[7px] text-gray-400 uppercase font-black mt-1">Lectures</p>
        </div>
        <div class="glass p-4 rounded-3xl text-center border-b-2 border-green-500">
            <h4 id="sStudy" class="text-lg font-black text-green-400 drop-shadow-md">0.0h</h4>
            <p class="text-[7px] text-gray-400 uppercase font-black mt-1">Self Study</p>
        </div>
        <div class="glass p-4 rounded-3xl text-center border-b-2 border-yellow-500">
            <h4 id="sMCQs" class="text-lg font-black gold-glow">0</h4>
            <p class="text-[7px] text-gray-400 uppercase font-black mt-1">Total MCQs</p>
        </div>
    </div>

    <div class="glass rounded-[2.5rem] overflow-hidden border border-white/5 mb-8">
        <div class="h-48 relative bg-black">
            <img id="thumbImg" src="https://via.placeholder.com/400x200/16213e/FFFFFF?text=NEET+2026+PRO" class="w-full h-full object-cover">
            <video id="thumbVid" class="hidden w-full h-full object-cover" loop muted playsinline>
                <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            </video>
        </div>
        <div class="p-6">
            <h4 class="text-lg font-black uppercase italic italic mb-1">NEET 2026 Ultimate Pro</h4>
            <div class="flex justify-between items-center mt-4">
                <span class="text-xl font-black gold-glow">₹4,999</span>
                <button class="bg-[#eab308] text-black px-8 py-3 rounded-2xl text-[10px] font-black uppercase">Start Learning</button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-6 left-6 right-6 glass p-4 rounded-full flex justify-around shadow-2xl border-white/10 z-50">
        <i class="fa-solid fa-house gold-glow"></i>
        <a href="study.html"><i class="fa-solid fa-book-open text-gray-500"></i></a>
        <a href="test.html"><i class="fa-solid fa-pen-nib text-gray-500"></i></a>
        <a href="mstore.html"><i class="fa-solid fa-store text-gray-500"></i></a>
    </nav>

    <script>
        // 5s Image to Video Logic
        setTimeout(() => {
            document.getElementById('thumbImg').classList.add('hidden');
            const v = document.getElementById('thumbVid');
            v.classList.remove('hidden');
            v.play();
        }, 5000);

        // Vertical Timer Logic
        setInterval(() => {
            const diff = new Date("May 3, 2026 10:00:00") - new Date();
            if(diff <= 0) return;
            document.getElementById('d_d').innerText = Math.floor(diff/86400000);
            document.getElementById('d_h').innerText = Math.floor((diff/3600000)%24);
            document.getElementById('d_m').innerText = Math.floor((diff/60000)%60);
            document.getElementById('d_s').innerText = Math.floor((diff/1000)%60);
        }, 1000);
    </script>
</body>
    </html>
