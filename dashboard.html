<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNeet - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b1120; color: white; font-family: sans-serif; }
        .card-navy { background-color: #16213e; border: 1px solid #1f2937; }
        .btn-gold { background-color: #eab308; color: #0b1120; font-weight: 800; }
        .text-gold { color: #eab308; }
    </style>
</head>
<body>
    <nav class="p-6 border-b border-gray-800 flex justify-between items-center sticky top-0 bg-[#0b1120] z-50">
        <h1 class="text-3xl font-black text-gold italic tracking-tighter">mNeet</h1>
        <button onclick="window.location.href='index.html'" class="bg-red-900/20 text-red-400 px-4 py-1 rounded-full text-xs border border-red-800 uppercase font-bold">Logout</button>
    </nav>

    <div class="p-6 max-w-lg mx-auto">
        <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
            <span class="w-2 h-6 bg-gold rounded-full"></span> My Courses
        </h2>
        
        <div id="courseList" class="space-y-6">
            <p class="text-gray-600 italic text-center py-10">Fetching your courses...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBisQytTeFhjMd1kTUNwcmCelPy7C0ilIY",
          authDomain: "mneet-7699.firebaseapp.com",
          projectId: "mneet-7699",
          storageBucket: "mneet-7699.firebasestorage.app",
          messagingSenderId: "801664280357",
          appId: "1:801664280357:web:03da6173f29bedfeaa9ccc",
          measurementId: "G-EFNE8HTGZ3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        onSnapshot(collection(db, "courses"), (snap) => {
            const container = document.getElementById('courseList');
            container.innerHTML = "";
            if(snap.empty) container.innerHTML = "<p class='text-gray-500 text-center'>No courses found.</p>";
            
            snap.forEach(d => {
                const data = d.data();
                container.innerHTML += `
                    <div class="card-navy p-6 rounded-[2rem] shadow-xl relative overflow-hidden">
                        <div class="absolute top-0 right-0 bg-gold px-4 py-1 rounded-bl-2xl text-[10px] text-[#0b1120] font-black uppercase">Active</div>
                        <h3 class="text-2xl font-bold mb-1">${data.title}</h3>
                        <p class="text-gold font-mono font-bold text-lg mb-6 tracking-wide">₹${data.price}</p>
                        <button class="w-full btn-gold py-4 rounded-2xl text-sm uppercase tracking-widest shadow-lg active:scale-95 transition-transform">
                            Enroll Now
                        </button>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
