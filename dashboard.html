<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNeet - My Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b1120; color: white; font-family: sans-serif; }
        .card-navy { background-color: #16213e; border: 1px solid #1f2937; }
        .btn-gold { background-color: #eab308; color: #0b1120; font-weight: 800; }
        .modal { background-color: rgba(0,0,0,0.9); }
    </style>
</head>
<body>
    <nav class="p-6 border-b border-gray-800 flex justify-between items-center bg-[#0b1120] sticky top-0 z-50">
        <h1 class="text-2xl font-black text-[#eab308] italic">mNeet</h1>
        <button onclick="window.location.href='index.html'" class="text-xs text-gray-500 uppercase font-bold">Logout</button>
    </nav>

    <div class="p-6 max-w-lg mx-auto">
        <h2 class="text-xl font-bold mb-6">Explore Courses</h2>
        <div id="courseList" class="space-y-8"></div>
    </div>

    <div id="payModal" class="modal hidden fixed inset-0 flex items-center justify-center p-6 z-[100]">
        <div class="card-navy w-full max-w-md p-8 rounded-[2.5rem] text-center border-2 border-[#eab308]">
            <h2 class="text-2xl font-bold text-[#eab308] mb-4">Payment Required</h2>
            <p class="text-sm text-gray-400 mb-6">Pay <span id="payAmt" class="text-white font-bold"></span> via UPI to unlock.</p>
            <div class="bg-white p-4 rounded-2xl mb-6 inline-block">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=YOUR_UPI_ID" alt="Payment QR">
            </div>
            <button onclick="closePay()" class="w-full btn-gold py-4 rounded-2xl uppercase">Close</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBisQytTeFhjMd1kTUNwcmCelPy7C0ilIY",
            authDomain: "mneet-7699.firebaseapp.com",
            projectId: "mneet-7699",
            storageBucket: "mneet-7699.firebasestorage.app",
            messagingSenderId: "801664280357",
            appId: "1:801664280357:web:03da6173f29bedfeaa9ccc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.openPay = (price) => {
            document.getElementById('payAmt').innerText = "₹" + price;
            document.getElementById('payModal').classList.remove('hidden');
        };
        window.closePay = () => document.getElementById('payModal').classList.add('hidden');

        onSnapshot(collection(db, "courses"), (snap) => {
            const container = document.getElementById('courseList');
            container.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                const videoHTML = data.video ? 
                    `<div class="aspect-video w-full rounded-t-[2rem] overflow-hidden">
                        <iframe class="w-full h-full" src="https://www.youtube.com/embed/${data.video}" frameborder="0" allowfullscreen></iframe>
                    </div>` : 
                    `<div class="h-48 bg-gray-800 flex items-center justify-center text-gray-600 rounded-t-[2rem]">No Preview Video</div>`;

                container.innerHTML += `
                    <div class="card-navy rounded-[2rem] overflow-hidden shadow-2xl">
                        ${videoHTML}
                        <div class="p-6">
                            <h3 class="text-2xl font-bold mb-2">${data.title}</h3>
                            <p class="text-gray-400 text-sm mb-4">${data.desc || 'No description.'}</p>
                            <div class="flex justify-between items-center mt-6">
                                <span class="text-2xl font-black text-[#eab308]">₹${data.price}</span>
                                <button onclick="openPay('${data.price}')" class="btn-gold px-8 py-3 rounded-xl text-sm uppercase font-bold">Enroll Now</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
