<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNeet - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b1120; color: white; font-family: sans-serif; }
        .card-navy { background-color: #16213e; border: 1px solid #1f2937; }
        .btn-gold { background-color: #eab308; color: #0b1120; font-weight: 800; }
        .modal-bg { background-color: rgba(0, 0, 0, 0.95); display: none; }
    </style>
</head>
<body>
    <nav class="p-5 border-b border-gray-800 flex justify-between items-center bg-[#0b1120] sticky top-0 z-50">
        <h1 class="text-2xl font-black text-[#eab308] italic">mNeet</h1>
        <div class="flex items-center gap-3">
            <div class="bg-yellow-600/20 text-[#eab308] px-3 py-1 rounded-full text-xs font-bold border border-yellow-600/50">
                <span id="userCoins">0</span> BP
            </div>
            <button onclick="logout()" class="text-[10px] text-red-500 font-bold uppercase border border-red-900 px-2 py-1 rounded">Logout</button>
        </div>
    </nav>

    <div class="p-6 max-w-lg mx-auto">
        <p id="welcomeMsg" class="text-[10px] text-gray-500 mb-6 uppercase tracking-widest text-center"></p>
        <div id="courseList" class="space-y-10"></div>
    </div>

    <div id="payModal" class="modal-bg fixed inset-0 z-[100] flex items-center justify-center p-6">
        <div class="card-navy w-full max-w-md p-8 rounded-[2.5rem] text-center border-2 border-[#eab308]">
            <h2 class="text-2xl font-bold text-[#eab308] mb-4">Confirm Payment</h2>
            <div class="bg-white p-4 rounded-2xl mb-6 inline-block shadow-lg">
                <img id="qrImg" src="" alt="QR">
            </div>
            <input type="text" id="trxId" class="w-full bg-[#0b1120] border border-gray-700 p-4 rounded-xl mb-6 text-white outline-none focus:border-[#eab308]" placeholder="Enter Transaction ID">
            <button onclick="submitRequest()" class="w-full btn-gold py-4 rounded-2xl uppercase">Submit Request</button>
            <button onclick="closePay()" class="text-gray-500 text-[10px] mt-6 uppercase font-bold tracking-widest">Cancel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, getDoc, addDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

        const firebaseConfig = { /* Same as index.html */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let selectedCourse = "";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "users", user.uid));
                if(snap.exists()){
                    const d = snap.data();
                    if(d.isBlocked) { alert("Blocked!"); signOut(auth); window.location.href="index.html"; }
                    document.getElementById('welcomeMsg').innerText = `Learning as: ${d.name} (${d.city})`;
                    document.getElementById('userCoins').innerText = d.coins || 0;
                }
            } else { window.location.href = "index.html"; }
        });

        window.logout = () => signOut(auth).then(() => window.location.href = "index.html");

        window.openPay = (price, title) => {
            selectedCourse = title;
            const upi = "mt40@ptyes"; 
            document.getElementById('qrImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=upi://pay?pa=${upi}%26pn=mNeet%26am=${price}%26cu=INR`;
            document.getElementById('payModal').style.display = 'flex';
        };

        window.closePay = () => document.getElementById('payModal').style.display = 'none';

        window.submitRequest = async () => {
            const trx = document.getElementById('trxId').value;
            if(!trx) return alert("Transaction ID required");
            await addDoc(collection(db, "requests"), {
                uid: auth.currentUser.uid, email: auth.currentUser.email,
                trxId: trx, courseTitle: selectedCourse, status: 'pending', timestamp: new Date()
            });
            alert("Sent for approval!"); closePay();
        };

        onSnapshot(collection(db, "courses"), (snap) => {
            const container = document.getElementById('courseList');
            container.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                const videoHTML = data.video ? `<div class="aspect-video w-full rounded-t-[2rem] overflow-hidden"><iframe width="100%" height="100%" src="https://www.youtube.com/embed/${data.video}?modestbranding=1&rel=0" frameborder="0" allowfullscreen></iframe></div>` : "";
                container.innerHTML += `<div class="card-navy rounded-[2rem] overflow-hidden shadow-2xl">${videoHTML}<div class="p-6 text-left"><h3 class="text-2xl font-bold mb-1">${data.title}</h3><p class="text-gray-400 text-sm mb-6">${data.desc || 'Best Course.'}</p><div class="flex justify-between items-center"><span class="text-2xl font-black text-[#eab308]">₹${data.price}</span><button onclick="openPay('${data.price}', '${data.title}')" class="btn-gold px-8 py-3 rounded-xl text-xs uppercase font-black">Enroll Now</button></div></div></div>`;
            });
        });
    </script>
</body>
</html>
