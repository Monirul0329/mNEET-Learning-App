<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNEET - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body style="background-color: #0a1128; color: white; font-family: sans-serif;">
    <nav class="p-5 border-b border-gray-800 flex justify-between items-center bg-[#0a1128]">
        <h1 style="color: #d97706;" class="text-2xl font-bold uppercase tracking-tighter">mNEET</h1>
        <button onclick="window.location.href='index.html'" class="bg-red-900/20 text-red-400 px-4 py-1 rounded text-xs border border-red-800">Logout</button>
    </nav>

    <div class="p-6 max-w-lg mx-auto">
        <h2 class="text-xl font-bold mb-6">Available Courses</h2>
        <div id="courseList" class="space-y-4">
            <p class="text-gray-600 italic">Fetching courses...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBisQytTeFhjMd1kTUNwcmCelPy7C0ilIY",
          authDomain: "mneet-7699.firebaseapp.com",
          projectId: "mneet-7699",
          storageBucket: "mneet-7699.firebasestorage.app",
          messagingSenderId: "801664280357",
          appId: "1:801664280357:web:03da6173f29bedfeaa9ccc",
          measurementId: "G-EFNE8HTGZ3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        onSnapshot(collection(db, "courses"), (snap) => {
            const container = document.getElementById('courseList');
            container.innerHTML = "";
            if(snap.empty) container.innerHTML = "<p class='text-gray-600'>No courses available yet.</p>";
            snap.forEach(d => {
                const data = d.data();
                container.innerHTML += `
                    <div style="background-color: #16213e; border: 1px solid #1f2937;" class="p-5 rounded-2xl shadow-lg border-l-4 border-[#d97706]">
                        <h3 class="text-lg font-bold">${data.title}</h3>
                        <p style="color: #d97706;" class="font-bold mb-4">₹${data.price}</p>
                        <button class="w-full py-2 bg-gray-700 rounded-lg text-xs font-bold uppercase tracking-widest">Enroll Now</button>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
