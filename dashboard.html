<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNEET Student</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b1120; color: white; padding-bottom: 100px; }
        .nav-btn { color: #6b7280; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .nav-active { color: #eab308 !important; }
        .glass { background: rgba(22, 33, 62, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body>

    <div class="p-6 bg-[#16213e] rounded-b-[2.5rem] border-b border-gray-800">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black text-[#eab308] italic">mNEET</h1>
            <div class="bg-[#eab308] text-black px-3 py-1 rounded-full text-xs font-bold">0 BP</div>
        </div>
        <div class="w-full bg-gray-800 h-2 rounded-full mt-4 overflow-hidden">
            <div class="bg-[#eab308] h-full" style="width: 10%"></div>
        </div>
    </div>

    <div id="mainDisplay" class="p-6"></div>

    <div class="fixed bottom-0 left-0 right-0 glass border-t border-gray-800 flex h-20 z-50">
        <button onclick="tab('course')" id="tab-course" class="nav-btn nav-active">
            <i class="fa-solid fa-play-circle text-xl"></i>
            <span class="text-[9px] font-bold uppercase mt-1">Course</span>
        </button>
        <button onclick="tab('study')" id="tab-study" class="nav-btn">
            <i class="fa-solid fa-book-open text-xl"></i>
            <span class="text-[9px] font-bold uppercase mt-1">Study</span>
        </button>
        <button onclick="tab('test')" id="tab-test" class="nav-btn">
            <i class="fa-solid fa-flask text-xl"></i>
            <span class="text-[9px] font-bold uppercase mt-1">Test</span>
        </button>
        <button onclick="tab('mstore')" id="tab-mstore" class="nav-btn">
            <i class="fa-solid fa-shop text-xl"></i>
            <span class="text-[9px] font-bold uppercase mt-1">mStore</span>
        </button>
    </div>

    <script type="module">
        window.tab = (t) => {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            document.getElementById('tab-' + t).classList.add('nav-active');
            document.getElementById('mainDisplay').innerHTML = `<p class="text-center mt-10">Loading ${t}...</p>`;
        };
        document.addEventListener('DOMContentLoaded', () => tab('course'));
    </script>
</body>
</html>
