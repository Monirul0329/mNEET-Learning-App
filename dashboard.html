<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNeet - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b1120; color: white; font-family: sans-serif; }
        .card-navy { background-color: #16213e; border: 1px solid #1f2937; }
        .btn-gold { background-color: #eab308; color: #0b1120; font-weight: 800; }
        .text-gold { color: #eab308; }
    </style>
</head>
<body>
    <nav class="p-6 border-b border-gray-800 flex justify-between items-center bg-[#0b1120] sticky top-0 z-50">
        <h1 class="text-2xl font-black text-gold italic">mNeet</h1>
        <button onclick="window.location.href='index.html'" class="text-xs text-gray-500 uppercase font-bold">Logout</button>
    </nav>

    <div class="p-6 max-w-lg mx-auto">
        <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
            <span class="w-2 h-6 bg-gold rounded-full"></span> Available Courses
        </h2>
        <div id="courseList" class="space-y-8"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBisQytTeFhjMd1kTUNwcmCelPy7C0ilIY",
            authDomain: "mneet-7699.firebaseapp.com",
            projectId: "mneet-7699",
            storageBucket: "mneet-7699.firebasestorage.app",
            messagingSenderId: "801664280357",
            appId: "1:801664280357:web:03da6173f29bedfeaa9ccc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // DIRECT PAYMENT FUNCTION
        window.payNow = (price, title) => {
            const upiId = "mt40@ptyes"; // <--- EKHANE APNAR UPI ID BOSHAN (e.g. 9876543210@ybl)
            const name = "mNeet Learning";
            const amount = price;
            const note = "Enroll for " + title;
            
            // UPI Deep Link - PhonePe, GPay, Paytm sob app-er option auto ashbe
            const upiUrl = `upi://pay?pa=${upiId}&pn=${encodeURIComponent(name)}&am=${amount}&tn=${encodeURIComponent(note)}&cu=INR`;
            
            window.location.href = upiUrl;
        };

        onSnapshot(collection(db, "courses"), (snap) => {
            const container = document.getElementById('courseList');
            container.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                const videoHTML = data.video ? 
                    `<div class="aspect-video w-full rounded-t-[2rem] overflow-hidden">
                        <iframe width="100%" height="100%" src="https://www.youtube.com/embed/${data.video}" frameborder="0" allowfullscreen></iframe>
                    </div>` : 
                    `<div class="h-48 bg-gray-800 flex items-center justify-center text-gray-600 rounded-t-[2rem]">No Video Preview</div>`;

                container.innerHTML += `
                    <div class="card-navy rounded-[2rem] overflow-hidden shadow-2xl mb-8">
                        ${videoHTML}
                        <div class="p-6">
                            <h3 class="text-2xl font-bold mb-1">${data.title}</h3>
                            <p class="text-gray-400 text-sm mb-4">${data.desc || 'Best study material for NEET preparation.'}</p>
                            <div class="flex justify-between items-center mt-6">
                                <span class="text-2xl font-black text-gold">₹${data.price}</span>
                                <button onclick="payNow('${data.price}', '${data.title}')" class="btn-gold px-8 py-3 rounded-xl text-sm uppercase font-bold shadow-lg">
                                    Enroll Now
                                </button>
                            </div>
                        </div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
