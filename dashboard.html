<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(22, 33, 62, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .gold-text { color: #eab308; text-shadow: 0 0 15px rgba(234, 179, 8, 0.3); }
    </style>
</head>
<body class="bg-[#0b1120] text-white p-5 pb-32">

    <div id="notif-bar" class="hidden mb-6 bg-red-500/20 border border-red-500/50 p-4 rounded-3xl flex items-center gap-4">
        <i class="fa-solid fa-bullhorn text-red-500 animate-bounce"></i>
        <p id="notif-text" class="text-[11px] font-bold uppercase tracking-tighter">New Live Class at 8:00 PM!</p>
    </div>

    <div class="flex justify-between items-center mb-10">
        <div>
            <h2 id="uName" class="text-2xl font-black italic gold-text">DR. MONIRUL</h2>
            <p id="uCollege" class="text-[10px] text-gray-400 font-bold uppercase tracking-widest italic">Target: AIIMS Delhi</p>
        </div>
        <div class="text-right">
            <div id="uRank" class="bg-[#eab308] text-black px-4 py-1 rounded-full text-[10px] font-black uppercase italic">Aspirant</div>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-8">
        <a href="live.html" class="glass p-5 rounded-[2.5rem] flex flex-col items-center text-center">
            <div class="w-10 h-10 rounded-full bg-red-600/20 flex items-center justify-center mb-3">
                <i class="fa-solid fa-satellite-dish text-red-500 animate-pulse"></i>
            </div>
            <h4 class="text-xs font-black uppercase italic">Live Class</h4>
            <p class="text-[8px] text-gray-500 mt-1 uppercase font-bold">Join Now</p>
        </a>

        <a href="materials.html" class="glass p-5 rounded-[2.5rem] flex flex-col items-center text-center">
            <div class="w-10 h-10 rounded-full bg-blue-600/20 flex items-center justify-center mb-3">
                <i class="fa-solid fa-file-pdf text-blue-400"></i>
            </div>
            <h4 class="text-xs font-black uppercase italic">Notes & DPP</h4>
            <p class="text-[8px] text-gray-500 mt-1 uppercase font-bold">New Updated</p>
        </a>
    </div>

    <div class="glass p-6 rounded-[3rem] mb-8">
        <div class="flex justify-around border-b border-white/5 pb-4 mb-4">
            <div class="text-center">
                <h3 id="uHours" class="text-xl font-black">4.5h</h3>
                <p class="text-[8px] text-gray-400 font-bold uppercase tracking-widest">Study</p>
            </div>
            <div class="text-center">
                <h3 id="uQs" class="text-xl font-black">120</h3>
                <p class="text-[8px] text-gray-400 font-bold uppercase tracking-widest">MCQs</p>
            </div>
        </div>
        <p class="text-[8px] text-center text-gray-500 uppercase font-black mb-2">NEET Battle Starts In</p>
        <div id="timer" class="text-center text-xl font-black tracking-tighter gold-text italic tabular-nums">00 : 00 : 00 : 00</div>
    </div>

    <a href="https://wa.me/YOUR_NUMBER" class="fixed bottom-28 right-6 w-14 h-14 bg-green-500 rounded-full flex items-center justify-center shadow-2xl z-50 animate-bounce">
        <i class="fa-brands fa-whatsapp text-white text-3xl"></i>
    </a>

    <nav class="fixed bottom-6 left-6 right-6 glass p-4 rounded-full flex justify-around shadow-2xl border-white/10">
        <i class="fa-solid fa-house gold-text"></i>
        <a href="study.html"><i class="fa-solid fa-book text-gray-500"></i></a>
        <a href="test.html"><i class="fa-solid fa-pen-nib text-gray-500"></i></a>
        <a href="profile.html"><i class="fa-solid fa-user-doctor text-gray-500"></i></a>
    </nav>

    <script>
        // FIREBASE SETUP
        const firebaseConfig = {
            apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58",
            authDomain: "mneet-spark.firebaseapp.com",
            projectId: "mneet-spark",
            databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com/",
            appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const userKey = localStorage.getItem('mUserEmail');

        function syncEverything() {
            if(!userKey) window.location.href = 'index.html';

            // 1. Sync User Data
            database.ref('users/' + userKey).on('value', (snap) => {
                const d = snap.val();
                if(d) {
                    document.getElementById('uName').innerText = "DR. " + d.name.toUpperCase();
                    document.getElementById('uCollege').innerText = "Target: " + d.college.toUpperCase();
                    document.getElementById('uRank').innerText = d.rank;
                    document.getElementById('uHours').innerText = (d.hours || 0) + "h";
                    document.getElementById('uQs').innerText = d.questions || 0;
                }
            });

            // 2. Real-time Notifications from Admin
            database.ref('admin/notification').on('value', (snap) => {
                const val = snap.val();
                const bar = document.getElementById('notif-bar');
                if(val && val.active) {
                    bar.classList.remove('hidden');
                    document.getElementById('notif-text').innerText = val.msg;
                } else {
                    bar.classList.add('hidden');
                }
            });
        }
        syncEverything();

        // TIMER
        setInterval(() => {
            const diff = new Date("May 3, 2026 10:00:00") - new Date();
            const d = Math.floor(diff/86400000), h = Math.floor((diff/3600000)%24), m = Math.floor((diff/60000)%60), s = Math.floor((diff/1000)%60);
            document.getElementById('timer').innerText = `${d}D : ${h}H : ${m}M : ${s}S`;
        }, 1000);
    </script>
</body>
</html>
