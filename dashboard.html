<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(22, 33, 62, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        body { background: #070b14; color: white; font-family: sans-serif; min-height: 100vh; }
        .gold-glow { color: #eab308; text-shadow: 0 0 10px rgba(234, 179, 8, 0.4); }
    </style>
</head>
<body class="p-4 pb-32">

    <div class="flex justify-between items-center mb-8 px-2 mt-4">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-2xl bg-blue-600 flex items-center justify-center text-white font-black shadow-lg" id="userInitial">U</div>
            <div>
                <h1 class="text-sm font-black uppercase italic tracking-wide" id="profileNameDisplay">Loading Aspirant...</h1>
                <p class="text-[8px] text-gray-500 font-bold uppercase tracking-widest mt-0.5" id="profileBatchDisplay">Syllabus Track Syncing...</p>
            </div>
        </div>
        <div class="bg-yellow-500/10 px-4 py-2 rounded-full text-[10px] font-black italic border border-yellow-500/20">
            🪙 <span id="dashCoinCount">0</span>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4 px-1 mb-6">
        <div onclick="location.href='study_zone.html'" class="glass p-5 rounded-[2rem] border-b-4 border-yellow-500 flex flex-col justify-between h-32 active:scale-95 transition-all cursor-pointer">
            <div class="w-10 h-10 rounded-xl bg-yellow-500/10 flex items-center justify-center text-yellow-500"><i class="fa-solid fa-book-open"></i></div>
            <div><h4 class="text-xs font-black uppercase italic text-white leading-none">Study Hub</h4><p class="text-[7px] text-gray-500 uppercase mt-1 font-bold">Notes & Audios</p></div>
        </div>
        <div onclick="location.href='quiz.html'" class="glass p-5 rounded-[2rem] border-b-4 border-purple-500 flex flex-col justify-between h-32 active:scale-95 transition-all cursor-pointer">
            <div class="w-10 h-10 rounded-xl bg-purple-500/10 flex items-center justify-center text-purple-400"><i class="fa-solid fa-vial"></i></div>
            <div><h4 class="text-xs font-black uppercase italic text-white leading-none">Practice Quiz</h4><p class="text-[7px] text-gray-500 uppercase mt-1 font-bold">Line Evaluations</p></div>
        </div>
    </div>

    <div class="glass p-6 rounded-[2.5rem] border border-white/5 mx-1 mb-6 flex justify-between items-center bg-gradient-to-r from-blue-600/10 to-transparent">
        <div>
            <span class="text-[7px] font-black uppercase bg-blue-600 text-white px-2 py-0.5 rounded italic">ANNOUNCEMENT</span>
            <h3 class="text-xs font-black uppercase italic mt-2 tracking-wide text-white">NEET National Mock Series Live</h3>
            <p class="text-[8px] text-gray-500 uppercase mt-0.5 font-bold">Check out exam zone module below</p>
        </div>
        <button onclick="location.href='test.html'" class="w-10 h-10 rounded-full bg-blue-600 text-white flex items-center justify-center shadow-lg active:scale-90"><i class="fa-solid fa-arrow-right text-xs"></i></button>
    </div>

    <nav class="fixed bottom-6 left-6 right-6 glass p-4 rounded-full flex justify-around items-center shadow-2xl border-white/10 z-50">
        <i class="fa-solid fa-house text-[#eab308] gold-glow"></i>
        <a href="study_zone.html"><i class="fa-solid fa-book-open text-gray-600"></i></a>
        <a href="all_batches.html"><div class="bg-blue-600 w-11 h-11 rounded-full flex items-center justify-center -mt-8 border-4 border-[#070b14] shadow-xl"><i class="fa-solid fa-layer-group text-white text-lg"></i></div></a>
        <a href="test.html"><i class="fa-solid fa-pen-nib text-gray-600"></i></a>
        <a href="mstore.html"><i class="fa-solid fa-store text-gray-600"></i></a>
    </nav>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58", authDomain: "mneet-spark.firebaseapp.com", projectId: "mneet-spark", databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com/", appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331" };
        firebase.initializeApp(firebaseConfig); const database = firebase.database();

        const selectedBatchId = localStorage.getItem('selectedBatchId');
        const userEmail = localStorage.getItem('mUserEmail');

        function loadDashboardProfile() {
            if (userEmail) {
                const safeEmail = userEmail.replace(/\./g, ',');
                document.getElementById('userInitial').innerText = userEmail.charAt(0).toUpperCase();
                
                // Fetch Core Info
                database.ref(`users/${safeEmail}`).on('value', snap => {
                    const u = snap.val() || {};
                    document.getElementById('profileNameDisplay').innerText = u.name || "NEET Aspirant";
                    document.getElementById('dashCoinCount').innerText = u.coins || 0;
                });

                if (selectedBatchId) {
                    document.getElementById('profileBatchDisplay').innerText = "Active Target Batch ID: " + selectedBatchId;
                } else {
                    document.getElementById('profileBatchDisplay').innerText = "No Active Batch Selected";
                }
            } else {
                window.location.href = 'signup.html';
            }
        }
        loadDashboardProfile();
    </script>
</body>
        </html>
