<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNEET - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body style="background-color: #0a1128; color: white; font-family: sans-serif;">
    <nav class="p-5 border-b border-gray-800 flex justify-between items-center bg-[#0a1128]">
        <h1 style="color: #d97706;" class="text-2xl font-bold">mNEET</h1>
        <button onclick="window.location.href='index.html'" class="text-gray-400 text-sm">Logout</button>
    </nav>
    <div class="p-6 max-w-lg mx-auto">
        <h2 class="text-xl font-bold mb-6">Available Courses</h2>
        <div id="courseList" class="space-y-4">
            <p class="text-gray-600 italic">Fetching courses...</p>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyBisQytTeFhjMdlkTUNwcmCelPy7C9iI1Y",
            authDomain: "mneet-7699.firebaseapp.com",
            projectId: "mneet-7699",
            storageBucket: "mneet-7699.firebasestorage.app",
            messagingSenderId: "801664280357",
            appId: "1:801664280357:web:03da6173f29bedfeaa9ccc"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        onSnapshot(collection(db, "courses"), (snap) => {
            const container = document.getElementById('courseList');
            container.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                container.innerHTML += `
                    <div style="background-color: #16213e;" class="p-5 rounded-2xl border border-gray-800 shadow-lg">
                        <h3 class="text-lg font-bold">${data.title}</h3>
                        <p style="color: #d97706;" class="font-bold">₹${data.price}</p>
                        <button class="mt-4 w-full py-2 bg-gray-700 rounded-lg text-sm uppercase font-bold tracking-widest">Enroll Now</button>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
