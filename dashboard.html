<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNEET Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b1120; color: white; padding-bottom: 90px; }
        .nav-btn { color: #6b7280; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: none; border: none; }
        .nav-active { color: #eab308 !important; }
        .glass { background: rgba(22, 33, 62, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body>
    <div class="p-6 bg-[#16213e] rounded-b-[2.5rem] shadow-2xl border-b border-gray-800">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black text-[#eab308] italic">mNEET</h1>
            <div class="flex items-center gap-3">
                <div class="bg-[#eab308] text-black px-3 py-1 rounded-full text-xs font-bold shadow-lg"><span id="userCoins">0</span> BP</div>
                <button onclick="logout()" class="text-red-500 text-xl"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </div>
        <div class="bg-[#0b1120] p-4 rounded-2xl border border-gray-700">
            <div class="w-full bg-gray-800 h-2 rounded-full overflow-hidden">
                <div id="progressBar" class="bg-[#eab308] h-full" style="width: 10%"></div>
            </div>
            <p class="text-[10px] mt-2 text-gold font-bold uppercase tracking-widest text-center">Course Progress: <span id="progressText">10</span>%</p>
        </div>
    </div>

    <iframe id="appFrame" src="course.html" class="w-full h-[60vh] border-none"></iframe>

    <div class="fixed bottom-0 left-0 right-0 glass border-t border-gray-800 flex h-20 z-50">
        <button onclick="nav('course.html', 'course')" id="tab-course" class="nav-btn nav-active">
            <i class="fa-solid fa-circle-play text-xl"></i><span class="text-[9px] font-bold uppercase mt-1">Course</span>
        </button>
        <button onclick="nav('study.html', 'study')" id="tab-study" class="nav-btn">
            <i class="fa-solid fa-book-open-reader text-xl"></i><span class="text-[9px] font-bold uppercase mt-1">Study</span>
        </button>
        <button onclick="nav('test.html', 'test')" id="tab-test" class="nav-btn">
            <i class="fa-solid fa-flask-vial text-xl"></i><span class="text-[9px] font-bold uppercase mt-1">Test</span>
        </button>
        <button onclick="nav('mstore.html', 'mstore')" id="tab-mstore" class="nav-btn">
            <i class="fa-solid fa-shop text-xl"></i><span class="text-[9px] font-bold uppercase mt-1">mStore</span>
        </button>
    </div>

    <script>
        function nav(file, tabId) {
            document.getElementById('appFrame').src = file;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            document.getElementById('tab-' + tabId).classList.add('nav-active');
        }
        function logout() { window.location.href = "index.html"; }
    </script>
</body>
</html>
