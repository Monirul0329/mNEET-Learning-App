<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style> .glass { background: rgba(22, 33, 62, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); } </style>
</head>
<body class="bg-[#070b14] text-white p-4 pb-32">
    <div class="glass p-6 rounded-[2.5rem] mb-10 border border-[#eab308]/20">
        <h3 class="text-xs font-black uppercase italic gold-glow mb-6 text-[#eab308]">Create New Mock Exam</h3>
        <input type="text" placeholder="Mock Test Name" class="w-full bg-[#16213e] p-4 rounded-2xl mb-3 outline-none text-[10px] text-white border border-gray-700">
        <button class="w-full bg-[#eab308] text-black py-4 rounded-2xl font-black uppercase text-[10px]">Create Folder</button>
    </div>

    <h4 class="text-[10px] font-black uppercase text-gray-500 mb-4 italic px-2">Active Mock Folders</h4>
    <div id="mockFolders" class="space-y-4">
        <div class="glass p-5 rounded-[2rem] flex justify-between items-center border border-white/5">
            <div>
                <h5 class="text-xs font-black italic uppercase">MOCK TEST - 01</h5>
                <p class="text-[8px] text-gray-500 uppercase mt-1">Status: Open</p>
            </div>
            <button class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[8px] font-black uppercase">+ Questions</button>
        </div>
    </div>
</body>
</html>
