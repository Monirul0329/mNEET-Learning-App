<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b1120] p-6 text-white pb-32">
    <div class="bg-[#16213e] p-8 rounded-[2.5rem] border border-gray-800 max-w-lg mx-auto shadow-2xl">
        <h2 class="text-[#eab308] text-[10px] font-black uppercase text-center mb-8 tracking-[0.3em] italic">NCERT Content Manager</h2>
        
        <input type="text" id="chTitle" placeholder="Chapter Name" class="w-full bg-[#0b1120] p-4 rounded-2xl mb-4 border border-gray-700 outline-none">
        <input type="text" id="audioUrl" placeholder="Audio Revision URL (MP3)" class="w-full bg-[#0b1120] p-4 rounded-2xl mb-4 border border-gray-700 outline-none">
        <textarea id="ncertContent" placeholder="Paste NCERT Text here for Highlighting..." class="w-full bg-[#0b1120] p-4 rounded-2xl mb-4 border border-gray-700 h-32 outline-none"></textarea>
        <input type="text" id="pyqTag" placeholder="PYQ Tag (e.g. NEET 2023, Page 12)" class="w-full bg-[#0b1120] p-4 rounded-2xl mb-8 border border-gray-700 outline-none">
        
        <button onclick="uploadStudy()" class="w-full bg-[#eab308] text-black py-5 rounded-2xl font-black uppercase text-xs shadow-xl active:scale-95">Publish NCERT Study</button>
    </div>

    <script>
        const SB_URL = 'https://aqosatoimyijcahpzauh.supabase.co';
        const SB_KEY = 'YOUR_ANON_KEY';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        async function uploadStudy() {
            const { error } = await supabaseClient.from('chapters').insert([{ 
                name: document.getElementById('chTitle').value,
                audio_url: document.getElementById('audioUrl').value,
                content: document.getElementById('ncertContent').value,
                pyq_info: document.getElementById('pyqTag').value
            }]);
            if(error) alert(error.message); else alert("NCERT Study Live! 📖");
        }
    </script>
</body>
</html>
