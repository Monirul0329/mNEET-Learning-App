<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style> .glass { background: rgba(22, 33, 62, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); } </style>
</head>
<body class="bg-[#070b14] text-white p-4 pb-32">

    <div class="flex justify-between items-center mb-10">
        <button onclick="location.href='admin_dashboard.html'" class="w-10 h-10 glass rounded-2xl flex items-center justify-center text-gray-400"><i class="fa-solid fa-chevron-left"></i></button>
        <h1 class="text-xl font-black italic gold-glow uppercase tracking-tighter">ADMIN STUDY ZONE</h1>
        <div class="bg-yellow-500/10 px-3 py-1.5 rounded-full text-xs font-black italic">🪙 MOD</div>
    </div>

    <div class="space-y-4">
        <div onclick="location.href='manage_chapters.html?type=lecture'" class="glass p-6 rounded-[2.5rem] flex justify-between items-center border-l-4 border-blue-500 cursor-pointer">
            <div class="flex items-center gap-4">
                <i class="fa-solid fa-clapperboard text-blue-500 text-xl"></i>
                <h4 class="text-sm font-black uppercase italic">Lecture, Notes & DPP Hub</h4>
            </div>
            <i class="fa-solid fa-plus-circle text-blue-500"></i>
        </div>

        <div onclick="location.href='manage_chapters.html?type=ncert'" class="glass p-6 rounded-[2.5rem] flex justify-between items-center border-l-4 border-yellow-500 cursor-pointer">
            <div class="flex items-center gap-4">
                <i class="fa-solid fa-book-open text-yellow-500 text-xl"></i>
                <h4 class="text-sm font-black uppercase italic tracking-tighter">NCERT Reading & PYQ Tags</h4>
            </div>
            <i class="fa-solid fa-plus-circle text-yellow-500"></i>
        </div>

        <div onclick="location.href='manage_chapters.html?type=quiz'" class="glass p-6 rounded-[2.5rem] flex justify-between items-center border-l-4 border-purple-500 cursor-pointer">
            <div class="flex items-center gap-4">
                <i class="fa-solid fa-vial text-purple-400 text-xl"></i>
                <h4 class="text-sm font-black uppercase italic tracking-tighter">Chapter & Topic Wise Quiz</h4>
            </div>
            <i class="fa-solid fa-plus-circle text-purple-400"></i>
        </div>
    </div>

    <nav class="fixed bottom-6 left-6 right-6 glass p-4 rounded-full flex justify-around items-center z-50">
        <a href="admin_dashboard.html"><i class="fa-solid fa-house text-gray-600"></i></a>
        <i class="fa-solid fa-book-open gold-glow"></i>
        <a href="admin_batches.html"><i class="fa-solid fa-layer-group text-blue-500 text-xl"></i></a>
        <a href="admin_test.html"><i class="fa-solid fa-pen-nib text-gray-600"></i></a>
        <a href="admin_store.html"><i class="fa-solid fa-store text-gray-600"></i></a>
    </nav>
</body>
</html>
