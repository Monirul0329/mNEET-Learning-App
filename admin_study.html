<!DOCTYPE html>
<html lang="en">
<head><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-[#0b1120] p-6 text-white pb-32">
    <div id="view1">
        <h2 class="text-gold text-[10px] font-black uppercase mb-6 tracking-widest text-center italic">Select Subject to Manage</h2>
        <div id="subjectList" class="space-y-4"></div>
    </div>

    <div id="view2" class="hidden">
        <button onclick="showView(1)" class="text-xs text-gray-500 mb-6 font-bold uppercase tracking-widest"><i class="fa-solid fa-arrow-left"></i> Back</button>
        <div class="bg-[#16213e] p-8 rounded-[2.5rem] border border-blue-500/20 mb-8">
            <h2 id="activeSubTitle" class="text-lg font-black text-blue-400 mb-4 italic">Subject</h2>
            <input type="text" id="chapName" placeholder="New Chapter Name" class="w-full bg-[#1e293b] p-4 rounded-xl border border-gray-700 mb-4 outline-none">
            <button onclick="addChapter()" class="w-full bg-blue-600 py-4 rounded-2xl font-black text-[10px] uppercase">Add Chapter</button>
        </div>
        <div id="chapterList" class="space-y-3"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, query, where, deleteDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
        const firebaseConfig = { apiKey: "AIzaSyBisQytTeFhjMd1kTUNwcmCelPy7C0ilIY", authDomain: "mneet-7699.firebaseapp.com", projectId: "mneet-7699", storageBucket: "mneet-7699.firebasestorage.app", messagingSenderId: "801664280357", appId: "1:801664280357:web:03da6173f29bedfeaa9ccc" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        let activeSid = '';

        onSnapshot(collection(db, "courses"), (snap) => {
            const list = document.getElementById('subjectList'); list.innerHTML = "";
            snap.forEach(d => {
                list.innerHTML += `<div onclick="openSub('${d.id}', '${d.data().title}')" class="bg-[#16213e] p-8 rounded-[2rem] border border-gray-800 font-black italic flex justify-between uppercase text-sm">${d.data().title} <span>→</span></div>`;
            });
        });

        window.openSub = (id, title) => {
            activeSid = id;
            document.getElementById('activeSubTitle').innerText = title;
            showView(2); loadChapters();
        };

        window.showView = (v) => {
            document.getElementById('view1').classList.toggle('hidden', v !== 1);
            document.getElementById('view2').classList.toggle('hidden', v !== 2);
        };

        window.addChapter = async () => {
            const name = document.getElementById('chapName').value;
            await addDoc(collection(db, "chapters"), { sid: activeSid, name, timestamp: new Date() });
            document.getElementById('chapName').value = "";
        };

        function loadChapters() {
            const q = query(collection(db, "chapters"), where("sid", "==", activeSid));
            onSnapshot(q, (snap) => {
                const list = document.getElementById('chapterList'); list.innerHTML = "";
                snap.forEach(d => {
                    list.innerHTML += `<div class="bg-[#0b1120] p-5 rounded-2xl border border-gray-800 flex justify-between items-center text-xs font-bold italic text-gray-400">
                        ${d.data().name} <button onclick="deleteDoc(doc(db, 'chapters', '${d.id}'))" class="text-red-500"><i class="fa-solid fa-trash"></i></button></div>`;
                });
            });
        }
    </script>
</body>
</html>
