<!DOCTYPE html>
<html lang="en">
<head><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-[#0b1120] p-6 text-white pb-32">

    <div id="view1">
        <h2 class="text-gold text-[10px] font-black uppercase mb-6 tracking-widest text-center italic">Step 1: Select Subject</h2>
        <div id="subjectList" class="grid grid-cols-1 gap-4"></div>
    </div>

    <div id="view2" class="hidden">
        <button onclick="showView(1)" class="text-[10px] text-gray-500 mb-6 font-black uppercase"><- Back to Subjects</button>
        <div class="bg-[#16213e] p-8 rounded-[2.5rem] border border-blue-500/20 shadow-xl mb-8">
            <h2 id="activeSubTitle" class="text-xl font-black text-blue-400 mb-6 italic">Subject Name</h2>
            <input type="text" id="chapName" placeholder="Chapter Name (e.g. Human Physiology)" class="w-full bg-[#1e293b] p-4 rounded-xl border border-gray-700 mb-4 outline-none">
            <button onclick="addChapter()" class="w-full bg-blue-600 py-4 rounded-2xl font-black text-[10px] uppercase">Create Chapter</button>
        </div>
        <div id="chapterList" class="space-y-3"></div>
    </div>

    <div id="view3" class="hidden">
        <button onclick="showView(2)" class="text-[10px] text-gray-500 mb-6 font-black uppercase"><- Back to Chapters</button>
        <div class="bg-[#16213e] p-8 rounded-[2.5rem] border border-green-500/20 shadow-xl">
            <h2 id="activeChapTitle" class="text-xl font-black text-green-400 mb-6 italic">Chapter Name</h2>
            <input type="text" id="contentTitle" placeholder="Material Topic Title" class="w-full bg-[#1e293b] p-4 rounded-xl border border-gray-700 mb-3 outline-none">
            <input type="text" id="contentImg" placeholder="JPEG/Image URL" class="w-full bg-[#1e293b] p-4 rounded-xl border border-gray-700 mb-3 outline-none">
            <textarea id="contentText" placeholder="Type Content/Notes here..." class="w-full bg-[#1e293b] p-4 rounded-xl border border-gray-700 mb-6 h-32 outline-none"></textarea>
            <button onclick="saveContent()" class="w-full bg-green-600 py-4 rounded-2xl font-black text-[10px] uppercase">Upload Material</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, query, where, deleteDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
        const firebaseConfig = { apiKey: "AIzaSyBisQytTeFhjMd1kTUNwcmCelPy7C0ilIY", authDomain: "mneet-7699.firebaseapp.com", projectId: "mneet-7699", storageBucket: "mneet-7699.firebasestorage.app", messagingSenderId: "801664280357", appId: "1:801664280357:web:03da6173f29bedfeaa9ccc" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);

        let sid = ''; let cid = '';

        onSnapshot(collection(db, "courses"), snap => {
            const list = document.getElementById('subjectList'); list.innerHTML = "";
            snap.forEach(d => {
                list.innerHTML += `<div onclick="openSub('${d.id}', '${d.data().title}')" class="bg-[#16213e] p-8 rounded-[2rem] border border-gray-800 font-black italic flex justify-between uppercase text-xs tracking-tighter shadow-lg">${d.data().title} <span class="text-gold">→</span></div>`;
            });
        });

        window.openSub = (id, title) => { sid = id; document.getElementById('activeSubTitle').innerText = title; showView(2); loadChaps(); };
        window.openChap = (id, title) => { cid = id; document.getElementById('activeChapTitle').innerText = title; showView(3); };
        
        window.showView = (v) => {
            document.getElementById('view1').classList.toggle('hidden', v !== 1);
            document.getElementById('view2').classList.toggle('hidden', v !== 2);
            document.getElementById('view3').classList.toggle('hidden', v !== 3);
        };

        window.addChapter = async () => {
            const name = document.getElementById('chapName').value;
            if(!name) return;
            await addDoc(collection(db, "chapters"), { sid, name, timestamp: new Date() });
            document.getElementById('chapName').value = "";
        };

        function loadChaps() {
            const q = query(collection(db, "chapters"), where("sid", "==", sid));
            onSnapshot(q, snap => {
                const list = document.getElementById('chapterList'); list.innerHTML = "";
                snap.forEach(d => {
                    list.innerHTML += `<div class="flex gap-2">
                        <div onclick="openChap('${d.id}', '${d.data().name}')" class="flex-1 bg-[#1e293b] p-5 rounded-2xl font-bold italic text-[11px] uppercase">${d.data().name}</div>
                        <button onclick="deleteDoc(doc(db, 'chapters', '${d.id}'))" class="bg-red-500/10 px-4 rounded-2xl text-red-500 border border-red-500/20"><i class="fa-solid fa-trash"></i></button>
                    </div>`;
                });
            });
        }
    </script>
</body>
</html>
