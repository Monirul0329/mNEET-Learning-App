<!DOCTYPE html>
<html lang="en">
<head>
    <style> .course-card { background: #16213e; border: 1px solid rgba(255,255,255,0.05); } .glass { background: rgba(22, 33, 62, 0.8); backdrop-filter: blur(15px); } </style>
</head>
<body class="p-4 pb-32 bg-[#0b1120] text-white">

    <div class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-4">
            <button onclick="history.back()" class="w-10 h-10 glass rounded-2xl flex items-center justify-center text-gray-400 active:scale-90"><i class="fa-solid fa-chevron-left"></i></button>
            <h2 class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 italic">Available Batches</h2>
        </div>
        <div class="bg-yellow-500/10 px-4 py-2 rounded-full border border-yellow-500/20 text-xs font-black italic">🪙 <span id="uCoins">0</span> BP</div>
    </div>

    <div class="relative mb-8">
        <input type="text" id="batchSearch" oninput="searchBatches()" placeholder="Search your dream batch..." class="w-full glass p-5 rounded-3xl outline-none text-[11px] pl-12 border-none">
        <i class="fa-solid fa-magnifying-glass absolute left-5 top-5 text-gray-500"></i>
    </div>

    <div id="studentCourseList" class="space-y-8"></div>

    <script>
        // Firebase config and rendering logic...
        function renderBatches(data) {
            const list = document.getElementById('studentCourseList');
            list.innerHTML = data.map(c => `
                <div class="course-card rounded-[3rem] overflow-hidden shadow-2xl mb-8">
                    <div class="relative h-52 overflow-hidden">
                        <img id="img-${c.id}" src="${c.thumbnail}" class="w-full h-full object-cover">
                        <video id="vid-${c.id}" class="absolute inset-0 w-full h-full object-cover hidden" muted loop playsinline>
                            <source src="${c.video}" type="video/mp4">
                        </video>
                    </div>
                    <div class="p-8">
                        <h3 class="text-2xl font-black italic uppercase mb-2">${c.title}</h3>
                        <p class="text-gray-500 text-[10px] mb-4">${c.desc}</p>
                        <div class="flex items-center justify-between mt-6">
                            <div><p class="text-[8px] font-bold text-gray-600 uppercase italic">Price</p><p class="text-2xl font-black text-white italic">₹${c.price}</p></div>
                            <button onclick="joinBatch('${c.id}')" class="bg-[#eab308] text-black px-10 py-4 rounded-[1.5rem] font-black uppercase text-xs active:scale-95 transition-all">Enroll Now</button>
                        </div>
                    </div>
                </div>
            `).join('');

            data.forEach(c => {
                if(c.video) {
                    setTimeout(() => {
                        const img = document.getElementById(`img-${c.id}`);
                        const vid = document.getElementById(`vid-${c.id}`);
                        if(img && vid) { img.style.display = 'none'; vid.classList.remove('hidden'); vid.play(); }
                    }, 3000);
                }
            });
        }
        // ... (remaining scripts same)
    </script>
</body>
</html>
