<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Firebase Legacy Scripts (Amra Realtime DB use korbo jmn admin a ache) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .course-card { background: #16213e; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .buy-btn { background: linear-gradient(90deg, #eab308, #ca8a04); }
        .glass { background: rgba(22, 33, 62, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        body { background: #0b1120; color: white; }
    </style>
</head>
<body class="p-4 pb-32">

    <div class="flex items-center gap-4 mb-8">
        <button onclick="history.back()" class="w-10 h-10 glass rounded-2xl flex items-center justify-center text-gray-400 active:scale-90 transition-all"><i class="fa-solid fa-chevron-left"></i></button>
        <h2 class="text-[10px] font-black uppercase tracking-[0.3em] text-gray-500 italic">Available Batches</h2>
    </div>

    <div id="studentCourseList" class="space-y-8">
        <!-- Data load hobe ekhane -->
        <p id="loadingText" class="text-center text-gray-600 italic py-10">Syncing Batches...</p>
    </div>

    <nav class="fixed bottom-6 left-6 right-6 glass p-4 rounded-full flex justify-around items-center z-50">
        <a href="dashboard.html"><i class="fa-solid fa-house text-gray-600"></i></a>
        <a href="study.html"><i class="fa-solid fa-book-open text-gray-600"></i></a>
        <i class="fa-solid fa-layer-group text-[#eab308] text-xl"></i>
        <a href="test.html"><i class="fa-solid fa-pen-nib text-gray-600"></i></a>
        <a href="mstore.html"><i class="fa-solid fa-store text-gray-600"></i></a>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58",
            authDomain: "mneet-spark.firebaseapp.com",
            projectId: "mneet-spark",
            databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com/",
            appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function loadBatches() {
            database.ref('courses').on('value', (snap) => {
                const list = document.getElementById('studentCourseList');
                document.getElementById('loadingText').style.display = 'none';
                list.innerHTML = "";

                if(snap.exists()){
                    snap.forEach(child => {
                        const c = child.val();
                        if(c.isHidden) return; // Hidden batch student ke dekhabo na

                        list.innerHTML += `
                        <div class="course-card rounded-[2.5rem] overflow-hidden shadow-2xl relative">
                            <div class="relative h-56 overflow-hidden">
                                <!-- Image Thumbnail -->
                                <img id="img-${child.key}" src="${c.thumbnail}" class="w-full h-full object-cover transition-opacity duration-1000">
                                
                                <!-- Video Demo -->
                                <video id="vid-${child.key}" class="absolute inset-0 w-full h-full object-cover hidden" muted loop>
                                    <source src="${c.video}" type="video/mp4">
                                </video>

                                <div class="absolute top-4 left-4 bg-black/60 backdrop-blur-md px-3 py-1 rounded-lg text-[9px] font-black uppercase text-[#eab308] italic">Live Batch</div>
                            </div>
                            
                            <div class="p-8">
                                <h3 class="text-2xl font-black italic uppercase tracking-tighter mb-2">${c.title}</h3>
                                <p class="text-gray-400 text-[10px] mb-6 line-clamp-2 uppercase font-bold">${c.desc}</p>
                                
                                <div class="flex items-center justify-between">
                                    <div>
                                        <p class="text-[8px] font-bold text-gray-500 uppercase">Special Price</p>
                                        <p class="text-xl font-black text-white italic">₹${c.price}</p>
                                    </div>
                                    <button class="buy-btn text-black px-8 py-3 rounded-2xl font-black uppercase text-xs shadow-lg active:scale-95 transition-all">Buy Now</button>
                                </div>
                            </div>
                        </div>`;

                        // 5 Second por Image hidden kore Video chalar logic
                        setTimeout(() => {
                            const img = document.getElementById(`img-${child.key}`);
                            const vid = document.getElementById(`vid-${child.key}`);
                            if(img && vid && c.video) {
                                img.style.display = 'none';
                                vid.classList.remove('hidden');
                                vid.play();
                            }
                        }, 5000);
                    });
                } else {
                    list.innerHTML = "<p class='text-center text-gray-600 italic py-10'>No Batches Available Currently.</p>";
                }
            });
        }

        loadBatches();
    </script>
</body>
</html>
