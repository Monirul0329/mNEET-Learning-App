<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#0b1120] p-4 pb-32 text-white">

    <div class="flex items-center gap-4 mb-8">
        <button onclick="history.back()" class="w-10 h-10 bg-[#16213e] rounded-2xl flex items-center justify-center border border-white/5"><i class="fa-solid fa-chevron-left text-gray-500"></i></button>
        <h2 class="text-xs font-black uppercase italic tracking-[0.2em] text-[#eab308]">Explore Batches</h2>
    </div>

    <div id="studentCourseList" class="space-y-8"></div>

    <script>
        const firebaseConfig = { /* YOUR CONFIG */ };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function loadAvailableBatches() {
            database.ref('courses').on('value', (snap) => {
                const list = document.getElementById('studentCourseList');
                list.innerHTML = "";
                snap.forEach(child => {
                    const c = child.val();
                    if(c.isHidden) return; // Skip Hidden Batches

                    list.innerHTML += `
                    <div class="bg-[#16213e] rounded-[3rem] overflow-hidden border border-white/5 shadow-2xl">
                        <div class="relative group" id="media-${child.key}">
                            <!-- Thumbnail Image -->
                            <img src="${c.thumbnail}" class="w-full h-56 object-cover transition-opacity duration-700" id="img-${child.key}">
                            
                            <!-- Demo Video (Hidden initially, starts after 5s) -->
                            <video id="vid-${child.key}" class="absolute inset-0 w-full h-full object-cover hidden" muted loop>
                                <source src="${c.video}" type="video/mp4">
                            </video>

                            <div class="absolute top-4 left-4 bg-black/60 backdrop-blur-md px-3 py-1 rounded-xl text-[8px] font-black uppercase text-yellow-500 italic">Live Batch</div>
                        </div>
                        
                        <div class="p-8">
                            <h3 class="text-2xl font-black italic uppercase tracking-tighter mb-2">${c.title}</h3>
                            <p class="text-gray-500 text-[10px] mb-6 line-clamp-2 uppercase font-bold tracking-widest">${c.desc}</p>
                            
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-[8px] font-bold text-gray-600 uppercase">One Time Payment</p>
                                    <p class="text-2xl font-black text-white italic">₹${c.price}</p>
                                </div>
                                <button class="bg-[#eab308] text-black px-8 py-4 rounded-[1.5rem] font-black uppercase text-xs shadow-lg active:scale-95 transition-all">Buy Now</button>
                            </div>
                        </div>
                    </div>`;

                    // Video Auto-Play Logic after 5 seconds
                    setTimeout(() => {
                        const img = document.getElementById(`img-${child.key}`);
                        const vid = document.getElementById(`vid-${child.key}`);
                        if(img && vid) {
                            img.style.opacity = '0';
                            vid.classList.remove('hidden');
                            vid.play();
                        }
                    }, 5000);
                });
            });
        }
        loadAvailableBatches();
    </script>
</body>
</html>
