<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .course-card { background: #16213e; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .buy-btn { background: #eab308; box-shadow: 0 10px 20px rgba(234, 179, 8, 0.2); }
        .glass { background: rgba(22, 33, 62, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        body { background: #0b1120; color: white; font-family: sans-serif; }
        .progress-line { background: rgba(255, 255, 255, 0.05); height: 4px; border-radius: 10px; overflow: hidden; }
    </style>
</head>
<body class="p-4 pb-32">

    <!-- Top Bar: Back & BP Coins -->
    <div class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-4">
            <button onclick="history.back()" class="w-10 h-10 glass rounded-2xl flex items-center justify-center text-gray-400 active:scale-90">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <h2 class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 italic">Available Batches</h2>
        </div>
        <div class="bg-yellow-500/10 px-4 py-2 rounded-full border border-yellow-500/20 text-xs font-black italic">
            🪙 <span id="uCoins">0</span> BP
        </div>
    </div>

    <!-- Search Bar Row -->
    <div class="relative mb-8">
        <input type="text" id="batchSearch" oninput="searchBatches()" placeholder="Search your dream batch..." class="w-full glass p-5 rounded-3xl outline-none text-[11px] pl-12 border-none">
        <i class="fa-solid fa-magnifying-glass absolute left-5 top-5 text-gray-500"></i>
    </div>

    <!-- Course List Area -->
    <div id="studentCourseList" class="space-y-8">
        <!-- Data dynamically load hobe -->
    </div>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-6 left-6 right-6 glass p-4 rounded-full flex justify-around items-center z-50 shadow-2xl border-white/10">
        <a href="dashboard.html"><i class="fa-solid fa-house text-gray-600"></i></a>
        <a href="study.html"><i class="fa-solid fa-book-open text-gray-600"></i></a>
        <i class="fa-solid fa-layer-group text-[#eab308] text-xl"></i>
        <a href="test.html"><i class="fa-solid fa-pen-nib text-gray-600"></i></a>
        <a href="mstore.html"><i class="fa-solid fa-store text-gray-600"></i></a>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58",
            authDomain: "mneet-spark.firebaseapp.com",
            projectId: "mneet-spark",
            databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com/",
            appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const userKey = localStorage.getItem('mUserEmail');
        let allBatches = [];

        function init() {
            // Sync Coins
            if(userKey) {
                database.ref('users/' + userKey + '/coins').on('value', s => {
                    document.getElementById('uCoins').innerText = s.val() || 0;
                });
            }

            // Load Batches
            database.ref('courses').on('value', snap => {
                allBatches = [];
                snap.forEach(child => {
                    if(!child.val().isHidden) allBatches.push({ id: child.key, ...child.val() });
                });
                renderBatches(allBatches);
            });
        }

        function renderBatches(data) {
            const list = document.getElementById('studentCourseList');
            list.innerHTML = data.map(c => `
                <div class="course-card rounded-[3rem] overflow-hidden shadow-2xl">
                    <div class="relative h-52 overflow-hidden">
                        <img id="img-${c.id}" src="${c.thumbnail}" class="w-full h-full object-cover">
                        <video id="vid-${c.id}" class="absolute inset-0 w-full h-full object-cover hidden" muted loop>
                            <source src="${c.video}" type="video/mp4">
                        </video>
                        <div class="absolute top-4 left-4 bg-black/60 backdrop-blur-md px-3 py-1 rounded-lg text-[8px] font-black uppercase text-[#eab308] italic">Live Batch</div>
                    </div>
                    
                    <div class="p-8">
                        <h3 class="text-2xl font-black italic uppercase tracking-tighter mb-2 leading-none">${c.title}</h3>
                        <p class="text-gray-500 text-[10px] mb-4 line-clamp-2 uppercase font-bold tracking-widest">${c.desc}</p>
                        
                        <!-- Dates & Percentage Row -->
                        <div class="flex justify-between items-center mb-6">
                            <div class="flex gap-4">
                                <div>
                                    <p class="text-[7px] text-gray-600 font-black uppercase">Start Date</p>
                                    <p class="text-[9px] font-black text-blue-400 italic">${c.startDate || 'TBA'}</p>
                                </div>
                                <div>
                                    <p class="text-[7px] text-gray-600 font-black uppercase">End Date</p>
                                    <p class="text-[9px] font-black text-red-400 italic">${c.endDate || 'TBA'}</p>
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="text-[7px] text-gray-600 font-black uppercase">Syllabus</p>
                                <p class="text-[10px] font-black text-[#eab308] italic">${c.progress || 0}% Done</p>
                            </div>
                        </div>

                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-[8px] font-bold text-gray-600 uppercase">Special Price</p>
                                <p class="text-2xl font-black text-white italic">₹${c.price}</p>
                            </div>
                            <button class="buy-btn text-black px-10 py-4 rounded-[1.5rem] font-black uppercase text-xs active:scale-95 transition-all">Buy Now</button>
                        </div>
                    </div>
                </div>
            `).join('');

            // Image to Video Logic
            data.forEach(c => {
                setTimeout(() => {
                    const img = document.getElementById(`img-${c.id}`);
                    const vid = document.getElementById(`vid-${c.id}`);
                    if(img && vid && c.video) {
                        img.style.display = 'none';
                        vid.classList.remove('hidden');
                        vid.play();
                    }
                }, 5000);
            });
        }

        function searchBatches() {
            const term = document.getElementById('batchSearch').value.toLowerCase();
            const filtered = allBatches.filter(b => b.title.toLowerCase().includes(term));
            renderBatches(filtered);
        }

        init();
    </script>
</body>
</html>
