<script>
    // ... Inside your onSnapshot loop ...
    snap.forEach(d => {
        const c = d.data();
        if(c.isHidden) return; 

        list.innerHTML += `
        <div class="course-card rounded-[2.5rem] overflow-hidden shadow-2xl mb-8 bg-[#16213e]">
            <div class="relative overflow-hidden" style="height: 220px;">
                <!-- Main Admin Thumbnail -->
                <img id="img-${d.id}" src="${c.thumbnail}" class="w-full h-full object-cover">
                
                <!-- Admin Demo Video (Hidden initially) -->
                <video id="vid-${d.id}" class="absolute inset-0 w-full h-full object-cover hidden" muted loop>
                    <source src="${c.video}" type="video/mp4">
                </video>
            </div>
            <div class="p-6">
                <h3 class="text-2xl font-black italic uppercase mb-2">${c.title}</h3>
                <p class="text-gray-400 text-xs mb-6">${c.desc}</p>
                <div class="flex justify-between items-center">
                    <p class="text-xl font-black italic">₹${c.price}</p>
                    <button class="buy-btn text-black px-8 py-3 rounded-2xl font-black uppercase text-xs">Buy Now</button>
                </div>
            </div>
        </div>`;

        // Logic: Image to Video after 5s
        setTimeout(() => {
            const img = document.getElementById(`img-${d.id}`);
            const vid = document.getElementById(`vid-${d.id}`);
            if(img && vid && c.video) {
                img.style.display = 'none';
                vid.style.display = 'block';
                vid.play();
            }
        }, 5000);
    });
</script>
