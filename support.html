<script>
    // ... Firebase Init
    async function sendSupport() {
        const sub = document.getElementById('issueSubject').value;
        const msg = document.getElementById('issueMsg').value;
        if(!sub || !msg) return alert("Fill all fields!");

        // Storing in admin/supports for Admin Panel access
        database.ref('admin/supports').push({
            user: userKey.replace('_', '.'),
            subject: sub,
            message: msg,
            time: Date.now(),
            status: 'Unread'
        }).then(() => {
            alert("Message Sent! Admin will contact you.");
            history.back();
        });
    }
</script>
