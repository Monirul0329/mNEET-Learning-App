<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(22, 33, 62, 0.75); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        body { background: #070b14; color: white; }
        textarea, input { background: rgba(0,0,0,0.3) !important; border: 1px solid rgba(255,255,255,0.1) !important; outline: none; color: white; }
        textarea:focus { border-color: #22c55e !important; }
    </style>
</head>
<body class="p-4">

    <div class="flex justify-between items-center mb-10 px-1">
        <div class="flex items-center gap-4">
            <button onclick="history.back()" class="w-10 h-10 glass rounded-2xl flex items-center justify-center text-gray-400"><i class="fa-solid fa-chevron-left"></i></button>
            <h1 class="text-sm font-black italic uppercase text-green-500 tracking-tighter">SUPPORT BOX</h1>
        </div>
        <div class="bg-yellow-500/10 px-3 py-1.5 rounded-full border border-yellow-500/20 text-xs font-black">🪙 <span id="uCoins">0</span></div>
    </div>

    <div class="glass p-8 rounded-[3rem] border border-green-500/20">
        <h3 class="text-xs font-black uppercase mb-6 italic text-green-400 text-center tracking-widest">Share Your Problem / Doubt</h3>
        
        <div class="space-y-4">
            <input type="text" id="issueSubject" placeholder="Subject (e.g. App Lagging / Biology Doubt)" class="w-full p-4 rounded-2xl text-[10px] font-bold uppercase">
            <textarea id="issueMsg" placeholder="Describe your problem in detail..." class="w-full p-5 rounded-[2rem] text-xs h-40"></textarea>
            
            <button onclick="sendSupport()" id="sendBtn" class="w-full bg-green-600 text-white py-5 rounded-[2rem] font-black uppercase text-[10px] shadow-lg shadow-green-900/20 transition-all active:scale-95">Send To Admin</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { /* Your Config */ };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const userKey = localStorage.getItem('mUserEmail');

        async function sendSupport() {
            const sub = document.getElementById('issueSubject').value;
            const msg = document.getElementById('issueMsg').value;
            const btn = document.getElementById('sendBtn');

            if(!sub || !msg) return alert("Please fill all fields!");

            btn.innerText = "SENDING...";
            btn.disabled = true;

            database.ref('admin/supports').push({
                user: userKey.replace('_', '.'),
                subject: sub,
                message: msg,
                time: Date.now(),
                status: 'Unread'
            }).then(() => {
                alert("Message Sent! Admin will contact you soon.");
                history.back();
            });
        }
    </script>
</body>
</html>
