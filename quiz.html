<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNEET - Pro Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b1120; color: white; font-family: sans-serif; }
        .card-navy { background-color: #16213e; border: 1px solid #1f2937; border-radius: 2rem; }
        .option-btn { background: #1e293b; border: 1px solid #334155; width: 100%; text-align: left; padding: 15px; border-radius: 15px; margin-bottom: 10px; transition: 0.3s; }
        .option-active { border-color: #eab308; background: rgba(234, 179, 8, 0.1); }
        .glass { background: rgba(22, 33, 62, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-4">

    <div class="fixed top-0 left-0 right-0 glass p-4 z-50 border-b border-gray-800">
        <div class="flex justify-between items-center max-w-lg mx-auto">
            <div>
                <p class="text-[8px] text-gray-500 uppercase font-black tracking-widest">Total Time</p>
                <span id="totalTimer" class="text-lg font-black text-white">10:00</span>
            </div>
            <div class="text-center">
                <p class="text-[8px] text-gold uppercase font-black tracking-widest">Q-Timer</p>
                <span id="qTimer" class="text-2xl font-black text-[#eab308]">60s</span>
            </div>
            <div class="text-right">
                <p id="qCount" class="text-[10px] font-bold text-gray-500 uppercase">1/10</p>
                <div class="w-16 bg-gray-800 h-1 rounded-full mt-1"><div id="progBar" class="bg-gold h-full" style="width: 10%"></div></div>
            </div>
        </div>
    </div>

    <div id="quizBox" class="mt-28 max-w-lg mx-auto pb-24">
        <div class="card-navy p-8 mb-6 shadow-2xl min-h-[180px] flex items-center border-l-4 border-gold">
            <h2 id="questionText" class="text-lg font-bold leading-relaxed italic">Loading Question...</h2>
        </div>
        
        <div id="optionsBox" class="space-y-2"></div>

        <div class="grid grid-cols-2 gap-4 mt-8">
            <button onclick="prevQ()" id="prevBtn" class="bg-gray-800 py-4 rounded-2xl font-bold text-[10px] uppercase opacity-50">Previous</button>
            <button onclick="submitAns()" id="ansBtn" class="bg-gold text-black py-4 rounded-2xl font-black text-[10px] uppercase shadow-lg shadow-gold/10">Submit Ans</button>
        </div>
        <button onclick="nextQ()" id="nextBtn" class="w-full mt-4 bg-gray-700/30 py-3 rounded-xl font-bold text-[10px] uppercase tracking-widest text-gray-400">Skip / Next Question</button>
    </div>

    <div id="resultBox" class="hidden mt-28 max-w-lg mx-auto pb-20">
        <div class="card-navy p-8 text-center border-gold/20 shadow-2xl">
            <h2 class="text-2xl font-black italic text-gold">RESULT SUMMARY</h2>
            <div class="grid grid-cols-2 gap-4 mt-8">
                <div class="bg-[#0b1120] p-4 rounded-2xl border border-gray-800">
                    <p class="text-[8px] text-gray-500 uppercase font-black">BP Coins</p>
                    <p id="resCoins" class="text-xl font-black text-gold">+0</p>
                </div>
                <div class="bg-[#0b1120] p-4 rounded-2xl border border-gray-800">
                    <p class="text-[8px] text-gray-500 uppercase font-black">Score</p>
                    <p id="resScore" class="text-xl font-black text-white">0</p>
                </div>
            </div>
            <div class="mt-8 grid grid-cols-3 gap-2 text-[10px] font-black">
                <div class="text-green-500 uppercase">Correct<br><span id="resCorrect" class="text-lg text-white">0</span></div>
                <div class="text-red-500 uppercase">Wrong<br><span id="resWrong" class="text-lg text-white">0</span></div>
                <div class="text-gray-500 uppercase">Missed<br><span id="resMissed" class="text-lg text-white">0</span></div>
            </div>
            <button onclick="location.reload()" class="w-full bg-white text-black py-4 rounded-xl font-black text-[10px] uppercase mt-10">Reattempt Quiz</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, doc, updateDoc, increment, getDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyBisQytTeFhjMd1kTUNwcmCelPy7C0ilIY", authDomain: "mneet-7699.firebaseapp.com", projectId: "mneet-7699", storageBucket: "mneet-7699.firebasestorage.app", messagingSenderId: "801664280357", appId: "1:801664280357:web:03da6173f29bedfeaa9ccc" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app); const auth = getAuth(app);

        // Dummy Questions
        const questions = [
            { q: "Powerhouse of the Cell?", o: ["Nucleus", "Mitochondria", "Ribosome", "Golgi"], a: 1 },
            { q: "NEET is for which career?", o: ["Engineering", "Medical", "Law", "Arts"], a: 1 }
        ];

        let currentIdx = 0; let correct = 0; let wrong = 0; let score = 0; let coins = 0;
        let selected = null; let qTimer; let totalTimer;
        let qTimeLimit = 60; let totalSeconds = 600; // 10 Minutes Total

        onAuthStateChanged(auth, async (user) => {
            if(user) {
                const snap = await getDoc(doc(db, "users", user.uid));
                const attempts = snap.data().quiz_attempts || 0;
                qTimeLimit = Math.max(10, 60 - (attempts * 10)); // Reattempt e 10s kome
                startTotalTimer();
                loadQuestion();
            }
        });

        function startTotalTimer() {
            totalTimer = setInterval(() => {
                totalSeconds--;
                let m = Math.floor(totalSeconds / 60);
                let s = totalSeconds % 60;
                document.getElementById('totalTimer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if(totalSeconds <= 0) finishQuiz();
            }, 1000);
        }

        function loadQuestion() {
            clearInterval(qTimer);
            let timeLeft = qTimeLimit;
            document.getElementById('qTimer').innerText = timeLeft + "s";
            document.getElementById('ansBtn').disabled = false;
            document.getElementById('ansBtn').style.opacity = "1";

            qTimer = setInterval(() => {
                timeLeft--;
                document.getElementById('qTimer').innerText = timeLeft + "s";
                if(timeLeft <= 0) {
                    clearInterval(qTimer);
                    document.getElementById('qTimer').innerText = "0s";
                    document.getElementById('ansBtn').disabled = true; // Timer shesh hole ans deya jabe na
                    document.getElementById('ansBtn').style.opacity = "0.3";
                    alert("Time up for this question! Go to Next.");
                }
            }, 1000);

            const q = questions[currentIdx];
            document.getElementById('qCount').innerText = `${currentIdx + 1}/${questions.length}`;
            document.getElementById('questionText').innerText = q.q;
            const optBox = document.getElementById('optionsBox');
            optBox.innerHTML = "";
            q.o.forEach((o, i) => {
                optBox.innerHTML += `<button onclick="selectOpt(${i})" id="opt-${i}" class="option-btn">${o}</button>`;
            });
            selected = null;
        }

        window.selectOpt = (i) => {
            document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('option-active'));
            document.getElementById('opt-'+i).classList.add('option-active');
            selected = i;
        };

        window.submitAns = () => {
            if(selected === null) return alert("Please select an option!");
            clearInterval(qTimer); // Ans submit korle Q-Timer bondho hobe
            
            if(selected === questions[currentIdx].a) {
                score += 4; coins += 4; correct++;
            } else {
                score -= 1; coins -= 2; wrong++;
            }
            alert("Answer Recorded! Click Next.");
            document.getElementById('ansBtn').disabled = true; 
        };

        window.nextQ = () => {
            currentIdx++;
            if(currentIdx < questions.length) loadQuestion();
            else finishQuiz();
        };

        window.prevQ = () => {
            if(currentIdx > 0) { currentIdx--; loadQuestion(); }
        };

        window.finishQuiz = async () => {
            clearInterval(totalTimer);
            clearInterval(qTimer);
            document.getElementById('quizBox').classList.add('hidden');
            document.getElementById('resultBox').classList.remove('hidden');
            
            document.getElementById('resScore').innerText = score;
            document.getElementById('resCoins').innerText = (coins >= 0 ? '+' : '') + coins;
            document.getElementById('resCorrect').innerText = correct;
            document.getElementById('resWrong').innerText = wrong;
            document.getElementById('resMissed').innerText = questions.length - (correct + wrong);

            const userRef = doc(db, "users", auth.currentUser.uid);
            await updateDoc(userRef, { 
                coins: increment(coins),
                quiz_attempts: increment(1)
            });
        };
    </script>
</body>
</html>
