<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mNEET - Advanced Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b1120; color: white; font-family: sans-serif; overflow-x: hidden; }
        .card-navy { background-color: #16213e; border: 1px solid #1f2937; border-radius: 2rem; }
        .option-btn { background: #1e293b; border: 1px solid #334155; width: 100%; text-align: left; padding: 15px; border-radius: 15px; margin-bottom: 10px; transition: 0.3s; font-size: 14px; }
        .option-active { border-color: #eab308; background: rgba(234, 179, 8, 0.1); }
        .glass { background: rgba(22, 33, 62, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-4">

    <div class="fixed top-0 left-0 right-0 glass p-4 z-50 border-b border-gray-800 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div id="timerRing" class="w-10 h-10 rounded-full border-4 border-gold border-t-transparent animate-spin hidden"></div>
            <span id="timerText" class="text-xl font-black text-[#eab308]">60s</span>
        </div>
        <div class="text-right">
            <p id="qCount" class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Question 1/10</p>
            <div class="w-24 bg-gray-800 h-1 rounded-full mt-1"><div id="progBar" class="bg-gold h-full" style="width: 10%"></div></div>
        </div>
    </div>

    <div id="quizBox" class="mt-24 max-w-lg mx-auto">
        <div class="card-navy p-8 mb-6 shadow-2xl min-h-[200px] flex items-center">
            <h2 id="questionText" class="text-lg font-bold leading-relaxed">Loading Question...</h2>
        </div>
        
        <div id="optionsBox" class="space-y-3"></div>

        <div class="flex justify-between items-center mt-10 gap-4">
            <button onclick="prevQ()" id="prevBtn" class="flex-1 bg-gray-800 py-4 rounded-2xl font-bold text-xs uppercase opacity-50 pointer-events-none">Previous</button>
            <button onclick="submitAns()" id="ansBtn" class="flex-1 bg-[#eab308] text-black py-4 rounded-2xl font-black text-xs uppercase shadow-lg shadow-gold/20">Submit Ans</button>
        </div>
        <button onclick="finishQuiz()" class="w-full mt-4 text-red-500 font-bold text-[10px] uppercase tracking-widest">Finish Quiz Now</button>
    </div>

    <div id="resultBox" class="hidden mt-24 max-w-lg mx-auto pb-20">
        <div class="card-navy p-8 text-center border-gold/20 shadow-gold/5 shadow-2xl">
            <i class="fa-solid fa-circle-check text-5xl text-gold mb-4"></i>
            <h2 class="text-2xl font-black italic">REPORT CARD</h2>
            <div class="grid grid-cols-2 gap-4 mt-8">
                <div class="bg-[#0b1120] p-4 rounded-2xl border border-gray-800">
                    <p class="text-[9px] text-gray-500 uppercase font-black">Score</p>
                    <p id="resScore" class="text-xl font-black text-white">0</p>
                </div>
                <div class="bg-[#0b1120] p-4 rounded-2xl border border-gray-800">
                    <p class="text-[9px] text-gray-500 uppercase font-black">Accuracy</p>
                    <p id="resAcc" class="text-xl font-black text-gold">0%</p>
                </div>
            </div>
            <div class="mt-6 space-y-2 text-left px-4">
                <p class="text-xs text-gray-400">✅ Correct: <span id="resCorrect" class="text-white font-bold ml-2">0</span></p>
                <p class="text-xs text-gray-400">❌ Wrong: <span id="resWrong" class="text-white font-bold ml-2">0</span></p>
                <p class="text-xs text-gray-400">⚠️ Incomplete: <span id="resIncomplete" class="text-white font-bold ml-2">0</span></p>
            </div>
            <div class="mt-10 flex gap-4">
                <button onclick="location.reload()" class="flex-1 bg-white text-black py-4 rounded-xl font-black text-[10px] uppercase">Reattempt</button>
                <button onclick="window.close()" class="flex-1 bg-gray-800 py-4 rounded-xl font-black text-[10px] uppercase">Exit</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, doc, updateDoc, increment, getDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyBisQytTeFhjMd1kTUNwcmCelPy7C0ilIY", authDomain: "mneet-7699.firebaseapp.com", projectId: "mneet-7699", storageBucket: "mneet-7699.firebasestorage.app", messagingSenderId: "801664280357", appId: "1:801664280357:web:03da6173f29bedfeaa9ccc" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app); const auth = getAuth(app);

        // Dummy Questions (Real data will load from DB)
        const questions = [
            { q: "What is the powerhouse of the cell?", o: ["Nucleus", "Mitochondria", "Ribosome", "Golgi"], a: 1 },
            { q: "Who discovered the laws of motion?", o: ["Newton", "Einstein", "Darwin", "Bohr"], a: 0 }
        ];

        let currentIdx = 0; let score = 0; let coins = 0;
        let correct = 0; let wrong = 0; let selected = null;
        let timer; let timeLimit = 60; // Initial 60s
        let reattempts = 0; 

        onAuthStateChanged(auth, async (user) => {
            if(!user) return;
            const snap = await getDoc(doc(db, "users", user.uid));
            reattempts = snap.data().quiz_attempts || 0;
            timeLimit = Math.max(10, 60 - (reattempts * 10)); // -10s per reattempt
            loadQuestion();
        });

        function loadQuestion() {
            if(currentIdx >= questions.length) return finishQuiz();
            clearInterval(timer);
            let timeLeft = timeLimit;
            document.getElementById('timerText').innerText = timeLeft + "s";
            
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('timerText').innerText = timeLeft + "s";
                if(timeLeft <= 0) { clearInterval(timer); nextQ(); }
            }, 1000);

            const q = questions[currentIdx];
            document.getElementById('qCount').innerText = `Question ${currentIdx + 1}/${questions.length}`;
            document.getElementById('questionText').innerText = q.q;
            const optBox = document.getElementById('optionsBox');
            optBox.innerHTML = "";
            q.o.forEach((o, i) => {
                optBox.innerHTML += `<button onclick="selectOpt(${i})" id="opt-${i}" class="option-btn">${o}</button>`;
            });
            selected = null;
        }

        window.selectOpt = (i) => {
            document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('option-active'));
            document.getElementById('opt-'+i).classList.add('option-active');
            selected = i;
        };

        window.submitAns = () => {
            if(selected === null) return alert("Select an answer!");
            if(selected === questions[currentIdx].a) {
                score += 4; coins += 4; correct++;
            } else {
                score -= 1; coins -= 2; wrong++;
            }
            nextQ();
        };

        function nextQ() {
            currentIdx++;
            if(currentIdx < questions.length) loadQuestion();
            else finishQuiz();
        }

        window.finishQuiz = async () => {
            clearInterval(timer);
            document.getElementById('quizBox').classList.add('hidden');
            document.getElementById('resultBox').classList.remove('hidden');
            
            // Show Stats
            document.getElementById('resScore').innerText = score;
            document.getElementById('resCorrect').innerText = correct;
            document.getElementById('resWrong').innerText = wrong;
            document.getElementById('resIncomplete').innerText = questions.length - (correct + wrong);
            document.getElementById('resAcc').innerText = Math.round((correct / questions.length) * 100) + "%";

            // Update Firebase Coins
            const userRef = doc(db, "users", auth.currentUser.uid);
            await updateDoc(userRef, { 
                coins: increment(coins),
                quiz_attempts: increment(1)
            });
        };
    </script>
</body>
  </html>
