<script>
    let time = 60;
    const timerEl = document.getElementById('timer');
    const interval = setInterval(() => {
        if(time > 0) {
            time--;
            timerEl.innerText = `00:${time < 10 ? '0'+time : time}`;
        } else {
            clearInterval(interval);
            alert("Time Over!");
            location.reload();
        }
    }, 1000);

    function check(isCorrect) {
        if(isCorrect) {
            alert("Correct! +4 Points 🥳");
            // Here you can update user coins in database
        } else {
            alert("Wrong! -1 Point 😢\nCheck Mitochondria in NCERT Page 126.");
        }
        location.reload();
    }
</script>
