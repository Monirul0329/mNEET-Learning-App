<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(22, 33, 62, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        body { background: #070b14; color: white; }
        input, textarea { background: #0b1120 !important; border: 1px solid #1f2937 !important; color: white; outline: none; }
        input:focus { border-color: #eab308 !important; }
    </style>
</head>
<body class="p-6 pb-32">

    <!-- Top Bar -->
    <div class="flex items-center gap-4 mb-8">
        <button onclick="history.back()" class="w-10 h-10 glass rounded-2xl flex items-center justify-center text-gray-400"><i class="fa-solid fa-chevron-left"></i></button>
        <h1 class="text-sm font-black italic uppercase text-blue-400">Manage Lecture Chapters</h1>
    </div>

    <!-- Create Chapter Form -->
    <div class="glass p-6 rounded-[2.5rem] mb-10 border-b-4 border-blue-500/30">
        <h3 class="text-[10px] font-black uppercase text-gray-400 mb-4 italic tracking-widest px-1">Create New Chapter</h3>
        <div class="space-y-3">
            <input type="text" id="chName" placeholder="Chapter Name (e.g. Cell: The Unit of Life)" class="w-full p-4 rounded-2xl text-[11px] font-bold">
            <button onclick="createChapter()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase text-[10px] shadow-lg active:scale-95 transition-all">Add Chapter to Hub</button>
        </div>
    </div>

    <!-- Chapter List -->
    <h3 class="text-[10px] font-black uppercase text-gray-600 mb-4 px-2 italic">Existing Chapters</h3>
    <div id="chapterList" class="space-y-4"></div>

    <!-- Content Management Modal (Hidden by default) -->
    <div id="contentModal" class="fixed inset-0 bg-black/90 z-[100] hidden overflow-y-auto p-6">
        <div class="flex justify-between items-center mb-6">
            <h2 id="modalTitle" class="text-xs font-black uppercase text-yellow-500 italic">Manage Content</h2>
            <button onclick="closeModal()" class="text-white text-xl"><i class="fa-solid fa-xmark"></i></button>
        </div>
        
        <div class="glass p-6 rounded-[2rem] space-y-4 mb-8">
            <select id="contentType" class="w-full p-4 rounded-2xl bg-[#0b1120] text-white text-[10px] font-black uppercase border border-gray-800">
                <option value="lecture">Lecture Video (In-App Player)</option>
                <option value="notes">Class Notes (PDF)</option>
                <option value="dpp">DPP / Assignment (PDF)</option>
            </select>
            <input type="text" id="contTitle" placeholder="Content Title (e.g. Lecture 01)" class="w-full p-4 rounded-2xl text-[10px]">
            <input type="text" id="contUrl" placeholder="Video ID / Drive Link / PDF URL" class="w-full p-4 rounded-2xl text-[10px]">
            <button onclick="addContent()" class="w-full bg-[#eab308] text-black py-4 rounded-2xl font-black uppercase text-[10px]">Upload Content</button>
        </div>

        <div id="addedContentList" class="space-y-3"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58",
            authDomain: "mneet-spark.firebaseapp.com",
            projectId: "mneet-spark",
            databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com/",
            appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let currentChapterId = null;

        function createChapter() {
            const name = document.getElementById('chName').value;
            if(!name) return alert("Enter Chapter Name!");
            database.ref('study/lectures').push({
                name: name,
                isHidden: false,
                timestamp: Date.now()
            }).then(() => {
                document.getElementById('chName').value = "";
                alert("Chapter Created!");
            });
        }

        function loadChapters() {
            database.ref('study/lectures').on('value', (snap) => {
                const list = document.getElementById('chapterList');
                list.innerHTML = "";
                snap.forEach(child => {
                    const ch = child.val();
                    list.innerHTML += `
                        <div class="glass p-5 rounded-[2rem] flex justify-between items-center border border-white/5">
                            <div class="flex-1" onclick="openManager('${child.key}', '${ch.name}')">
                                <h4 class="text-[11px] font-black uppercase italic">${ch.name}</h4>
                                <p class="text-[7px] text-gray-500 font-bold uppercase mt-1">Click to Manage Content</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="toggleHide('${child.key}', ${ch.isHidden})" class="w-8 h-8 rounded-full bg-blue-500/10 text-blue-500 text-[10px] border border-blue-500/20"><i class="fa-solid ${ch.isHidden ? 'fa-eye' : 'fa-eye-slash'}"></i></button>
                                <button onclick="deleteChapter('${child.key}')" class="w-8 h-8 rounded-full bg-red-500/10 text-red-500 text-[10px] border border-red-500/20"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </div>`;
                });
            });
        }

        function openManager(id, name) {
            currentChapterId = id;
            document.getElementById('modalTitle').innerText = name;
            document.getElementById('contentModal').classList.remove('hidden');
            loadChapterContent(id);
        }

        function addContent() {
            const type = document.getElementById('contentType').value;
            const title = document.getElementById('contTitle').value;
            const url = document.getElementById('contUrl').value;
            if(!title || !url) return alert("Fill all fields!");

            database.ref(`study/lectures/${currentChapterId}/content`).push({
                type: type,
                title: title,
                url: url
            }).then(() => {
                document.getElementById('contTitle').value = "";
                document.getElementById('contUrl').value = "";
            });
        }

        function loadChapterContent(chId) {
            database.ref(`study/lectures/${chId}/content`).on('value', (snap) => {
                const list = document.getElementById('addedContentList');
                list.innerHTML = "";
                snap.forEach(child => {
                    const c = child.val();
                    const icon = c.type === 'lecture' ? 'fa-video' : (c.type === 'notes' ? 'fa-file-pdf' : 'fa-scroll');
                    list.innerHTML += `
                        <div class="glass p-4 rounded-2xl flex justify-between items-center border border-white/5">
                            <div class="flex items-center gap-3">
                                <i class="fa-solid ${icon} text-[10px] text-yellow-500"></i>
                                <span class="text-[9px] font-black uppercase">${c.title}</span>
                            </div>
                            <button onclick="deleteContent('${chId}', '${child.key}')" class="text-red-500 text-[10px] opacity-50"><i class="fa-solid fa-trash"></i></button>
                        </div>`;
                });
            });
        }

        function closeModal() { document.getElementById('contentModal').classList.add('hidden'); }
        function deleteChapter(id) { if(confirm("Delete Chapter?")) database.ref('study/lectures/' + id).remove(); }
        function deleteContent(chId, cId) { database.ref(`study/lectures/${chId}/content/${cId}`).remove(); }
        function toggleHide(id, status) { database.ref(`study/lectures/${id}`).update({ isHidden: !status }); }

        loadChapters();
    </script>
</body>
  </html>
