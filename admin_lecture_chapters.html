<script>
    // ... (Firebase Init)
    let currentChapterId = null;
    const batchId = localStorage.getItem('selectedBatchId');

    if(!batchId) {
        alert("Please Select a Batch from Dashboard first!");
        location.href = 'admin_dashboard.html';
    }

    function createChapter() {
        const name = document.getElementById('chName').value;
        if(!name) return alert("Enter Chapter Name!");
        // Store chapters inside specific batch
        database.ref(`courses/${batchId}/chapters`).push({
            name: name,
            timestamp: Date.now()
        }).then(() => {
            document.getElementById('chName').value = "";
            alert("Chapter Created!");
        });
    }

    function loadChapters() {
        database.ref(`courses/${batchId}/chapters`).on('value', (snap) => {
            const list = document.getElementById('chapterList');
            list.innerHTML = "";
            snap.forEach(child => {
                const ch = child.val();
                list.innerHTML += `
                    <div class="glass p-5 rounded-[2rem] flex justify-between items-center border border-white/5 mb-3">
                        <div class="flex-1" onclick="openManager('${child.key}', '${ch.name}')">
                            <h4 class="text-[11px] font-black uppercase italic">${ch.name}</h4>
                            <p class="text-[7px] text-gray-500 font-bold mt-1 uppercase italic tracking-widest">Click to Edit/Add Content</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="deleteChapter('${child.key}')" class="w-8 h-8 rounded-full bg-red-500/10 text-red-500 text-[10px] border border-red-500/20"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>`;
            });
        });
    }

    function openManager(id, name) {
        currentChapterId = id;
        document.getElementById('modalTitle').innerText = name;
        document.getElementById('contentModal').classList.remove('hidden');
        loadChapterContent(id);
    }

    function addContent() {
        const type = document.getElementById('contentType').value;
        const title = document.getElementById('contTitle').value;
        const url = document.getElementById('contUrl').value;
        if(!title || !url) return alert("Fill all fields!");

        database.ref(`courses/${batchId}/chapters/${currentChapterId}/content`).push({
            type: type,
            title: title,
            url: url
        }).then(() => {
            document.getElementById('contTitle').value = "";
            document.getElementById('contUrl').value = "";
        });
    }

    function loadChapterContent(chId) {
        database.ref(`courses/${batchId}/chapters/${chId}/content`).on('value', (snap) => {
            const list = document.getElementById('addedContentList');
            list.innerHTML = "";
            snap.forEach(child => {
                const c = child.val();
                list.innerHTML += `
                    <div class="glass p-4 rounded-2xl flex justify-between items-center border border-white/5 mb-2">
                        <div class="flex items-center gap-3">
                            <i class="fa-solid fa-file-pdf text-yellow-500 text-[10px]"></i>
                            <span class="text-[9px] font-black uppercase">${c.title} (${c.type})</span>
                        </div>
                        <button onclick="deleteContent('${chId}', '${child.key}')" class="text-red-500 text-[10px]"><i class="fa-solid fa-trash"></i></button>
                    </div>`;
            });
        });
    }

    function closeModal() { document.getElementById('contentModal').classList.add('hidden'); }
    function deleteChapter(id) { if(confirm("Delete Chapter?")) database.ref(`courses/${batchId}/chapters/${id}`).remove(); }
    function deleteContent(chId, cId) { database.ref(`courses/${batchId}/chapters/${chId}/content/${cId}`).remove(); }

    loadChapters();
</script>
