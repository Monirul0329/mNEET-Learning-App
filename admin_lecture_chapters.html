<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .glass-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); outline: none; color: white; }
        body { background: #070b14; color: white; font-family: sans-serif; min-height: 100vh; }
        .btn-active:active { transform: scale(0.95); }
    </style>
</head>
<body class="pb-24">

    <div class="sticky top-0 z-50 p-6 glass border-b border-white/5 flex justify-between items-center">
        <button onclick="handleBack()" class="w-10 h-10 glass rounded-2xl flex items-center justify-center text-gray-400 btn-active"><i class="fa-solid fa-arrow-left"></i></button>
        <h2 id="titleText" class="text-xs font-black text-blue-500 uppercase tracking-widest">Lecture Hub Control</h2>
        <div class="w-10"></div>
    </div>

    <div class="p-4 max-w-lg mx-auto space-y-6">
        
        <div id="mainForm" class="bg-[#16213e] p-6 rounded-[2.5rem] border border-white/5 shadow-2xl">
            <p id="formLabel" class="text-[8px] font-black uppercase text-gray-500 mb-4 text-center tracking-widest">Step 1: Create Lecture Topic</p>
            <div class="space-y-3">
                <input type="hidden" id="editId">
                <input type="text" id="itemName" placeholder="Chapter / Topic Name..." class="w-full glass-input p-4 rounded-xl text-xs font-bold">
                
                <div id="contentSection" class="hidden space-y-3 pt-2">
                    <div class="p-4 bg-blue-500/10 border border-blue-500/20 rounded-2xl space-y-2">
                        <p class="text-[7px] font-black text-blue-400 uppercase mb-1">Resource Streaming Pipelines</p>
                        <input type="text" id="videoLink" placeholder="Video Embed URL (YouTube/Vimeo)" class="w-full glass-input p-3 rounded-lg text-[10px]">
                        <input type="text" id="notesLink" placeholder="Class Notes PDF Link" class="w-full glass-input p-3 rounded-lg text-[10px]">
                        <input type="text" id="dppLink" placeholder="DPP Sheet PDF Link" class="w-full glass-input p-3 rounded-lg text-[10px]">
                    </div>
                </div>

                <button onclick="saveData()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black uppercase text-xs btn-active shadow-lg">Confirm & Save Content</button>
            </div>
        </div>

        <div class="space-y-4" id="listArea">
            <p class="text-center text-gray-600 text-[9px] font-black uppercase italic">Syncing Lectures database...</p>
        </div>

    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58", authDomain: "mneet-spark.firebaseapp.com", projectId: "mneet-spark", databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com/", appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331" };
        firebase.initializeApp(firebaseConfig); const db = firebase.database();
        const batchId = localStorage.getItem('selectedBatchId') || "B001";
        let viewMode = "LIST"; let activeChapterId = "";

        function loadData() {
            db.ref(`courses/${batchId}/lectures`).on('value', snap => {
                const listArea = document.getElementById('listArea'); listArea.innerHTML = "";
                if(!snap.exists()) { listArea.innerHTML = `<p class="text-center text-gray-700 text-[10px] py-10 uppercase">No Lecture Chapters Found</p>`; return; }
                snap.forEach(child => {
                    const data = child.val();
                    listArea.innerHTML += `
                        <div class="glass p-5 rounded-[2rem] border ${data.isHidden ? 'border-red-900/50 opacity-60' : 'border-white/5'}">
                            <div class="flex justify-between items-center cursor-pointer" onclick="enterChapter('${child.key}', '${data.name}')">
                                <h4 class="text-xs font-black uppercase italic text-white">${data.name}</h4>
                                <i class="fa-solid fa-chevron-right text-blue-500 text-[10px]"></i>
                            </div>
                            <div class="flex gap-2 mt-4 pt-4 border-t border-white/5">
                                <button onclick="quickEdit('${child.key}', '${data.name}')" class="flex-1 py-2 bg-white/5 rounded-lg text-[8px] font-black uppercase btn-active">Edit Title</button>
                                <button onclick="toggleHide('${child.key}', ${data.isHidden})" class="flex-1 py-2 bg-blue-500/10 text-blue-400 rounded-lg text-[8px] font-black uppercase btn-active">${data.isHidden?'Show':'Hide'}</button>
                                <button onclick="deleteItem('${child.key}')" class="px-4 py-2 bg-red-500/10 text-red-500 rounded-lg btn-active"><i class="fa-solid fa-trash text-[8px]"></i></button>
                            </div>
                        </div>`;
                });
            });
        }

        function enterChapter(id, name) {
            viewMode = "CHAPTER_EDIT"; activeChapterId = id;
            document.getElementById('titleText').innerText = name;
            document.getElementById('formLabel').innerText = "Step 2: Connect Materials";
            document.getElementById('itemName').value = name;
            document.getElementById('contentSection').classList.remove('hidden');
            db.ref(`courses/${batchId}/lectures/${id}`).once('value', s => {
                const d = s.val();
                document.getElementById('videoLink').value = d.video || "";
                document.getElementById('notesLink').value = d.notes || "";
                document.getElementById('dppLink').value = d.dpp || "";
            });
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function saveData() {
            const name = document.getElementById('itemName').value;
            const video = document.getElementById('videoLink').value;
            const notes = document.getElementById('notesLink').value;
            const dpp = document.getElementById('dppLink').value;
            const editId = document.getElementById('editId').value;

            if(!name) return alert("Enter Name");
            const path = `courses/${batchId}/lectures/` + (viewMode === "CHAPTER_EDIT" ? activeChapterId : (editId || ""));
            const payload = { name: name };

            if(viewMode === "CHAPTER_EDIT") { payload.video = video; payload.notes = notes; payload.dpp = dpp; }

            if(viewMode === "CHAPTER_EDIT" || editId) {
                db.ref(path).update(payload).then(() => { alert("Lecture Synced!"); handleBack(); });
            } else {
                db.ref(`courses/${batchId}/lectures`).push({ name: name, isHidden: false, timestamp: Date.now() }).then(() => resetForm());
            }
        }

        function handleBack() {
            if(viewMode === "CHAPTER_EDIT") {
                viewMode = "LIST"; document.getElementById('titleText').innerText = "Lecture Hub Control";
                document.getElementById('formLabel').innerText = "Step 1: Create Lecture Topic";
                document.getElementById('contentSection').classList.add('hidden'); resetForm();
            } else { location.href = "admin_dashboard.html"; }
        }
        function quickEdit(id, name) { document.getElementById('editId').value = id; document.getElementById('itemName').value = name; document.getElementById('itemName').focus(); }
        function toggleHide(id, status) { db.ref(`courses/${batchId}/lectures/${id}`).update({ isHidden: !status }); }
        function deleteItem(id) { if(confirm("Confirm Delete?")) db.ref(`courses/${batchId}/lectures/${id}`).remove(); }
        function resetForm() { document.getElementById('itemName').value = ""; document.getElementById('editId').value = ""; document.getElementById('videoLink').value = ""; document.getElementById('notesLink').value = ""; document.getElementById('dppLink').value = ""; }
        loadData();
    </script>
</body>
</html>
