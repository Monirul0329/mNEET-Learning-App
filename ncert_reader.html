<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive NCERT AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background: #e5e7eb; overflow-x: hidden; font-family: 'Georgia', serif; }
        /* Actual White Paper Look */
        #pdf-render-container {
            background: white;
            box-shadow: 0 0 30px rgba(0,0,0,0.2);
            margin: 60px auto 120px auto;
            width: 100%;
            max-width: 900px;
            position: relative;
            min-height: 100vh;
        }
        canvas { width: 100% !important; height: auto !important; display: block; }
        
        /* Floating Audio Bar */
        .audio-player {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 95%; max-width: 500px; background: #111827; border-radius: 2.5rem;
            padding: 15px 25px; display: flex; align-items: center; gap: 15px;
            z-index: 1000; box-shadow: 0 15px 40px rgba(0,0,0,0.5); border: 1px solid #374151;
        }
        
        .pyq-bubble {
            position: absolute; right: -10px; background: #ef4444; color: white;
            font-size: 8px; font-weight: 900; padding: 3px 8px; border-radius: 20px;
            cursor: pointer; animation: pulse 2s infinite; z-index: 50;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        
        /* Highlight Overlay for Audio Sync */
        #highlight-overlay {
            position: absolute; background: rgba(253, 224, 71, 0.4);
            pointer-events: none; transition: all 0.2s ease; border-radius: 3px; z-index: 10;
        }
        .locked { pointer-events: none !important; }
    </style>
</head>
<body>

    <nav class="fixed top-0 left-0 right-0 bg-white shadow-md p-4 flex justify-between items-center z-[1100]">
        <div class="flex items-center gap-3">
            <button onclick="history.back()" class="text-gray-700 w-10 h-10 flex items-center justify-center"><i class="fa-solid fa-arrow-left"></i></button>
            <h1 id="chTitle" class="text-[10px] font-black uppercase italic tracking-tighter">NCERT AI Reader</h1>
        </div>
        <div class="flex gap-4">
            <button onclick="toggleLock()" id="lockBtn" class="text-blue-600"><i class="fa-solid fa-lock-open"></i></button>
            <button onclick="window.print()" class="text-gray-500"><i class="fa-solid fa-download"></i></button>
        </div>
    </nav>

    <div id="pdf-render-container">
        <div id="highlight-overlay"></div>
        <div id="pdf-content"></div>
        <div id="pyq-container"></div>
    </div>

    <div class="audio-player">
        <button onclick="togglePlay()" id="playIcon" class="w-10 h-10 bg-yellow-500 text-black rounded-full flex items-center justify-center text-sm">
            <i class="fa-solid fa-play"></i>
        </button>
        
        <div class="flex-1">
            <p class="text-[8px] text-gray-400 font-bold uppercase tracking-widest">AI Revision Audio</p>
            <div class="w-full bg-gray-700 h-1 rounded-full mt-1 overflow-hidden">
                <div id="audioProgress" class="bg-yellow-500 h-full w-0"></div>
            </div>
        </div>

        <select onchange="setSpeed(this.value)" class="bg-gray-800 text-[9px] text-yellow-500 font-bold border-none outline-none rounded-lg p-1">
            <option value="1">1.0x</option>
            <option value="1.25">1.25x</option>
            <option value="1.5">1.5x</option>
            <option value="2">2.0x</option>
        </select>
        
        <audio id="ncertAudio" hidden></audio>
    </div>

    <script>
        // PDF.js worker setup
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const firebaseConfig = { /* Paste your config here */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const chapterId = urlParams.get('id');

        let pdfDoc = null;
        let audio = document.getElementById('ncertAudio');
        let isLocked = false;

        async function loadChapterData() {
            db.ref('ncert_chapters/' + chapterId).once('value', async (snap) => {
                const data = snap.val();
                if(!data) return alert("Chapter not found!");

                document.getElementById('chTitle').innerText = data.name;
                audio.src = data.audio;
                
                // Load PDF
                const loadingTask = pdfjsLib.getDocument(data.pdf);
                pdfDoc = await loadingTask.promise;
                renderAllPages();
            });
        }

        async function renderAllPages() {
            const container = document.getElementById('pdf-content');
            for(let i = 1; i <= pdfDoc.numPages; i++) {
                const page = await pdfDoc.getPage(i);
                const viewport = page.getViewport({ scale: 1.5 });
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                
                await page.render({ canvasContext: context, viewport: viewport }).promise;
                container.appendChild(canvas);
            }
        }

        function togglePlay() {
            const btn = document.getElementById('playIcon');
            if(audio.paused) {
                audio.play();
                btn.innerHTML = '<i class="fa-solid fa-pause"></i>';
            } else {
                audio.pause();
                btn.innerHTML = '<i class="fa-solid fa-play"></i>';
            }
        }

        audio.ontimeupdate = () => {
            const perc = (audio.currentTime / audio.duration) * 100;
            document.getElementById('audioProgress').style.width = perc + "%";
            
            // SMART SYNC LOGIC
            // Ekhane amra audio-r time onujayi 'highlight-overlay' er position change korbo
            // Example: moveHighlight(audio.currentTime);
        };

        function setSpeed(s) { audio.playbackRate = s; }

        function toggleLock() {
            isLocked = !isLocked;
            const btn = document.getElementById('lockBtn');
            if(isLocked) {
                document.getElementById('pdf-render-container').classList.add('locked');
                btn.innerHTML = '<i class="fa-solid fa-lock text-red-500"></i>';
            } else {
                document.getElementById('pdf-render-container').classList.remove('locked');
                btn.innerHTML = '<i class="fa-solid fa-lock-open text-blue-600"></i>';
            }
        }

        loadChapterData();
    </script>
</body>
</html>
