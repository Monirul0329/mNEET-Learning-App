<script>
    // ... Firebase Init
    const batchId = localStorage.getItem('selectedBatchId');

    function addSpecial() {
        const topic = document.getElementById('spTopic').value;
        const type = document.getElementById('spType').value;
        const url = document.getElementById('spUrl').value;
        
        if(!topic || !url) return alert("Fill all fields!");

        firebase.database().ref(`courses/${batchId}/special`).push({ 
            topic, type, url, timestamp: Date.now() 
        }).then(() => {
            alert("Special Material Uploaded!");
            document.querySelectorAll('input').forEach(i => i.value = "");
        });
    }

    firebase.database().ref(`courses/${batchId}/special`).on('value', snap => {
        const list = document.getElementById('spList');
        list.innerHTML = "";
        snap.forEach(child => {
            const s = child.val();
            list.innerHTML += `
                <div class="glass p-5 rounded-[2rem] flex justify-between items-center border border-red-500/10 mb-3">
                    <div>
                        <h4 class="text-[11px] font-black uppercase italic">${s.topic}</h4>
                        <p class="text-[8px] text-gray-500 font-bold uppercase">${s.type}</p>
                    </div>
                    <button onclick="deleteSpecial('${child.key}')" class="text-red-500"><i class="fa-solid fa-trash"></i></button>
                </div>`;
        });
    });

    function deleteSpecial(id) { if(confirm("Delete Material?")) firebase.database().ref(`courses/${batchId}/special/` + id).remove(); }
</script>
