<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#0b1120] p-6 text-white">
    <h2 class="text-xs font-black text-gray-500 uppercase tracking-widest mb-6">Course Catalog</h2>
    
    <div id="courseList" class="space-y-6">
        <div class="bg-[#16213e] rounded-[2rem] overflow-hidden border border-gray-800 shadow-xl">
            <div class="p-6">
                <h3 class="text-xl font-bold">Biology Pro 2027</h3>
                <p class="text-gray-500 text-xs mt-2">Complete NEET preparation with expert faculty.</p>
                <div class="mt-6 flex justify-between items-center">
                    <span class="text-2xl font-black text-[#eab308]">₹499</span>
                    <button class="bg-[#eab308] text-black px-6 py-2 rounded-xl font-bold uppercase text-[10px]">Enroll Now</button>
                </div>
            </div>
        </div>
    </div>
    <!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b1120] p-6 text-white font-sans">
    <div class="bg-[#16213e] p-6 rounded-3xl border border-[#eab308]/20 mb-8">
        <h2 class="text-[#eab308] text-xs font-bold mb-6 uppercase tracking-widest text-center">Create New Course</h2>
        <input type="text" id="cTitle" placeholder="Course Name" class="w-full bg-[#1e293b] p-4 rounded-xl mb-4 outline-none border border-gray-700 text-sm">
        <input type="number" id="cPrice" placeholder="Price (₹)" class="w-full bg-[#1e293b] p-4 rounded-xl mb-4 outline-none border border-gray-700 text-sm">
        <button onclick="saveCourse()" class="w-full bg-[#eab308] text-black py-4 rounded-xl font-black uppercase text-[10px] shadow-lg">Publish Course</button>
    </div>

    <h3 class="text-[10px] text-gray-500 uppercase font-bold mb-4 ml-2">Active Courses</h3>
    <div id="courseList" class="space-y-3"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBisQytTeFhjMd1kTUNwcmCelPy7C0ilIY",
  authDomain: "mneet-7699.firebaseapp.com",
  projectId: "mneet-7699",
  storageBucket: "mneet-7699.firebasestorage.app",
  messagingSenderId: "801664280357",
  appId: "1:801664280357:web:03da6173f29bedfeaa9ccc",
  measurementId: "G-EFNE8HTGZ3"
};
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.saveCourse = async () => {
            const title = document.getElementById('cTitle').value;
            const price = document.getElementById('cPrice').value;
            if(!title || !price) return alert("Fields Required!");
            await addDoc(collection(db, "courses"), { title, price, timestamp: new Date() });
            alert("Course Published!");
            location.reload();
        };

        onSnapshot(collection(db, "courses"), (snap) => {
            const list = document.getElementById('courseList');
            list.innerHTML = "";
            snap.forEach(d => {
                const c = d.data();
                list.innerHTML += `<div class="bg-[#16213e] p-4 rounded-2xl flex justify-between items-center border border-gray-800">
                    <div><p class="font-bold text-sm">${c.title}</p><p class="text-[10px] text-gold">₹${c.price}</p></div>
                    <button onclick="deleteC('${d.id}')" class="text-red-500 text-[10px] font-bold">DEL</button>
                </div>`;
            });
        });

        window.deleteC = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db, "courses", id)); };
    </script>
</body>
</html>
