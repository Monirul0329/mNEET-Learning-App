<script>
    // PW Style Logic: Filter courses and render with enrollment checks
    const q = query(collection(db, "courses"), where("isHidden", "==", false));
    onSnapshot(q, (snap) => {
        const list = document.getElementById('studentCourseList'); 
        list.innerHTML = "";
        snap.forEach(d => {
            const c = d.data();
            list.innerHTML += `
            <div class="course-card rounded-[2.5rem] overflow-hidden shadow-2xl mb-6">
                <div class="relative">
                    <img src="${c.thumbnail || c.img}" class="w-full h-52 object-cover">
                    <div class="absolute top-4 left-4 bg-[#eab308] text-black px-3 py-1 rounded-lg text-[9px] font-black uppercase">LIVE BATCH</div>
                </div>
                <div class="p-6">
                    <h3 class="text-2xl font-black italic uppercase italic tracking-tighter mb-2">${c.title}</h3>
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-[9px] font-bold text-gray-500 uppercase">One Time Fee</p>
                            <p class="text-xl font-black text-white italic">₹${c.price}</p>
                        </div>
                        <button onclick="enroll('${d.id}')" class="buy-btn text-black px-8 py-3 rounded-2xl font-black uppercase text-xs shadow-lg">Buy Now</button>
                    </div>
                </div>
            </div>`;
        });
    });
</script>
