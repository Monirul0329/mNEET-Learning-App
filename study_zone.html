<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(22, 33, 62, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        body { background: #070b14; color: white; font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .scroll-area { flex: 1; overflow-y: auto; padding-bottom: 100px; }
        .card-container { transition: all 0.3s ease; border-left: 5px solid; cursor: pointer; }
        .card-container:active { transform: scale(0.96); opacity: 0.8; }
        .gold-glow { color: #eab308; text-shadow: 0 0 10px rgba(234, 179, 8, 0.4); }
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body>

    <div class="flex justify-between items-center p-6 bg-[#16213e] border-b border-white/5 shadow-xl">
        <div class="flex items-center gap-4">
            <button onclick="location.href='dashboard.html'" class="w-10 h-10 glass rounded-2xl flex items-center justify-center text-gray-400"><i class="fa-solid fa-chevron-left"></i></button>
            <h1 class="text-xl font-black italic uppercase gold-glow tracking-tighter">STUDY ZONE</h1>
        </div>
        <div class="bg-yellow-500/10 px-4 py-2 rounded-full border border-yellow-500/20 text-[10px] font-black italic">
            🪙 <span id="coinCount">0</span>
        </div>
    </div>

    <div class="scroll-area p-4 space-y-5">
        <div class="glass p-5 rounded-3xl border-b-2 border-blue-500/30 mx-1">
            <div class="flex justify-between items-center mb-2 px-1">
                <span class="text-[9px] font-black uppercase text-gray-500 italic tracking-widest">Knowledge Mastery</span>
                <span class="text-[10px] font-black text-blue-400" id="progressPctText">0%</span>
            </div>
            <div class="w-full bg-white/5 h-1 rounded-full overflow-hidden">
                <div class="bg-blue-500 h-full transition-all duration-500" id="progressBarFill" style="width: 0%"></div>
            </div>
        </div>
        
        <div onclick="navigate('lecture_notes_hub.html')" class="glass p-6 rounded-[2.5rem] flex justify-between items-center card-container border-blue-500 shadow-lg">
            <div class="flex items-center gap-5">
                <div class="w-12 h-12 rounded-2xl bg-blue-500/10 flex items-center justify-center text-blue-500"><i class="fa-solid fa-clapperboard text-lg"></i></div>
                <h4 class="text-xs font-black uppercase italic tracking-wider">Lecture, Notes & DPP Hub</h4>
            </div>
            <i class="fa-solid fa-chevron-right text-gray-800 text-xs"></i>
        </div>

        <div onclick="navigate('study.html')" class="glass p-6 rounded-[2.5rem] flex justify-between items-center card-container border-yellow-500 shadow-lg">
            <div class="flex items-center gap-5">
                <div class="w-12 h-12 rounded-2xl bg-yellow-500/10 flex items-center justify-center text-[#eab308]"><i class="fa-solid fa-book-open text-lg"></i></div>
                <h4 class="text-xs font-black uppercase italic tracking-wider">NCERT Reading & PYQ Tags</h4>
            </div>
            <i class="fa-solid fa-chevron-right text-gray-800 text-xs"></i>
        </div>

        <div onclick="navigate('quiz.html')" class="glass p-6 rounded-[2.5rem] flex justify-between items-center card-container border-purple-500 shadow-lg">
            <div class="flex items-center gap-5">
                <div class="w-12 h-12 rounded-2xl bg-purple-500/10 flex items-center justify-center text-purple-400"><i class="fa-solid fa-vial-circle-check text-lg"></i></div>
                <h4 class="text-xs font-black uppercase italic tracking-wider">Chapter & Topic Wise Quiz</h4>
            </div>
            <i class="fa-solid fa-chevron-right text-gray-800 text-xs"></i>
        </div>

        <div onclick="navigate('special_hub.html')" class="glass p-6 rounded-[2.5rem] flex justify-between items-center card-container border-red-500 shadow-lg">
            <div class="flex items-center gap-5">
                <div class="w-12 h-12 rounded-2xl bg-red-500/10 flex items-center justify-center text-red-500"><i class="fa-solid fa-folder-plus text-lg"></i></div>
                <h4 class="text-xs font-black uppercase italic tracking-wider">Special Materials Hub</h4>
            </div>
            <i class="fa-solid fa-chevron-right text-gray-800 text-xs"></i>
        </div>

        <div onclick="navigate('support.html')" class="glass p-6 rounded-[2.5rem] flex justify-between items-center card-container border-green-500 shadow-lg">
            <div class="flex items-center gap-5">
                <div class="w-12 h-12 rounded-2xl bg-green-500/10 flex items-center justify-center text-green-500"><i class="fa-solid fa-headset text-lg"></i></div>
                <h4 class="text-xs font-black uppercase italic tracking-wider">Doubt & Support Box</h4>
            </div>
            <div class="bg-green-500 text-[7px] font-black px-2 py-1 rounded text-black italic">NEW</div>
        </div>
    </div>

    <nav class="fixed bottom-6 left-6 right-6 glass p-4 rounded-full flex justify-around items-center z-50 border-white/10 shadow-2xl">
        <a href="dashboard.html" class="text-gray-500"><i class="fa-solid fa-house"></i></a>
        <a href="study_zone.html" class="text-[#eab308]"><i class="fa-solid fa-book-open text-lg"></i></a>
        <a href="all_batches.html" class="relative -mt-12">
            <div class="bg-blue-600 w-14 h-14 rounded-full flex items-center justify-center border-4 border-[#070b14] shadow-lg"><i class="fa-solid fa-layer-group text-white text-xl"></i></div>
        </a>
        <a href="test_zone.html" class="text-gray-500"><i class="fa-solid fa-pen-nib"></i></a>
        <a href="mstore.html" class="text-gray-500"><i class="fa-solid fa-store"></i></a>
    </nav>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58", authDomain: "mneet-spark.firebaseapp.com", projectId: "mneet-spark", databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com/", appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const selectedBatchId = localStorage.getItem('selectedBatchId');
        if (!selectedBatchId) { alert("Please select a batch first!"); window.location.href = 'all_batches.html'; }
        const userEmail = localStorage.getItem('mUserEmail');
        if (userEmail) {
            const safeEmail = userEmail.replace(/\./g, ',');
            database.ref('users/' + safeEmail + '/coins').on('value', s => { document.getElementById('coinCount').innerText = s.val() || 0; });
            database.ref(`users/${safeEmail}/masteryProgress/${selectedBatchId}`).on('value', snap => {
                const currentProgress = snap.val() || 0;
                document.getElementById('progressPctText').innerText = currentProgress + "%";
                document.getElementById('progressBarFill').style.width = currentProgress + "%";
            });
        }
        function navigate(page) { window.location.href = page; }
    </script>
</body>
    </html>
