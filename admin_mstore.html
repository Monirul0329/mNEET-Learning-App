<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style> .glass { background: rgba(22, 33, 62, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); } </style>
</head>
<body class="bg-[#070b14] text-white p-4 pb-32">

    <div class="grid grid-cols-2 gap-4 mb-10">
        <div class="glass p-6 rounded-[2rem] text-center border-b-4 border-green-500">
            <p class="text-[8px] font-black text-gray-500 uppercase mb-2">Total Income</p>
            <h2 class="text-xl font-black text-green-500">₹45,200</h2>
        </div>
        <div class="glass p-6 rounded-[2rem] text-center border-b-4 border-blue-500">
            <p class="text-[8px] font-black text-gray-500 uppercase mb-2">All Orders</p>
            <h2 class="text-xl font-black text-blue-500">120</h2>
        </div>
    </div>

    <div class="glass p-6 rounded-[2.5rem] mb-10 border border-white/5">
        <h3 class="text-xs font-black gold-glow uppercase italic mb-6">Inventory Management</h3>
        <input type="text" placeholder="Product Name" class="w-full bg-[#16213e] p-4 rounded-xl mb-2 outline-none text-[10px]">
        <div class="flex gap-2">
            <input type="text" placeholder="Offer Price" class="w-1/2 bg-[#16213e] p-4 rounded-xl mb-2 outline-none text-[10px]">
            <input type="text" placeholder="MRP" class="w-1/2 bg-[#16213e] p-4 rounded-xl mb-2 outline-none text-[10px]">
        </div>
        <input type="text" placeholder="Image URL" class="w-full bg-[#16213e] p-4 rounded-xl mb-4 outline-none text-[10px]">
        <button class="w-full bg-[#eab308] text-black py-4 rounded-xl font-black uppercase text-[10px]">Upload Product</button>
    </div>

    <h4 class="text-[10px] font-black uppercase text-gray-500 mb-4 px-2 italic">Recent Customer Orders</h4>
    <div class="space-y-3">
        <div class="glass p-4 rounded-2xl flex justify-between items-center border border-white/5">
            <div>
                <p class="text-[10px] font-black">NEET Biology Kit</p>
                <p class="text-[8px] text-blue-400 mt-1 italic">Deliver to: Monirul, AIIMS Campus...</p>
            </div>
            <button class="bg-green-600 text-white p-2 rounded-lg text-[8px] font-black">DISPATCHED</button>
        </div>
    </div>

    <nav class="fixed bottom-6 left-6 right-6 glass p-4 rounded-full flex justify-around items-center shadow-2xl border-white/10 z-50">
        <a href="admin_dashboard.html"><i class="fa-solid fa-house text-gray-500"></i></a>
        <a href="admin_study.html"><i class="fa-solid fa-book-open text-gray-500"></i></a>
        <a href="admin_batches.html"><i class="fa-solid fa-layer-group text-blue-500 text-xl"></i></a>
        <a href="admin_test.html"><i class="fa-solid fa-pen-nib text-gray-500"></i></a>
        <i class="fa-solid fa-store gold-glow"></i>
    </nav>
</body>
</html>
