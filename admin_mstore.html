<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style> .glass { background: rgba(22, 33, 62, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); } </style>
</head>
<body class="bg-[#070b14] text-white p-4 pb-32">

    <div class="grid grid-cols-2 gap-4 mb-10">
        <div class="glass p-6 rounded-[2rem] text-center border-b-4 border-green-500">
            <p class="text-[8px] font-black text-gray-500 uppercase mb-2">Total Income</p>
            <h2 class="text-xl font-black text-green-500">₹0</h2>
        </div>
        <div class="glass p-6 rounded-[2rem] text-center border-b-4 border-blue-500">
            <p class="text-[8px] font-black text-gray-500 uppercase mb-2">Orders</p>
            <h2 class="text-xl font-black text-blue-500">0</h2>
        </div>
    </div>

    <div class="glass p-6 rounded-[2.5rem] mb-10 border border-white/5">
        <h3 class="text-xs font-black uppercase text-[#eab308] italic mb-6">Inventory Management</h3>
        <input type="text" placeholder="Product Name" class="w-full bg-[#16213e] p-4 rounded-xl mb-2 outline-none text-[10px] text-white">
        <div class="flex gap-2 mb-2">
            <input type="text" placeholder="Price" class="w-1/2 bg-[#16213e] p-4 rounded-xl text-[10px] text-white">
            <input type="text" placeholder="MRP" class="w-1/2 bg-[#16213e] p-4 rounded-xl text-[10px] text-white">
        </div>
        <input type="text" placeholder="Image URL" class="w-full bg-[#16213e] p-4 rounded-xl mb-4 text-[10px] text-white">
        <button class="w-full bg-[#eab308] text-black py-4 rounded-xl font-black uppercase text-[10px]">Upload Product</button>
    </div>
</body>
</html>
