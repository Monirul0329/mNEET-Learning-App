<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style> .glass { background: rgba(22, 33, 62, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); } </style>
</head>
<body class="bg-[#070b14] text-white p-4 pb-32">

    <div class="grid grid-cols-2 gap-4 mb-10">
        <div class="glass p-6 rounded-[2rem] text-center border-b-4 border-green-500">
            <p class="text-[8px] font-black text-gray-500 uppercase mb-2">Total Income</p>
            <h2 id="totalIncome" class="text-xl font-black text-green-500">₹0</h2>
        </div>
        <div class="glass p-6 rounded-[2rem] text-center border-b-4 border-blue-500">
            <p class="text-[8px] font-black text-gray-500 uppercase mb-2">Orders</p>
            <h2 id="totalOrders" class="text-xl font-black text-blue-500">0</h2>
        </div>
    </div>

    <div class="glass p-6 rounded-[2.5rem] mb-10 border border-white/5">
        <h3 class="text-xs font-black uppercase text-[#eab308] italic mb-6">Inventory Management</h3>
        <input type="text" id="pName" placeholder="Product Name" class="w-full bg-[#16213e] p-4 rounded-xl mb-2 outline-none text-[10px] text-white border border-white/5">
        <div class="flex gap-2 mb-2">
            <input type="number" id="pPrice" placeholder="Price" class="w-1/2 bg-[#16213e] p-4 rounded-xl text-[10px] text-white border border-white/5">
            <input type="number" id="pMrp" placeholder="MRP" class="w-1/2 bg-[#16213e] p-4 rounded-xl text-[10px] text-white border border-white/5">
        </div>
        <input type="text" id="pImg" placeholder="Image URL" class="w-full bg-[#16213e] p-4 rounded-xl mb-4 text-[10px] text-white border border-white/5">
        <button onclick="uploadProduct()" class="w-full bg-[#eab308] text-black py-4 rounded-xl font-black uppercase text-[10px] active:scale-95 transition-all">Upload Product</button>
    </div>

    <div id="productList" class="space-y-4"></div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58", authDomain: "mneet-spark.firebaseapp.com", projectId: "mneet-spark", databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com/", appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function uploadProduct() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const mrp = document.getElementById('pMrp').value;
            const img = document.getElementById('pImg').value;

            if(!name || !price) return alert("Fill Name and Price!");

            database.ref('mstore/products').push({
                name, price, mrp, img, timestamp: Date.now()
            }).then(() => {
                alert("Product Added!");
                document.querySelectorAll('input').forEach(i => i.value = "");
            });
        }

        database.ref('mstore/products').on('value', snap => {
            const list = document.getElementById('productList');
            list.innerHTML = "";
            snap.forEach(child => {
                const p = child.val();
                list.innerHTML += `
                    <div class="glass p-4 rounded-3xl flex justify-between items-center border border-white/5">
                        <div class="flex items-center gap-4">
                            <img src="${p.img}" class="w-12 h-12 rounded-xl object-cover">
                            <div>
                                <h4 class="text-[10px] font-black uppercase">${p.name}</h4>
                                <p class="text-yellow-500 text-[10px] font-black">₹${p.price} <span class="text-gray-500 line-through ml-1">₹${p.mrp}</span></p>
                            </div>
                        </div>
                        <button onclick="deleteProduct('${child.key}')" class="text-red-500 p-2"><i class="fa-solid fa-trash-can"></i></button>
                    </div>`;
            });
        });

        function deleteProduct(id) { if(confirm("Delete Product?")) database.ref('mstore/products/' + id).remove(); }
    </script>
</body>
</html>
