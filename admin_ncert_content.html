<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(22, 33, 62, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        body { background: #070b14; color: white; font-family: sans-serif; }
        input { background: #0b1120 !important; border: 1px solid #1f2937 !important; color: white; outline: none; }
    </style>
</head>
<body class="p-4">
    <div class="flex items-center gap-4 mb-8">
        <button onclick="history.back()" class="w-10 h-10 glass rounded-2xl flex items-center justify-center text-gray-400"><i class="fa-solid fa-chevron-left"></i></button>
        <h1 id="chNameHeader" class="text-xs font-black text-yellow-500 uppercase italic">Manage Content</h1>
    </div>

    <div class="glass p-6 rounded-[2.5rem] space-y-6">
        <div>
            <div class="flex justify-between mb-2 px-1">
                <label class="text-[9px] font-black uppercase text-gray-500 italic">NCERT PDF Master URL</label>
                <button onclick="delField('pdf')" class="text-red-500 text-[8px] font-black">DELETE PDF</button>
            </div>
            <input type="text" id="pdfUrl" class="w-full p-4 rounded-2xl text-xs">
        </div>
        <div>
            <div class="flex justify-between mb-2 px-1">
                <label class="text-[9px] font-black uppercase text-gray-500 italic">Revision Audio (MP3)</label>
                <button onclick="delField('audio')" class="text-red-500 text-[8px] font-black">DELETE AUDIO</button>
            </div>
            <input type="text" id="audioUrl" class="w-full p-4 rounded-2xl text-xs">
        </div>
        <button onclick="save()" class="w-full bg-blue-600 p-4 rounded-2xl font-black uppercase text-xs shadow-xl">Save All Updates</button>
    </div>

    <script>
        const firebaseConfig = { /* Paste Config */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const cid = new URLSearchParams(window.location.search).get('id');

        db.ref('ncert_ai/'+cid).once('value', snap => {
            const d = snap.val();
            document.getElementById('chNameHeader').innerText = d.name;
            document.getElementById('pdfUrl').value = d.pdf || "";
            document.getElementById('audioUrl').value = d.audio || "";
        });

        function save() {
            db.ref('ncert_ai/'+cid).update({
                pdf: document.getElementById('pdfUrl').value,
                audio: document.getElementById('audioUrl').value
            }).then(() => alert("Saved!"));
        }
        function delField(f) { if(confirm("Clear "+f+"?")) { document.getElementById(f+'Url').value=""; save(); } }
    </script>
</body>
</html>
