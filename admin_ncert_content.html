<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(22, 33, 62, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        body { background: #070b14; color: white; font-family: sans-serif; }
        input { background: #0b1120 !important; border: 1px solid #1f2937 !important; color: white; outline: none; }
    </style>
</head>
<body class="p-4">

    <div class="flex items-center gap-4 mb-8">
        <button onclick="history.back()" class="w-10 h-10 glass rounded-2xl flex items-center justify-center text-gray-400"><i class="fa-solid fa-chevron-left"></i></button>
        <h1 id="chapterHeader" class="text-xs font-black uppercase text-yellow-500 italic">Manage Content</h1>
    </div>

    <div class="glass p-8 rounded-[3rem] space-y-8 border border-white/5">
        <div>
            <div class="flex justify-between items-center mb-3">
                <label class="text-[9px] font-black uppercase text-gray-500 tracking-widest">NCERT PDF Master URL</label>
                <button onclick="deleteField('pdf')" class="text-red-500 text-[10px] font-bold">DELETE PDF</button>
            </div>
            <input type="text" id="pdfUrl" placeholder="Paste PDF Link here..." class="w-full p-4 rounded-2xl text-[10px]">
        </div>

        <div>
            <div class="flex justify-between items-center mb-3">
                <label class="text-[9px] font-black uppercase text-gray-500 tracking-widest">Revision Audio URL</label>
                <button onclick="deleteField('audio')" class="text-red-500 text-[10px] font-bold">DELETE AUDIO</button>
            </div>
            <input type="text" id="audioUrl" placeholder="Paste Audio Link here..." class="w-full p-4 rounded-2xl text-[10px]">
        </div>

        <button onclick="saveContent()" class="w-full bg-blue-600 text-white py-5 rounded-[2rem] font-black uppercase text-[11px] shadow-2xl active:scale-95 transition-all">Save All Updates</button>
    </div>

    <script>
        const firebaseConfig = { /* Paste Config Here */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const urlParams = new URLSearchParams(window.location.search);
        const chId = urlParams.get('id');

        function loadData() {
            db.ref('ncert_v2/' + chId).once('value', snap => {
                const data = snap.val();
                document.getElementById('chapterHeader').innerText = data.name;
                document.getElementById('pdfUrl').value = data.pdf || "";
                document.getElementById('audioUrl').value = data.audio || "";
            });
        }

        function saveContent() {
            db.ref('ncert_v2/' + chId).update({
                pdf: document.getElementById('pdfUrl').value,
                audio: document.getElementById('audioUrl').value
            }).then(() => alert("Content Updated Successfully!"));
        }

        function deleteField(type) {
            if(confirm(`Remove ${type}?`)) {
                document.getElementById(type + 'Url').value = "";
                saveContent();
            }
        }

        loadData();
    </script>
</body>
</html>
