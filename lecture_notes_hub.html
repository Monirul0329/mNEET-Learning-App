<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(22, 33, 62, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        body { background: #070b14; color: white; font-family: sans-serif; min-height: 100vh; }
        .blue-glow { color: #3b82f6; text-shadow: 0 0 10px rgba(59, 130, 246, 0.4); }
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="p-4 pb-32">

    <div class="flex justify-between items-center mb-8 px-1 mt-2">
        <div class="flex items-center gap-4">
            <button onclick="location.href='study_zone.html'" class="w-10 h-10 glass rounded-2xl flex items-center justify-center text-gray-400 active:scale-90 transition-all"><i class="fa-solid fa-chevron-left"></i></button>
            <div>
                <h1 class="text-xl font-black italic blue-glow uppercase tracking-tighter">LECTURE HUB</h1>
                <p class="text-[7px] text-gray-500 uppercase font-bold tracking-widest mt-0.5">Classes, Notes & DPP Matrix</p>
            </div>
        </div>
    </div>

    <div class="space-y-4" id="lectureHubContainer">
        <div class="py-20 text-center text-gray-600 text-[10px] uppercase font-black tracking-widest">
            <i class="fa-solid fa-circle-notch animate-spin text-blue-500 mr-2"></i> Synced Processing System...
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58", authDomain: "mneet-spark.firebaseapp.com", projectId: "mneet-spark", databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com/", appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331" };
        firebase.initializeApp(firebaseConfig); const database = firebase.database();
        const batchId = localStorage.getItem('selectedBatchId') || "B001";

        function loadStudentLectures() {
            database.ref(`courses/${batchId}/lectures`).on('value', snap => {
                const container = document.getElementById('lectureHubContainer'); container.innerHTML = "";
                if(!snap.exists()) { container.innerHTML = `<p class="text-center text-gray-600 text-[9px] font-black uppercase py-10">No Lectures Uploaded for this Batch</p>`; return; }
                
                snap.forEach(child => {
                    const l = child.val(); if(l.isHidden) return;

                    container.innerHTML += `
                        <div class="glass p-5 rounded-[2.5rem] border border-white/5 space-y-4 shadow-lg">
                            <div class="flex justify-between items-center">
                                <div class="flex items-center gap-4">
                                    <div class="w-10 h-10 rounded-xl bg-blue-500/10 flex items-center justify-center text-blue-500"><i class="fa-solid fa-graduation-cap"></i></div>
                                    <h4 class="text-xs font-black uppercase italic tracking-wide text-white">${l.name}</h4>
                                </div>
                            </div>
                            
                            <div class="grid grid-cols-3 gap-2 pt-2 border-t border-white/5">
                                ${l.video ? `<a href="${l.video}" target="_blank" class="py-2.5 bg-blue-600 rounded-xl text-[8px] font-black uppercase text-center text-white"><i class="fa-solid fa-play mr-1"></i> Watch</a>` : `<button disabled class="py-2.5 bg-white/5 rounded-xl text-[8px] font-black uppercase text-gray-600 text-center">N/A</button>`}
                                ${l.notes ? `<a href="${l.notes}" target="_blank" class="py-2.5 bg-white/5 border border-white/10 rounded-xl text-[8px] font-black uppercase text-center text-yellow-500"><i class="fa-solid fa-file-lines mr-1"></i> Notes</a>` : `<button disabled class="py-2.5 bg-white/5 rounded-xl text-[8px] font-black uppercase text-gray-600 text-center">N/A</button>`}
                                ${l.dpp ? `<a href="${l.dpp}" target="_blank" class="py-2.5 bg-white/5 border border-white/10 rounded-xl text-[8px] font-black uppercase text-center text-purple-400"><i class="fa-solid fa-paste mr-1"></i> DPP</a>` : `<button disabled class="py-2.5 bg-white/5 rounded-xl text-[8px] font-black uppercase text-gray-600 text-center">N/A</button>`}
                            </div>
                        </div>`;
                });
            });
        }
        loadStudentLectures();
    </script>
</body>
</html>
