<div id="lectureContainer" class="space-y-4">
    <p class="text-center text-[10px] text-gray-600 uppercase font-black py-10">Select a Batch from Dashboard to see Lectures</p>
</div>

<script>
    const batchId = localStorage.getItem('selectedBatchId');
    if(batchId) {
        database.ref(`courses/${batchId}/chapters`).on('value', snap => {
            const container = document.getElementById('lectureContainer');
            container.innerHTML = "";
            snap.forEach(child => {
                const ch = child.val();
                container.innerHTML += `
                <div class="glass p-5 rounded-[2rem] border border-white/5 mb-4">
                    <h3 class="text-[11px] font-black uppercase mb-3 text-gray-400 italic">${ch.name}</h3>
                    <div id="content-${child.key}" class="space-y-2">
                        </div>
                </div>`;
                // Load inner content for each chapter
                database.ref(`courses/${batchId}/chapters/${child.key}/content`).on('value', cSnap => {
                    const contentDiv = document.getElementById(`content-${child.key}`);
                    contentDiv.innerHTML = "";
                    cSnap.forEach(contentChild => {
                        const c = contentChild.val();
                        contentDiv.innerHTML += `
                        <div class="bg-white/5 p-4 rounded-2xl flex justify-between items-center">
                            <p class="text-[9px] font-bold uppercase">${c.title}</p>
                            <a href="${c.url}" class="w-8 h-8 glass rounded-full flex items-center justify-center text-[#eab308]"><i class="fa-solid fa-play text-[10px]"></i></a>
                        </div>`;
                    });
                });
            });
        });
    }
</script>
