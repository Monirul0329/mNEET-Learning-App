<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(22, 33, 62, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        body { background: #070b14; color: white; font-family: sans-serif; overflow-x: hidden; }
        input { background: #0b1120 !important; border: 1px solid #1f2937 !important; color: white; outline: none; }
        .modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-4">

    <div class="flex items-center gap-4 mb-6 sticky top-0 z-50 bg-[#070b14] py-2">
        <button onclick="history.back()" class="w-10 h-10 glass rounded-2xl flex items-center justify-center text-gray-400"><i class="fa-solid fa-chevron-left"></i></button>
        <div class="relative flex-1">
            <input type="text" id="searchInput" oninput="searchChapters()" placeholder="Search Chapter..." class="w-full glass p-3 rounded-2xl text-xs pl-10">
            <i class="fa-solid fa-search absolute left-4 top-3.5 text-gray-500 text-sm"></i>
        </div>
    </div>

    <div class="glass p-5 rounded-[2rem] mb-8">
        <p class="text-[9px] font-bold text-yellow-500 uppercase mb-3 italic">Create New Chapter</p>
        <div class="flex gap-2">
            <input type="text" id="newChName" placeholder="Chapter Name" class="flex-1 p-3 rounded-xl text-xs">
            <button onclick="addChapter()" class="bg-yellow-500 text-black px-4 rounded-xl font-bold text-xs">ADD</button>
        </div>
    </div>

    <div id="chList" class="space-y-4"></div>

    <div id="nameModal" class="modal">
        <div class="w-full max-w-xs glass p-6 rounded-[2rem] text-center">
            <h2 class="text-xs font-bold text-yellow-500 mb-4 uppercase">Rename Chapter</h2>
            <input type="text" id="editNameInput" class="w-full p-3 rounded-xl text-xs mb-4">
            <div class="flex gap-2">
                <button onclick="saveNewName()" class="flex-1 bg-blue-600 p-2 rounded-lg text-[10px] font-bold">UPDATE</button>
                <button onclick="closeModals()" class="flex-1 bg-gray-700 p-2 rounded-lg text-[10px] font-bold">CANCEL</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58",
            authDomain: "mneet-spark.firebaseapp.com",
            projectId: "mneet-spark",
            databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com/",
            appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let selectedId = null;

        function addChapter() {
            const name = document.getElementById('newChName').value;
            if(name) db.ref('ncert_final').push({ name, pdf: "", audio: "" }).then(() => document.getElementById('newChName').value = "");
        }

        function loadList() {
            db.ref('ncert_final').on('value', snap => {
                const list = document.getElementById('chList');
                list.innerHTML = "";
                snap.forEach(child => {
                    const ch = child.val();
                    list.innerHTML += `
                    <div class="glass p-4 rounded-3xl flex justify-between items-center border-l-4 border-yellow-500">
                        <div onclick="location.href='admin_ncert_content.html?id=${child.key}'" class="flex-1 cursor-pointer">
                            <h4 class="text-xs font-bold uppercase italic">${ch.name}</h4>
                            <p class="text-[8px] text-gray-500 mt-1">TAP TO MANAGE PDF/AUDIO</p>
                        </div>
                        <div class="flex gap-4 ml-2">
                            <i onclick="openRename('${child.key}', '${ch.name}')" class="fa-solid fa-edit text-blue-400 cursor-pointer"></i>
                            <i onclick="deleteCh('${child.key}')" class="fa-solid fa-trash text-red-500 cursor-pointer"></i>
                        </div>
                    </div>`;
                });
            });
        }

        function openRename(id, name) { selectedId = id; document.getElementById('editNameInput').value = name; document.getElementById('nameModal').style.display = 'flex'; }
        function saveNewName() { db.ref('ncert_final/'+selectedId).update({ name: document.getElementById('editNameInput').value }).then(closeModals); }
        function deleteCh(id) { if(confirm("Delete Chapter?")) db.ref('ncert_final/'+id).remove(); }
        function closeModals() { document.getElementById('nameModal').style.display = 'none'; }
        function searchChapters() {
            let filter = document.getElementById('searchInput').value.toUpperCase();
            let cards = document.getElementById('chList').getElementsByTagName('div');
            for (let i = 0; i < cards.length; i++) {
                let h4 = cards[i].getElementsByTagName("h4")[0];
                if (h4) {
                    let txtValue = h4.textContent || h4.innerText;
                    cards[i].style.display = txtValue.toUpperCase().indexOf(filter) > -1 ? "" : "none";
                }
            }
        }
        loadList();
    </script>
</body>
</html>
