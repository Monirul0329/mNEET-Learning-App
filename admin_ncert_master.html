<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(22, 33, 62, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        body { background: #070b14; color: white; font-family: sans-serif; overflow-x: hidden; }
        input { background: #0b1120 !important; border: 1px solid #1f2937 !important; color: white; outline: none; }
        .modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-4 pb-24">

    <div class="flex items-center gap-4 mb-6 sticky top-0 z-50 bg-[#070b14]/80 py-2">
        <button onclick="history.back()" class="w-10 h-10 glass rounded-2xl flex items-center justify-center text-gray-400 active:scale-90"><i class="fa-solid fa-chevron-left"></i></button>
        <div class="relative flex-1">
            <input type="text" id="searchInput" oninput="searchCH()" placeholder="Search Chapters..." class="w-full glass p-3.5 pl-12 rounded-2xl text-[11px] font-bold">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-4 text-gray-500"></i>
        </div>
    </div>

    <div class="glass p-6 rounded-[2.5rem] mb-10 border-b-4 border-yellow-500/20">
        <p class="text-[8px] font-black uppercase text-yellow-500 mb-4 tracking-widest italic">Create New NCERT Chapter</p>
        <div class="flex gap-2">
            <input type="text" id="chNameInput" placeholder="Enter Chapter Name..." class="flex-1 p-4 rounded-2xl text-[11px] font-black">
            <button onclick="createChapter()" class="bg-yellow-500 text-black px-6 rounded-2xl font-black uppercase text-[10px]">Add</button>
        </div>
    </div>

    <div id="chapterList" class="space-y-4">
        </div>

    <div id="editChapterModal" class="modal">
        <div class="w-full max-w-sm glass p-8 rounded-[3rem] border border-white/10">
            <h2 class="text-xs font-black uppercase text-yellow-500 mb-6 italic">Edit Chapter Name</h2>
            <input type="text" id="editChName" class="w-full p-4 rounded-2xl text-[11px] mb-4">
            <div class="flex gap-2">
                <button onclick="saveChapterName()" class="flex-1 bg-blue-600 py-3 rounded-xl font-black text-[10px] uppercase">Update</button>
                <button onclick="closeModal('editChapterModal')" class="flex-1 bg-gray-700 py-3 rounded-xl font-black text-[10px] uppercase">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58",
            authDomain: "mneet-spark.firebaseapp.com",
            projectId: "mneet-spark",
            databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com/",
            appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentCHId = null;

        function createChapter() {
            const name = document.getElementById('chNameInput').value;
            if(!name) return;
            db.ref('ncert_v2').push({ name, pdf: "", audio: "" }).then(() => {
                document.getElementById('chNameInput').value = "";
            });
        }

        function loadChapters() {
            db.ref('ncert_v2').on('value', snap => {
                const list = document.getElementById('chapterList');
                list.innerHTML = "";
                snap.forEach(child => {
                    const ch = child.val();
                    list.innerHTML += `
                    <div class="glass p-5 rounded-[2rem] border-l-4 border-yellow-500 flex flex-col gap-3">
                        <div class="flex justify-between items-center">
                            <h4 onclick="location.href='admin_ncert_content.html?id=${child.key}'" class="text-[11px] font-black uppercase italic flex-1 cursor-pointer">${ch.name}</h4>
                            <div class="flex gap-3 text-gray-500">
                                <i onclick="openEditName('${child.key}', '${ch.name}')" class="fa-solid fa-pen-to-square hover:text-yellow-500"></i>
                                <i onclick="deleteChapter('${child.key}')" class="fa-solid fa-trash hover:text-red-500"></i>
                            </div>
                        </div>
                        <p class="text-[7px] text-gray-600 font-bold uppercase">Click name to manage PDF/Audio</p>
                    </div>`;
                });
            });
        }

        function openEditName(id, name) {
            currentCHId = id;
            document.getElementById('editChName').value = name;
            document.getElementById('editChapterModal').style.display = 'flex';
        }

        function saveChapterName() {
            const newName = document.getElementById('editChName').value;
            db.ref('ncert_v2/' + currentCHId).update({ name: newName }).then(() => closeModal('editChapterModal'));
        }

        function deleteChapter(id) {
            if(confirm("Delete this chapter?")) db.ref('ncert_v2/' + id).remove();
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        loadChapters();
    </script>
</body>
</html>
