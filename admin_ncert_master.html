<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(22, 33, 62, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        body { background: #070b14; color: white; font-family: sans-serif; }
        input { background: #0b1120 !important; border: 1px solid #1f2937 !important; color: white; outline: none; }
        input:focus { border-color: #eab308 !important; }
        .scroll-area { max-height: 60vh; overflow-y: auto; }
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="p-4">

    <div class="flex items-center gap-4 mb-6">
        <button onclick="history.back()" class="w-10 h-10 glass rounded-2xl flex items-center justify-center text-gray-400 active:scale-90 transition-all"><i class="fa-solid fa-chevron-left"></i></button>
        <div class="relative flex-1">
            <input type="text" id="searchChapter" oninput="searchCH()" placeholder="Search NCERT Chapters..." class="w-full glass p-3.5 pl-12 rounded-2xl text-[11px] font-bold">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-4 text-gray-500"></i>
        </div>
    </div>

    <h1 class="text-[10px] font-black uppercase tracking-[0.2em] text-yellow-500 mb-6 italic text-center">NCERT Master Editor</h1>

    <div class="glass p-6 rounded-[2.5rem] mb-10 border-b-4 border-yellow-500/20">
        <p class="text-[8px] font-black uppercase text-gray-500 mb-4 italic tracking-widest px-1">Add New Chapter To Database</p>
        <div class="space-y-3">
            <input type="text" id="chName" placeholder="Enter Chapter Name (e.g. Genetics)" class="w-full p-4 rounded-2xl text-[11px] font-black">
            <button onclick="createCH()" class="w-full bg-[#eab308] text-black py-4 rounded-2xl font-black uppercase text-[10px] shadow-xl active:scale-95 transition-all">Create Chapter Card</button>
        </div>
    </div>

    <h3 class="text-[9px] font-black uppercase text-gray-600 mb-4 px-2 italic">Created Chapter Hub</h3>
    <div id="chapterHub" class="scroll-area space-y-4 px-1">
        </div>

    <div id="manageModal" class="fixed inset-0 z-[100] glass hidden flex items-center justify-center p-6 backdrop-blur-3xl">
        <div class="w-full max-w-sm bg-[#0b1120] rounded-[3rem] p-8 border border-white/5 shadow-2xl relative">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-500"><i class="fa-solid fa-circle-xmark text-xl"></i></button>
            <h2 id="modalTitle" class="text-xs font-black uppercase text-yellow-500 mb-8 italic">Manage Chapter</h2>
            
            <div class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[8px] text-gray-500 font-black uppercase ml-1">NCERT PDF Master URL</label>
                    <input type="text" id="pdfUrl" class="w-full p-4 rounded-2xl text-[10px]">
                </div>
                <div class="space-y-1">
                    <label class="text-[8px] text-gray-500 font-black uppercase ml-1">Revision Audio URL (MP3)</label>
                    <input type="text" id="audioUrl" class="w-full p-4 rounded-2xl text-[10px]">
                </div>
                
                <button onclick="updateContent()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase text-[10px] mt-4">Save & Update</button>
                <button onclick="deleteCH()" class="w-full bg-red-500/10 text-red-500 py-3 rounded-2xl font-black uppercase text-[8px] border border-red-500/20 mt-2">Delete This Chapter</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58",
            authDomain: "mneet-spark.firebaseapp.com",
            projectId: "mneet-spark",
            databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com/",
            appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let activeCHid = null;
        let allCH = [];

        function createCH() {
            const name = document.getElementById('chName').value;
            if(!name) return alert("Enter Name!");
            database.ref('study/ncert').push({
                name: name,
                pdf: "",
                audio: "",
                timestamp: Date.now()
            }).then(() => {
                document.getElementById('chName').value = "";
                alert("Chapter Card Created!");
            });
        }

        function loadHub() {
            database.ref('study/ncert').on('value', snap => {
                allCH = [];
                const hub = document.getElementById('chapterHub');
                hub.innerHTML = "";
                snap.forEach(child => {
                    const ch = child.val();
                    allCH.push({ id: child.key, ...ch });
                    hub.innerHTML += `
                        <div onclick="openManager('${child.key}')" class="glass p-5 rounded-[2rem] border-l-4 border-yellow-500 flex justify-between items-center active:scale-95 transition-all">
                            <div>
                                <h4 class="text-[11px] font-black uppercase italic">${ch.name}</h4>
                                <p class="text-[7px] text-gray-500 font-bold uppercase mt-1">Status: ${ch.pdf ? 'Ready' : 'Pending Upload'}</p>
                            </div>
                            <i class="fa-solid fa-file-pen text-yellow-500/50"></i>
                        </div>`;
                });
            });
        }

        function openManager(id) {
            activeCHid = id;
            database.ref('study/ncert/' + id).once('value', snap => {
                const data = snap.val();
                document.getElementById('modalTitle').innerText = data.name;
                document.getElementById('pdfUrl').value = data.pdf || "";
                document.getElementById('audioUrl').value = data.audio || "";
                document.getElementById('manageModal').classList.remove('hidden');
            });
        }

        function updateContent() {
            database.ref('study/ncert/' + activeCHid).update({
                pdf: document.getElementById('pdfUrl').value,
                audio: document.getElementById('audioUrl').value
            }).then(() => {
                alert("Updated!");
                closeModal();
            });
        }

        function deleteCH() {
            if(confirm("Permanently Delete This Chapter?")) {
                database.ref('study/ncert/' + activeCHid).remove().then(() => closeModal());
            }
        }

        function searchCH() {
            const term = document.getElementById('searchChapter').value.toLowerCase();
            const hub = document.getElementById('chapterHub');
            hub.innerHTML = allCH.filter(c => c.name.toLowerCase().includes(term)).map(ch => `
                <div onclick="openManager('${ch.id}')" class="glass p-5 rounded-[2rem] border-l-4 border-yellow-500 flex justify-between items-center">
                    <h4 class="text-[11px] font-black uppercase italic">${ch.name}</h4>
                    <i class="fa-solid fa-file-pen text-yellow-500/50"></i>
                </div>`).join('');
        }

        function closeModal() { document.getElementById('manageModal').classList.add('hidden'); }
        loadHub();
    </script>
</body>
                  </html>
