<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(22, 33, 62, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        body { background: #070b14; color: white; font-family: sans-serif; }
        input { background: #0b1120 !important; border: 1px solid #1f2937 !important; color: white; outline: none; }
        .modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body class="p-4">
    <div class="flex items-center gap-4 mb-6 sticky top-0 z-50 bg-[#070b14] py-2">
        <button onclick="history.back()" class="w-10 h-10 glass rounded-2xl flex items-center justify-center text-gray-400"><i class="fa-solid fa-chevron-left"></i></button>
        <div class="relative flex-1">
            <input type="text" id="searchInput" oninput="searchCH()" placeholder="Search Chapter..." class="w-full glass p-3 pl-10 rounded-2xl text-xs">
            <i class="fa-solid fa-search absolute left-4 top-3.5 text-gray-500 text-sm"></i>
        </div>
    </div>

    <div class="glass p-5 rounded-[2rem] mb-8 border-b-2 border-yellow-500/20">
        <p class="text-[9px] font-black uppercase text-yellow-500 mb-3 italic">Create New Chapter</p>
        <div class="flex gap-2">
            <input type="text" id="newCH" placeholder="Chapter Name..." class="flex-1 p-3 rounded-xl text-xs">
            <button onclick="addCH()" class="bg-yellow-500 text-black px-5 rounded-xl font-black text-[10px]">CREATE</button>
        </div>
    </div>

    <div id="chList" class="space-y-4"></div>

    <div id="renameModal" class="modal">
        <div class="w-full max-w-xs glass p-6 rounded-[2rem] text-center border border-white/10">
            <h2 class="text-xs font-black text-yellow-500 mb-4 uppercase italic">Rename Chapter</h2>
            <input type="text" id="editNameInput" class="w-full p-3 rounded-xl text-xs mb-4">
            <div class="flex gap-2">
                <button onclick="saveName()" class="flex-1 bg-blue-600 p-3 rounded-xl font-bold text-[10px]">UPDATE</button>
                <button onclick="closeModal()" class="flex-1 bg-gray-700 p-3 rounded-xl font-bold text-[10px]">CANCEL</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { /* Paste Your Config */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let editId = null;

        function addCH() {
            const name = document.getElementById('newCH').value;
            if(name) db.ref('ncert_ai').push({ name, pdf: "", audio: "" }).then(() => document.getElementById('newCH').value = "");
        }

        function loadCH() {
            db.ref('ncert_ai').on('value', snap => {
                const list = document.getElementById('chList'); list.innerHTML = "";
                snap.forEach(child => {
                    const ch = child.val();
                    list.innerHTML += `
                    <div class="glass p-4 rounded-3xl flex justify-between items-center border-l-4 border-yellow-500">
                        <div onclick="location.href='admin_ncert_content.html?id=${child.key}'" class="flex-1 cursor-pointer">
                            <h4 class="text-xs font-black uppercase italic">${ch.name}</h4>
                            <p class="text-[7px] text-gray-500 font-bold mt-1 uppercase tracking-widest">Manage PDF/Audio</p>
                        </div>
                        <div class="flex gap-4">
                            <i onclick="openRename('${child.key}','${ch.name}')" class="fa-solid fa-pen-to-square text-blue-400"></i>
                            <i onclick="deleteCH('${child.key}')" class="fa-solid fa-trash text-red-500"></i>
                        </div>
                    </div>`;
                });
            });
        }
        function openRename(id, n) { editId = id; document.getElementById('editNameInput').value = n; document.getElementById('renameModal').style.display='flex'; }
        function saveName() { db.ref('ncert_ai/'+editId).update({name: document.getElementById('editNameInput').value}).then(closeModal); }
        function deleteCH(id) { if(confirm("Delete Chapter?")) db.ref('ncert_ai/'+id).remove(); }
        function closeModal() { document.getElementById('renameModal').style.display='none'; }
        loadCH();
    </script>
</body>
</html>
