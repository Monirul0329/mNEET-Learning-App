<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(22, 33, 62, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        .reader-btn { background: white; color: black; padding: 10px 20px; border-radius: 12px; font-weight: 900; font-size: 10px; text-transform: uppercase; }
        body { background: #070b14; color: white; }
    </style>
</head>
<body class="p-6">
    <div class="flex items-center gap-4 mb-8">
        <button onclick="history.back()" class="w-10 h-10 glass rounded-2xl flex items-center justify-center"><i class="fa-solid fa-chevron-left"></i></button>
        <h1 class="text-sm font-black italic uppercase text-yellow-500">NCERT Master Editor</h1>
    </div>

    <!-- Add NCERT Chapter -->
    <div class="glass p-6 rounded-[2.5rem] mb-10 border-b-4 border-yellow-500/30">
        <input type="text" id="ncertName" placeholder="Chapter Name (e.g. Human Reproduction)" class="w-full p-4 rounded-2xl bg-[#0b1120] border border-gray-800 text-[11px] font-bold mb-3 outline-none focus:border-yellow-500">
        <input type="text" id="pdfUrl" placeholder="PDF File URL" class="w-full p-4 rounded-2xl bg-[#0b1120] border border-gray-800 text-[11px] font-bold mb-3 outline-none">
        <input type="text" id="audioUrl" placeholder="Quick Revision Audio URL" class="w-full p-4 rounded-2xl bg-[#0b1120] border border-gray-800 text-[11px] font-bold mb-4 outline-none">
        <button onclick="addNCERT()" class="w-full bg-yellow-500 text-black py-4 rounded-2xl font-black uppercase text-[10px]">Publish NCERT Chapter</button>
    </div>

    <div id="ncertList" class="space-y-4"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58",
            authDomain: "mneet-spark.firebaseapp.com",
            projectId: "mneet-spark",
            databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com/",
            appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function addNCERT() {
            const name = document.getElementById('ncertName').value;
            const pdf = document.getElementById('pdfUrl').value;
            const audio = document.getElementById('audioUrl').value;
            if(!name || !pdf) return alert("Fill required fields!");

            database.ref('study/ncert').push({
                name: name, pdf: pdf, audio: audio,
                tags: [], isHidden: false
            }).then(() => location.reload());
        }

        database.ref('study/ncert').on('value', snap => {
            const list = document.getElementById('ncertList');
            list.innerHTML = "";
            snap.forEach(child => {
                const n = child.val();
                list.innerHTML += `
                    <div class="glass p-5 rounded-[2rem] flex justify-between items-center">
                        <div>
                            <h4 class="text-[11px] font-black uppercase italic">${n.name}</h4>
                            <p class="text-[7px] text-gray-500 mt-1 uppercase">PDF + Audio Enabled</p>
                        </div>
                        <button class="reader-btn">Edit Tags</button>
                    </div>`;
            });
        });
    </script>
</body>
</html>
