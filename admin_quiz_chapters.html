<script>
    // ... Firebase Init
    const batchId = localStorage.getItem('selectedBatchId');

    function addQuizCh() {
        const name = document.getElementById('quizChName').value;
        if(!name) return;
        // Path: courses/{batchId}/quizzes
        firebase.database().ref(`courses/${batchId}/quizzes`).push({ 
            name: name,
            timestamp: Date.now()
        }).then(() => {
            document.getElementById('quizChName').value = "";
            alert("Quiz Chapter Created!");
        });
    }

    firebase.database().ref(`courses/${batchId}/quizzes`).on('value', snap => {
        const list = document.getElementById('quizChList');
        list.innerHTML = "";
        snap.forEach(child => {
            list.innerHTML += `
                <div class="glass p-5 rounded-[2rem] flex justify-between items-center border border-purple-500/10 mb-3">
                    <div onclick="location.href='admin_quiz_topics.html?id=${child.key}&batch=${batchId}'" class="flex-1">
                        <h4 class="text-[11px] font-black uppercase italic">${child.val().name}</h4>
                    </div>
                    <button onclick="deleteQuizCh('${child.key}')" class="text-red-500 p-2"><i class="fa-solid fa-trash-can"></i></button>
                </div>`;
        });
    });

    function deleteQuizCh(id) { if(confirm("Delete Quiz?")) firebase.database().ref(`courses/${batchId}/quizzes/` + id).remove(); }
</script>
