<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style> .glass { background: rgba(22, 33, 62, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); } body { background: #070b14; color: white; } </style>
</head>
<body class="p-6">
    <h1 class="text-xs font-black uppercase text-purple-500 mb-8 italic">Quiz Chapter Management</h1>
    
    <div class="glass p-6 rounded-[2.5rem] mb-10 border-b-4 border-purple-500/30">
        <input type="text" id="quizChName" placeholder="New Quiz Chapter Name" class="w-full p-4 rounded-2xl bg-[#0b1120] border border-gray-800 text-[10px] mb-4 text-white outline-none">
        <button onclick="addQuizCh()" class="w-full bg-purple-600 py-4 rounded-2xl font-black uppercase text-[10px]">Create Quiz Chapter</button>
    </div>

    <div id="quizChList" class="space-y-4"></div>

    <script>
        // Use same Firebase Config
        function addQuizCh() {
            const name = document.getElementById('quizChName').value;
            firebase.database().ref('study/quizzes').push({ name: name }).then(() => location.reload());
        }

        firebase.database().ref('study/quizzes').on('value', snap => {
            const list = document.getElementById('quizChList');
            list.innerHTML = "";
            snap.forEach(child => {
                list.innerHTML += `
                    <div onclick="location.href='admin_quiz_topics.html?id=${child.key}'" class="glass p-5 rounded-[2rem] flex justify-between items-center border border-purple-500/10">
                        <h4 class="text-[11px] font-black uppercase italic">${child.val().name}</h4>
                        <i class="fa-solid fa-chevron-right text-gray-700"></i>
                    </div>`;
            });
        });
    </script>
</body>
</html>
