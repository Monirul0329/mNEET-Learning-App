<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#0b1120] p-6 text-white font-sans pb-20">

    <div class="flex justify-between items-center mb-8">
        <div>
            <h2 class="text-[#eab308] text-xs font-black uppercase tracking-[0.2em]">User Control Center</h2>
            <p class="text-[10px] text-gray-500 mt-1 uppercase">Manage Ranks, Coins & Access</p>
        </div>
        <div class="bg-[#16213e] px-4 py-2 rounded-2xl border border-gray-800">
            <span id="totalStudents" class="text-lg font-black text-white">0</span>
            <span class="text-[8px] text-gray-500 uppercase ml-1">Total</span>
        </div>
    </div>

    <div class="relative mb-6">
        <i class="fa-solid fa-magnifying-glass absolute left-4 top-4 text-gray-500 text-sm"></i>
        <input type="text" id="userSearch" onkeyup="searchUser()" placeholder="Search by name or email..." class="w-full bg-[#16213e] p-4 pl-12 rounded-2xl border border-gray-800 outline-none text-sm focus:border-[#eab308]">
    </div>

    <div id="userContainer" class="space-y-4"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58", authDomain: "mneet-spark.firebaseapp.com", projectId: "mneet-spark" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        onSnapshot(query(collection(db, "users"), where("role", "==", "student")), (snap) => {
            document.getElementById('totalStudents').innerText = snap.size;
            const container = document.getElementById('userContainer');
            container.innerHTML = "";
            snap.forEach(d => {
                const u = d.data();
                container.innerHTML += `
                <div class="user-card p-5 rounded-[2rem] border ${u.isBlocked ? 'border-red-500 bg-red-500/5' : 'border-gray-800 bg-[#16213e]'} mb-4 transition-all">
                    <div class="flex justify-between items-start mb-4">
                        <div><h3 class="font-bold text-white text-sm">${u.name}</h3><p class="text-[9px] text-gray-500 uppercase font-black tracking-tighter">${u.email}</p></div>
                        <div class="text-right"><span class="text-[10px] font-black text-[#eab308] italic">${u.rank || 'Bronze'}</span></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mt-6">
                        <div class="bg-[#0b1120] p-3 rounded-xl border border-gray-800">
                            <p class="text-[8px] text-gray-500 uppercase font-bold mb-1">BP Coins</p>
                            <input type="number" value="${u.coins || 0}" onchange="updateCoins('${d.id}', this.value)" class="bg-transparent w-full text-sm font-black text-white outline-none">
                        </div>
                        <button onclick="toggleBlock('${d.id}', ${u.isBlocked || false})" class="flex-1 ${u.isBlocked ? 'bg-green-600' : 'bg-red-600'} text-white rounded-xl text-[9px] font-black uppercase">
                            ${u.isBlocked ? 'Unblock' : 'Block'}
                        </button>
                    </div>
                </div>`;
            });
        });

        window.updateCoins = async (uid, newVal) => { await updateDoc(doc(db, "users", uid), { coins: parseInt(newVal) }); alert("Updated!"); };
        window.toggleBlock = async (uid, currentStatus) => { if(confirm("Change Status?")) await updateDoc(doc(db, "users", uid), { isBlocked: !currentStatus }); };
        window.searchUser = () => { /* Logic same as yours */ }
    </script>
</body>
</html>
