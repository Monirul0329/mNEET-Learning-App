<!DOCTYPE html>
<html lang="en">
<head><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-[#0b1120] p-6 text-white pb-32">
    <h2 class="text-[9px] font-black text-gray-500 uppercase tracking-widest mb-4">Test Categories</h2>
    <div id="subjectTabs" class="flex gap-3 overflow-x-auto pb-4 no-scrollbar"></div>
    <div id="testList" class="mt-10 space-y-4"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
        const firebaseConfig = { apiKey: "AIzaSyBisQytTeFhjMd1kTUNwcmCelPy7C0ilIY", authDomain: "mneet-7699.firebaseapp.com", projectId: "mneet-7699", storageBucket: "mneet-7699.firebasestorage.app", messagingSenderId: "801664280357", appId: "1:801664280357:web:03da6173f29bedfeaa9ccc" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);

        onSnapshot(collection(db, "courses"), (snap) => {
            const tabs = document.getElementById('subjectTabs'); tabs.innerHTML = "";
            snap.forEach(d => tabs.innerHTML += `<button onclick="loadT('${d.id}')" class="flex-shrink-0 bg-[#16213e] px-6 py-3 rounded-2xl text-[10px] font-black uppercase border border-gray-800 focus:bg-gold focus:text-black">${d.data().title}</button>`);
        });

        window.loadT = (cid) => {
            const q = query(collection(db, "tests"), where("cid", "==", cid));
            onSnapshot(q, (snap) => {
                const list = document.getElementById('testList'); list.innerHTML = "";
                snap.forEach(d => {
                    const t = d.data();
                    list.innerHTML += `<div class="bg-[#16213e] p-6 rounded-[2rem] border-l-4 border-gold flex justify-between items-center shadow-2xl">
                        <h3 class="font-black text-sm uppercase italic">${t.name}</h3>
                        <button onclick="window.open('${t.link}')" class="bg-gold text-black px-6 py-2 rounded-xl font-black text-[9px] uppercase">Start</button>
                    </div>`;
                });
            });
        };
    </script>
</body>
</html>
