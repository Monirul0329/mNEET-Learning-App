<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#0b1120] p-6 text-white font-sans">
    
    <h2 class="text-[9px] font-black text-gray-500 uppercase tracking-widest mb-4">Select Subject</h2>
    <div id="subjectTabs" class="flex gap-3 overflow-x-auto pb-4 no-scrollbar"></div>

    <div id="testArea" class="mt-10">
        <div id="testList" class="space-y-4">
            <p class="text-center text-xs text-gray-700 py-20 font-bold uppercase italic">Select a subject to view tests</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBisQytTeFhjMd1kTUNwcmCelPy7C0ilIY", authDomain: "mneet-7699.firebaseapp.com", projectId: "mneet-7699", storageBucket: "mneet-7699.firebasestorage.app", messagingSenderId: "801664280357", appId: "1:801664280357:web:03da6173f29bedfeaa9ccc" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Load Subjects
        onSnapshot(collection(db, "courses"), (snap) => {
            const tabs = document.getElementById('subjectTabs');
            tabs.innerHTML = "";
            snap.forEach(d => {
                tabs.innerHTML += `<button onclick="loadTests('${d.id}')" class="flex-shrink-0 bg-[#16213e] border border-gray-800 px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest focus:bg-yellow-500 focus:text-black">${d.data().title}</button>`;
            });
        });

        // Load Tests
        window.loadTests = (cid) => {
            const q = query(collection(db, "tests"), where("cid", "==", cid));
            onSnapshot(q, (snap) => {
                const list = document.getElementById('testList');
                list.innerHTML = "";
                if(snap.empty) { list.innerHTML = "<p class='text-center text-xs text-gray-600 py-10 uppercase'>No tests available yet.</p>"; return; }
                
                snap.forEach(d => {
                    const t = d.data();
                    list.innerHTML += `
                    <div class="bg-[#16213e] p-6 rounded-[2rem] border-l-4 border-yellow-500 flex justify-between items-center shadow-2xl transition-all active:scale-95">
                        <div>
                            <p class="text-[8px] text-yellow-500 font-bold uppercase mb-1">Weekly Mock</p>
                            <h3 class="font-bold text-sm text-white uppercase italic">${t.name}</h3>
                        </div>
                        <button onclick="window.open('${t.link}', '_blank')" class="bg-yellow-500 text-black px-5 py-2 rounded-xl font-black text-[9px] uppercase shadow-lg">Start</button>
                    </div>`;
                });
            });
        };
    </script>
</body>
</html>
