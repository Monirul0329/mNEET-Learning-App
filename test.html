<script>
    // ... Firebase Init
    const batchId = localStorage.getItem('selectedBatchId');

    function initTestCenter() {
        if(!batchId) {
            document.getElementById('mockList').innerHTML = `<p class="text-center text-gray-500 text-[10px] py-10 italic uppercase">Select a batch from Dashboard first!</p>`;
            return;
        }
        // Load tests from: courses/{batchId}/tests
        database.ref(`courses/${batchId}/tests`).on('value', (snap) => {
            const list = document.getElementById('mockList');
            list.innerHTML = "";
            snap.forEach(child => {
                const m = child.val();
                list.innerHTML += `
                    <div class="glass p-6 rounded-[2.5rem] border border-white/5 mb-4">
                        <div class="flex justify-between items-start mb-5">
                            <div>
                                <h4 class="text-sm font-black uppercase italic">${m.name}</h4>
                                <p class="text-[7px] text-gray-500 uppercase mt-1">Status: ${m.status}</p>
                            </div>
                            <a href="quiz_engine.html?id=${child.key}" class="bg-[#eab308] text-black px-5 py-2 rounded-xl text-[9px] font-black uppercase">Start</a>
                        </div>
                    </div>`;
            });
        });
    }
    initTestCenter();
</script>
