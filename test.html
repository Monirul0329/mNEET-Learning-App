<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#0b1120] p-6 text-white">
    <h2 class="text-xs font-black text-gray-500 uppercase tracking-widest mb-6">mNEET Test Center</h2>
    
    <div class="grid grid-cols-2 gap-4">
        <div class="bg-[#16213e] p-5 rounded-3xl text-center border border-gray-800">
            <i class="fa-solid fa-flask-vial text-2xl text-[#eab308] mb-2"></i>
            <p class="text-[10px] font-black uppercase">Topic Test</p>
        </div>
        <div class="bg-[#16213e] p-5 rounded-3xl text-center border border-gray-800">
            <i class="fa-solid fa-file-waveform text-2xl text-[#eab308] mb-2"></i>
            <p class="text-[10px] font-black uppercase">Full Mock</p>
        </div>
        <div class="bg-[#16213e] p-5 rounded-3xl text-center border border-gray-800 opacity-50">
            <i class="fa-solid fa-medal text-2xl text-[#eab308] mb-2"></i>
            <p class="text-[10px] font-black uppercase">Grand Test</p>
        </div>
        <div class="bg-[#16213e] p-5 rounded-3xl text-center border border-gray-800 opacity-50">
            <i class="fa-solid fa-clock-rotate-left text-2xl text-[#eab308] mb-2"></i>
            <p class="text-[10px] font-black uppercase">PYQs Test</p>
        </div>
    </div>
</body>
</html>
