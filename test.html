<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-black min-h-screen p-8 font-sans">
    <div class="max-w-2xl mx-auto">
        <div class="flex justify-between items-center mb-12 border-b-4 border-gray-50 pb-6">
            <div>
                <h1 class="text-[10px] font-black uppercase tracking-widest text-gray-400">NEET Real-Time Simulator</h1>
                <h2 id="qTitle" class="text-lg font-black italic uppercase mt-1">Physics: Mechanics</h2>
            </div>
            <div id="timer" class="bg-red-50 text-red-600 px-6 py-2 rounded-2xl font-mono font-black text-xl">45:00</div>
        </div>

        <div id="quizContainer">
            <p class="text-gray-400 text-[10px] font-black uppercase mb-4 tracking-tighter">Question #12</p>
            <h3 class="text-2xl font-bold mb-10 leading-tight">The unit of viscosity in CGS system is?</h3>
            
            <div class="grid grid-cols-1 gap-4">
                <button onclick="handleAnswer(false)" class="w-full text-left p-6 border-2 border-gray-100 rounded-[2rem] hover:bg-gray-50 hover:border-black transition-all font-bold">A. Poiseuille</button>
                <button onclick="handleAnswer(true)" class="w-full text-left p-6 border-2 border-gray-100 rounded-[2rem] hover:bg-gray-50 hover:border-black transition-all font-bold">B. Poise</button>
                <button onclick="handleAnswer(false)" class="w-full text-left p-6 border-2 border-gray-100 rounded-[2rem] hover:bg-gray-50 hover:border-black transition-all font-bold">C. Pascal</button>
            </div>
        </div>

        <div class="mt-12 flex justify-between items-center text-[10px] font-black uppercase tracking-widest text-gray-400">
            <span>Marked for Review</span>
            <span>Next Question →</span>
        </div>
    </div>

    <script>
        function handleAnswer(isCorrect) {
            if(isCorrect) alert("Bingo! +4 XP added to Rank.");
            else alert("Oops! -1 Marks. Refer to NCERT Page 282.");
        }
    </script>
</body>
</html>
