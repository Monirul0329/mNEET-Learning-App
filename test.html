<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass { background: rgba(22, 33, 62, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        body { background: #070b14; color: white; font-family: sans-serif; min-height: 100vh; }
        .red-glow { color: #ef4444; text-shadow: 0 0 10px rgba(239, 68, 68, 0.4); }
    </style>
</head>
<body class="p-4 pb-32">

    <div class="flex justify-between items-center mb-8 px-1 mt-2">
        <div class="flex items-center gap-4">
            <button onclick="location.href='study_zone.html'" class="w-10 h-10 glass rounded-2xl flex items-center justify-center text-gray-400"><i class="fa-solid fa-chevron-left"></i></button>
            <div>
                <h1 class="text-xl font-black italic red-glow uppercase tracking-tighter">EXAM ZONE</h1>
                <p class="text-[7px] text-gray-500 uppercase font-bold tracking-widest mt-0.5">National Level Mock Test Series</p>
            </div>
        </div>
    </div>

    <div class="space-y-4" id="studentExamContainer"></div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyApQOM_mtFZ16RiNJEaIUhb4iYFBIBRK58", authDomain: "mneet-spark.firebaseapp.com", projectId: "mneet-spark", databaseURL: "https://mneet-spark-default-rtdb.firebaseio.com/", appId: "1:252201633700:web:1a1e7a2cff1f0b168ea331" };
        firebase.initializeApp(firebaseConfig); const database = firebase.database();
        const batchId = localStorage.getItem('selectedBatchId') || "B001";

        function loadStudentTests() {
            database.ref(`courses/${batchId}/tests`).on('value', snap => {
                const c = document.getElementById('studentExamContainer'); c.innerHTML = "";
                if(!snap.exists()) { c.innerHTML = '<p class="text-center text-xs text-gray-600 py-10">No Scheduled Tests Found</p>'; return; }
                snap.forEach(child => {
                    const t = child.val();
                    container.innerHTML += `
                        <div class="glass p-6 rounded-[2.5rem] flex justify-between items-center border border-white/5 shadow-md">
                            <div class="flex items-center gap-4">
                                <div class="w-11 h-11 rounded-2xl bg-red-500/10 flex items-center justify-center text-red-500"><i class="fa-solid fa-pen-to-square"></i></div>
                                <div>
                                    <h4 class="text-xs font-black uppercase italic tracking-wide">${t.name}</h4>
                                    <p class="text-[7px] text-gray-500 uppercase font-bold mt-0.5">720 Marks Syllabus Target</p>
                                </div>
                            </div>
                            <a href="${t.url}" target="_blank" class="px-4 py-2 rounded-xl bg-red-600 text-[9px] font-black uppercase text-white italic active:scale-95 transition-all">Start</a>
                        </div>`;
                });
            });
        }
        loadStudentTests();
    </script>
</body>
</html>
